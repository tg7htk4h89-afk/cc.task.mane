<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — CC Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   Contact Center Task Manager — Design System v2
   Clean Enterprise | Deep Navy + Precision Blue
═══════════════════════════════════════════════ */

/* ── Design Tokens ─────────────────────────── */
:root {
  /* Brand */
  --navy:        #060F24;
  --navy-2:      #0D1B3E;
  --navy-3:      #142556;
  --blue:        #1877C5;
  --blue-dim:    rgba(24,119,197,0.12);
  --blue-light:  #E8F1FB;

  /* Semantic */
  --green:       #0EA472;
  --green-dim:   #E6F7F2;
  --red:         #E5383B;
  --red-dim:     #FEE8E8;
  --amber:       #F4A523;
  --amber-dim:   #FEF5E7;
  --purple:      #7B61FF;
  --purple-dim:  #F0EEFF;

  /* Surface */
  --bg:          #F0F4F9;
  --card:        #FFFFFF;
  --card-hover:  #FAFCFF;
  --border:      #E4EAF3;
  --border-2:    #D0D9E8;

  /* Text */
  --t1:          #0A1628;
  --t2:          #4A5568;
  --t3:          #8A9BB0;
  --t4:          #B8C5D4;

  /* Sidebar */
  --sb:          var(--navy);
  --sb-text:     rgba(255,255,255,0.5);
  --sb-active-bg:rgba(24,119,197,0.18);
  --sb-active:   #5BA8E8;
  --sb-width:    224px;
  --topbar-h:    52px;

  /* Type */
  --font: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', monospace;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;

  /* Shadow */
  --sh-sm: 0 1px 3px rgba(10,22,40,0.06), 0 1px 2px rgba(10,22,40,0.04);
  --sh-md: 0 4px 12px rgba(10,22,40,0.08), 0 1px 3px rgba(10,22,40,0.05);
  --sh-lg: 0 12px 32px rgba(10,22,40,0.12), 0 4px 8px rgba(10,22,40,0.06);

  /* Transitions */
  --ease: 150ms ease;
}

/* ── Reset ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--t1);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

/* ── App Layout ─────────────────────────────── */
.app-layout { display: flex; min-height: 100vh; }

/* ── Sidebar ────────────────────────────────── */
.sidebar {
  width: var(--sb-width);
  background: var(--sb);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 200;
  overflow-y: auto;
  transition: transform var(--ease);
}
.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logomark {
  width: 34px; height: 34px;
  background: var(--blue); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #fff;
  letter-spacing: -0.5px; margin-bottom: 10px;
}
.sidebar-title { color: #fff; font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-sub   { color: rgba(255,255,255,0.3); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.sidebar-nav   { padding: 10px 0; flex: 1; }
.nav-section {
  padding: 10px 18px 4px;
  font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,0.22);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin-top: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; margin: 1px 8px;
  border-radius: var(--r-md);
  color: var(--sb-text); font-size: 12px; font-weight: 500;
  transition: all var(--ease); cursor: pointer; text-decoration: none;
}
.nav-item svg { width: 16px; height: 16px; stroke-width: 2; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); text-decoration: none; }
.nav-item.active { background: var(--sb-active-bg); color: var(--sb-active); }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--red); color: #fff;
  font-size: 9px; font-weight: 700;
  border-radius: 5px; padding: 1px 5px;
  line-height: 1.4;
}
.sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.user-chip { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.user-name  { color: #fff; font-size: 12px; font-weight: 600; }
.user-role  { color: rgba(255,255,255,0.4); font-size: 10px; }
.btn-logout {
  margin-left: auto; background: none; border: none;
  color: rgba(255,255,255,0.3); padding: 4px;
  border-radius: var(--r-sm); transition: color var(--ease);
  display: flex; align-items: center;
}
.btn-logout:hover { color: var(--red); }
.btn-logout svg { width: 14px; height: 14px; }
.sidebar-toggle {
  display: none; background: none; border: none;
  padding: 6px; color: var(--t2);
}
.sidebar-toggle svg { width: 20px; height: 20px; }

/* ── Main Content ───────────────────────────── */
.main-content { margin-left: var(--sb-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top Bar ────────────────────────────────── */
.top-bar {
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.breadcrumb { font-size: 13px; font-weight: 600; color: var(--t1); flex: 1; }
.breadcrumb span { color: var(--t3); font-weight: 400; }
.search-bar {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 7px 12px;
  display: flex; align-items: center; gap: 8px;
  transition: border-color var(--ease);
}
.search-bar:focus-within { border-color: var(--blue); }
.search-bar svg { width: 14px; height: 14px; color: var(--t3); stroke: var(--t3); flex-shrink: 0; }
.search-bar input {
  background: none; border: none; outline: none;
  font-size: 12px; color: var(--t1); width: 200px;
}
.search-bar input::placeholder { color: var(--t4); }
.notif-bell {
  width: 32px; height: 32px; border-radius: var(--r-md);
  background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; transition: background var(--ease);
}
.notif-bell:hover { background: var(--blue-light); border-color: var(--blue); }
.notif-bell svg { width: 15px; height: 15px; stroke: var(--t2); }
.notif-badge {
  position: absolute; top: 4px; right: 4px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 1.5px solid var(--card);
}
.notif-badge.hidden { display: none; }
.date-chip {
  font-size: 11px; color: var(--t3); font-weight: 500;
  white-space: nowrap; display: none;
}

/* ── Page Content ───────────────────────────── */
.page-content { padding: 24px; flex: 1; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title  { font-size: 20px; font-weight: 800; color: var(--t1); letter-spacing: -0.5px; line-height: 1.2; }
.page-sub    { font-size: 12px; color: var(--t3); margin-top: 3px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Buttons ────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--r-md);
  font-size: 12px; font-weight: 600; font-family: var(--font);
  border: none; cursor: pointer; transition: all var(--ease);
  white-space: nowrap; line-height: 1;
}
.btn svg { width: 13px; height: 13px; }
.btn-primary  { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(24,119,197,0.25); }
.btn-primary:hover  { background: #1565A8; box-shadow: 0 4px 14px rgba(24,119,197,0.35); }
.btn-secondary { background: var(--card); color: var(--t1); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); border-color: var(--border-2); }
.btn-danger   { background: var(--red); color: #fff; }
.btn-danger:hover { background: #C12D2F; }
.btn-ghost    { background: none; color: var(--t2); border: none; padding: 6px 10px; }
.btn-ghost:hover { background: var(--bg); color: var(--t1); }
.btn-sm       { padding: 5px 12px; font-size: 11px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── KPI Cards ──────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px;
  box-shadow: var(--sh-sm); position: relative; overflow: hidden;
  transition: box-shadow var(--ease), transform var(--ease);
}
.kpi-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.kpi-card::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.kpi-blue::after   { background: var(--blue); }
.kpi-red::after    { background: var(--red); }
.kpi-green::after  { background: var(--green); }
.kpi-amber::after  { background: var(--amber); }
.kpi-purple::after { background: var(--purple); }
.kpi-icon {
  width: 34px; height: 34px; border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.kpi-icon svg { width: 16px; height: 16px; }
.kpi-icon.blue   { background: var(--blue-light); }
.kpi-icon.blue svg { stroke: var(--blue); }
.kpi-icon.red    { background: var(--red-dim); }
.kpi-icon.red svg { stroke: var(--red); }
.kpi-icon.green  { background: var(--green-dim); }
.kpi-icon.green svg { stroke: var(--green); }
.kpi-icon.amber  { background: var(--amber-dim); }
.kpi-icon.amber svg { stroke: var(--amber); }
.kpi-icon.purple { background: var(--purple-dim); }
.kpi-icon.purple svg { stroke: var(--purple); }
.kpi-value { font-size: 24px; font-weight: 800; color: var(--t1); line-height: 1; letter-spacing: -0.5px; }
.kpi-value.red    { color: var(--red); }
.kpi-value.green  { color: var(--green); }
.kpi-label { font-size: 11px; color: var(--t2); margin-top: 5px; font-weight: 500; }
.kpi-delta { font-size: 10px; font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 3px; }
.kpi-delta.up  { color: var(--green); }
.kpi-delta.dn  { color: var(--red); }
.kpi-delta.neutral { color: var(--t3); }

/* ── Chart Cards ────────────────────────────── */
.chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-sm);
}
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.chart-title  { font-size: 13px; font-weight: 700; color: var(--t1); }
.chart-sub    { font-size: 11px; color: var(--t3); }
.chart-wrap   { position: relative; height: 200px; }

/* ── Panel ──────────────────────────────────── */
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-sm);
  overflow: hidden;
}
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-title  { font-size: 13px; font-weight: 700; color: var(--t1); }
.panel-link   { font-size: 11px; font-weight: 600; color: var(--blue); cursor: pointer; }
.panel-link:hover { text-decoration: underline; }

/* ── Bottom grid ────────────────────────────── */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 12px; }

/* ── Task list rows ─────────────────────────── */
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background var(--ease);
  border-radius: var(--r-sm); margin: 0 -4px; padding-left: 4px;
}
.task-row:last-child { border-bottom: none; }
.task-row:hover .task-title { color: var(--blue); }
.priority-line { width: 3px; height: 34px; border-radius: 2px; flex-shrink: 0; }
.pl-critical { background: var(--red); }
.pl-high     { background: var(--amber); }
.pl-medium   { background: var(--blue); }
.pl-low      { background: var(--green); }
.task-info   { flex: 1; min-width: 0; }
.task-title  { font-size: 12px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color var(--ease); }
.task-meta   { font-size: 10px; color: var(--t3); margin-top: 2px; }
.task-av-sm {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.status-pill {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 5px; white-space: nowrap; flex-shrink: 0;
}
.sp-inprogress { background: var(--blue-light);  color: #1060A0; }
.sp-overdue    { background: var(--red-dim);      color: #A32020; }
.sp-completed  { background: var(--green-dim);    color: #0A6E4A; }
.sp-new        { background: var(--purple-dim);   color: #4E38A0; }
.sp-pending    { background: var(--amber-dim);    color: #8A5A0A; }
.sp-escalated  { background: #F3E8FF;              color: #5B21B6; }

/* ── Notification items ─────────────────────── */
.notif-item {
  display: flex; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.notif-item:last-child { border-bottom: none; }
.notif-severity { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.ns-critical { background: var(--red); }
.ns-warning  { background: var(--amber); }
.ns-info     { background: var(--green); }
.notif-title { font-size: 11px; font-weight: 600; color: var(--t1); }
.notif-body  { font-size: 10px; color: var(--t2); margin-top: 2px; line-height: 1.4; }
.notif-time  { font-size: 9px; color: var(--t3); margin-top: 3px; font-weight: 500; }

/* ── Score panel ────────────────────────────── */
.score-ring-wrap { position: relative; width: 96px; height: 96px; margin: 4px auto 12px; }
.score-ring-wrap canvas { width: 96px !important; height: 96px !important; }
.score-center-val {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 22px; font-weight: 800; color: var(--t1); text-align: center; line-height: 1;
}
.score-center-lbl { font-size: 9px; color: var(--t3); font-weight: 500; margin-top: 2px; }
.score-breakdown .sr {
  display: flex; align-items: center;
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
.score-breakdown .sr:last-child { border-bottom: none; }
.sr-lbl { font-size: 10px; color: var(--t2); min-width: 110px; }
.sr-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 0 8px; }
.sr-fill { height: 100%; border-radius: 2px; background: var(--blue); }
.sr-val { font-size: 10px; font-weight: 700; color: var(--t1); min-width: 24px; text-align: right; }

/* ── KANBAN BOARD ───────────────────────────── */
.kanban-wrap { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; align-items: flex-start; }
.kanban-wrap::-webkit-scrollbar { height: 6px; }
.kanban-wrap::-webkit-scrollbar-track { background: var(--bg); border-radius: 3px; }
.kanban-wrap::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.kanban-col { min-width: 272px; max-width: 272px; display: flex; flex-direction: column; gap: 8px; }
.kanban-col-header {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 3px solid var(--border);
}
.kcol-new        .kanban-col-header { border-top-color: #7B61FF; }
.kcol-inprogress .kanban-col-header { border-top-color: var(--blue); }
.kcol-pending    .kanban-col-header { border-top-color: var(--amber); }
.kcol-overdue    .kanban-col-header { border-top-color: var(--red); }
.kcol-escalated  .kanban-col-header { border-top-color: #9B59B6; }
.kcol-completed  .kanban-col-header { border-top-color: var(--green); }
.kcol-title { font-size: 12px; font-weight: 700; color: var(--t1); display: flex; align-items: center; gap: 8px; }
.kcol-dot { width: 8px; height: 8px; border-radius: 50%; }
.kcol-count {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--t2); font-size: 11px; font-weight: 600;
  border-radius: 6px; padding: 2px 8px;
}

/* ── Task Card (Kanban) ─────────────────────── */
.k-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 14px;
  cursor: pointer; transition: all var(--ease);
  box-shadow: var(--sh-sm); width: 100%; font-family: var(--font); text-align: left;
}
.k-card:hover { box-shadow: var(--sh-md); border-color: var(--border-2); transform: translateY(-1px); }
.k-card.is-overdue { border-left: 3px solid var(--red); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.k-card.is-done    { opacity: 0.75; }
.k-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.k-card-title { font-size: 12px; font-weight: 700; color: var(--t1); line-height: 1.4; flex: 1; }
.k-card-id { font-size: 9px; color: var(--t3); font-weight: 600; margin-bottom: 6px; font-family: var(--mono); }
.k-card-desc { font-size: 11px; color: var(--t2); line-height: 1.5; margin-bottom: 10px; }
.k-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.k-tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
}
.ktag-c  { background: #F0EEFF; color: #4E38A0; }
.ktag-q  { background: var(--blue-light); color: #0F5EA0; }
.ktag-o  { background: var(--green-dim); color: #0A6030; }
.ktag-s  { background: var(--amber-dim); color: #7A4800; }
.ktag-t  { background: #FDE8F3; color: #8B1A5A; }
.ktag-h  { background: #E0F2FE; color: #065080; }
.ktag-g  { background: var(--bg); color: var(--t2); }
.ktag-e  { background: var(--red-dim); color: #8A1818; }
.ktag-r  { background: var(--purple-dim); color: #4E38A0; }
.ktag-m  { background: var(--green-dim); color: #0A5030; }
.k-card-footer { display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
.k-priority { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.kp-c{background:var(--red)} .kp-h{background:var(--amber)} .kp-m{background:var(--blue)} .kp-l{background:var(--green)}
.k-progress { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.k-prog-fill { height: 100%; border-radius: 2px; background: var(--blue); }
.k-prog-fill.pw { background: var(--amber); }
.k-prog-fill.pd { background: var(--red); }
.k-prog-fill.pg { background: var(--green); }
.k-time { font-size: 10px; font-weight: 600; white-space: nowrap; }
.kt-ok     { color: var(--green); }
.kt-warn   { color: var(--amber); }
.kt-danger { color: var(--red); }
.k-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.k-plus-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--bg); border: 1.5px dashed var(--border-2);
  color: var(--t3); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 2px auto 0; cursor: pointer; transition: all var(--ease);
}
.k-plus-btn:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.k-empty {
  background: var(--bg); border: 1.5px dashed var(--border-2);
  border-radius: var(--r-lg); padding: 18px;
  text-align: center; color: var(--t3); font-size: 11px; font-weight: 500;
}

/* ── Forms ──────────────────────────────────── */
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; box-shadow: var(--sh-sm); margin-bottom: 14px; }
.form-section-title { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: var(--r-md);
  font-size: 13px; color: var(--t1); background: var(--card);
  transition: border-color var(--ease), box-shadow var(--ease); outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(24,119,197,0.12);
}
.form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.req { color: var(--red); }

/* ── Tables ─────────────────────────────────── */
.table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-sm); overflow: hidden; }
.table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.table-filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-select {
  padding: 7px 12px; border: 1px solid var(--border);
  border-radius: var(--r-md); font-size: 12px; font-family: var(--font);
  background: var(--bg); color: var(--t1); outline: none; cursor: pointer;
  transition: border-color var(--ease);
}
.filter-select:focus { border-color: var(--blue); }
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 16px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--t3);
  border-bottom: 1px solid var(--border);
  background: var(--bg); white-space: nowrap;
}
.data-table td { padding: 11px 16px; font-size: 12px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #FAFCFF; }
.data-table tr.row-overdue td { background: #FFF5F5; }

/* ── Badges ─────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.2px; white-space: nowrap; }
.badge-blue    { background: var(--blue-light);  color: #0F5EA0; }
.badge-indigo  { background: #E8E6FF; color: #3D2DB0; }
.badge-yellow  { background: #FFFBEB; color: #856C00; }
.badge-green   { background: var(--green-dim);   color: #0A6030; }
.badge-red     { background: var(--red-dim);     color: #8A1818; }
.badge-gray    { background: var(--bg);           color: var(--t2); }
.badge-purple  { background: var(--purple-dim);  color: #4E38A0; }
.badge-orange  { background: var(--amber-dim);   color: #7A4800; }

/* ── Progress ───────────────────────────────── */
.progress-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bar  { flex: 1; background: var(--border); border-radius: 3px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width 0.5s ease; }
.progress-fill.success { background: var(--green); }
.progress-fill.warning { background: var(--amber); }
.progress-fill.danger  { background: var(--red); }
.progress-label { font-size: 11px; color: var(--t2); white-space: nowrap; min-width: 36px; text-align: right; }

/* ── Handover cards ─────────────────────────── */
.handover-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.ho-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px; cursor: pointer;
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.ho-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.ho-card.missing { border-color: var(--red); background: #FFFAFB; }
.ho-card.missing::before { content: 'MISSING'; font-size: 9px; font-weight: 700; color: var(--red); letter-spacing: 1px; margin-bottom: 8px; display: block; }
.shift-chip { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 5px; display: inline-flex; align-items: center; }
.shift-morning   { background: #FEF9C3; color: #7A5F00; }
.shift-afternoon { background: var(--amber-dim); color: #7A4800; }
.shift-evening   { background: var(--purple-dim); color: #4E38A0; }
.shift-night     { background: #F0F0F5; color: #4A4A6A; }
.quality-score { font-size: 22px; font-weight: 800; }

/* ── Training cards ─────────────────────────── */
.training-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
.trn-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px; cursor: pointer;
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.trn-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.trn-card.delayed { border-left: 3px solid var(--red); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.trend-chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
.trend-ahead   { background: var(--green-dim);  color: #0A6030; }
.trend-ontrack { background: var(--blue-light); color: #0F5EA0; }
.trend-behind  { background: var(--amber-dim);  color: #7A4800; }
.trend-atrisk  { background: var(--red-dim);    color: #8A1818; }

/* ── Sales ranks ────────────────────────────── */
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-row {
  display: grid; grid-template-columns: 24px 20px 1fr auto auto;
  align-items: center; gap: 10px;
  padding: 11px 14px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--r-md);
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.rank-row:hover { box-shadow: var(--sh-md); }
.rank-row.r1 { border-left: 3px solid #F4A523; background: #FFFCF0; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-row.r2 { border-left: 3px solid #9DAEC2; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-row.r3 { border-left: 3px solid #CD7C2F; background: #FFF9F5; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-pos  { font-size: 12px; font-weight: 800; color: var(--t3); text-align: center; }
.rank-medal { font-size: 14px; text-align: center; }
.rank-name { font-size: 12px; font-weight: 600; color: var(--t1); }
.rank-team { font-size: 10px; color: var(--t3); }
.rank-amount { font-size: 12px; font-weight: 700; text-align: right; white-space: nowrap; }
.rank-pct  { font-size: 11px; font-weight: 700; text-align: right; white-space: nowrap; }

/* ── Toast ──────────────────────────────────── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  display: flex; align-items: center; gap: 10px;
  background: var(--navy-2); color: #fff;
  border-radius: var(--r-lg); padding: 12px 16px;
  box-shadow: var(--sh-lg); min-width: 260px; max-width: 380px;
  border-left: 3px solid var(--blue);
  animation: slideUp 0.3s ease; opacity: 1; transition: opacity 0.3s;
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; }
.toast span { font-size: 12px; flex: 1; }
.toast.success { border-left-color: var(--green); }
.toast.success svg { stroke: var(--green); }
.toast.error   { border-left-color: var(--red); }
.toast.error svg { stroke: var(--red); }
.toast.warning { border-left-color: var(--amber); }
.toast.warning svg { stroke: var(--amber); }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Modal ──────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(6,15,36,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(3px); animation: fadeIn 0.2s ease; }
.modal { background: var(--card); border-radius: var(--r-xl); box-shadow: var(--sh-lg); width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid var(--border); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title  { font-size: 15px; font-weight: 700; color: var(--t1); }
.modal-close  { background: var(--bg); border: none; width: 28px; height: 28px; border-radius: var(--r-sm); cursor: pointer; font-size: 16px; color: var(--t2); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); }
.modal-body   { padding: 20px 22px; overflow-y: auto; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Skeleton loader ────────────────────────── */
.skeleton-wrap { padding: 14px; }
.skeleton-row { height: 48px; background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: var(--r-md); margin-bottom: 10px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Empty state ────────────────────────────── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; color: var(--t3); text-align: center; gap: 12px; }
.empty-state svg { width: 40px; height: 40px; stroke: var(--t4); }
.empty-state-title { font-size: 14px; font-weight: 600; color: var(--t2); }
.empty-state-sub   { font-size: 12px; }

/* ── Notification drawer ────────────────────── */
.notif-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 340px;
  background: var(--card); box-shadow: var(--sh-lg);
  z-index: 500; display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  transform: translateX(0); transition: transform var(--ease);
}
.notif-drawer.hidden { transform: translateX(100%); }
.notif-drawer-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.notif-drawer-header h3 { font-size: 14px; font-weight: 700; flex: 1; color: var(--t1); }
.notif-drawer-header button { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 10px; font-size: 11px; color: var(--t2); cursor: pointer; font-family: var(--font); }
.notif-list { flex: 1; overflow-y: auto; }
.notif-list .notif-item { padding: 12px 18px; cursor: pointer; transition: background var(--ease); }
.notif-list .notif-item.unread { background: #F5F9FF; }
.notif-list .notif-item:hover { background: var(--bg); }
.notif-unread-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 5px; }

/* ── Login page ─────────────────────────────── */
.login-page { background: var(--navy); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: var(--card); border-radius: var(--r-xl); padding: 40px; width: 400px; max-width: 100%; box-shadow: var(--sh-lg); }
.login-logo { margin-bottom: 32px; }
.login-logomark { width: 48px; height: 48px; background: var(--blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-bottom: 14px; }
.login-heading { font-size: 20px; font-weight: 800; color: var(--t1); letter-spacing: -0.5px; }
.login-sub { font-size: 12px; color: var(--t3); margin-top: 4px; }
.form-error { background: var(--red-dim); color: #8A1818; border-radius: var(--r-md); padding: 10px 12px; font-size: 12px; margin-top: 10px; }
.login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--t3); }

/* ── Utility ────────────────────────────────── */
.hidden { display: none !important; }
.mono   { font-family: var(--mono); }
.t-muted   { color: var(--t3); }
.t-danger  { color: var(--red); }
.t-success { color: var(--green); }
.t-warning { color: var(--amber); }
.t-blue    { color: var(--blue); }
.fw-700    { font-weight: 700; }
.flex      { display: flex; }
.flex-center  { display: flex; align-items: center; justify-content: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.mt-4 { margin-top: 16px; } .mb-4 { margin-bottom: 16px; }
.mb-5 { margin-bottom: 20px; } .p-4 { padding: 16px; }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 1280px) {
  .kpi-grid  { grid-template-columns: repeat(3, 1fr); }
  .bottom-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 1024px) {
  .chart-grid  { grid-template-columns: 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  .kpi-grid    { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex; align-items: center; }
  .main-content { margin-left: 0; }
  .top-bar { padding: 0 16px; }
  .search-bar { display: none; }
  .page-content { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .kanban-wrap { padding-bottom: 70px; }
  .page-content { padding-bottom: 80px; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .kpi-value { font-size: 20px; }
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script>

var GAS_URL='https://script.google.com/macros/s/AKfycbzgCYbHCXZ4pZJ-hGcexuE5ei_i9u3cvx0FUZ6oBwzzZKHgqO5YE7HIFc5bu9d2xUhWfw/exec';
var SES_KEY='kib_ops_session';
var API={
  _s:function(){try{return JSON.parse(localStorage.getItem(SES_KEY));}catch(e){return null;}},
  _t:function(){var s=this._s();return s?s.session_token:null;},
  get:async function(action,params){
    var url=new URL(GAS_URL);url.searchParams.set('action',action);
    var t=this._t();if(t)url.searchParams.set('session_token',t);
    Object.keys(params||{}).forEach(function(k){if(params[k]!=null&&params[k]!=='')url.searchParams.set(k,params[k]);});
    var r=await fetch(url.toString(),{redirect:'follow'});
    var d=await r.json();if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:'API error');return d.data;
  },
  post:async function(action,body){
    var p=Object.assign({},body||{},{action:action});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)});
    var txt=await r.text();var d;try{d=JSON.parse(txt);}catch(e){throw new Error('Invalid response');}
    if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:'API error');return d.data;
  }
};
var AUTH={
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/cc.task.mane/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/cc.task.mane/login.html';},
  hasRole:function(r){var s=this.getSession();if(!s)return false;return Array.isArray(r)?r.indexOf(s.role)!==-1:s.role===r;},
  canDo:function(a){var s=this.getSession();if(!s)return false;var m={'tasks.create':['HoD','Manager'],'handover.create':['HoD','Manager','TL','AL'],'training.create':['HoD','Manager'],'sales.entry':['HoD','Manager','TL','AL'],'settings.edit':['HoD']};return m[a]?m[a].indexOf(s.role)!==-1:true;},
  getUserId:function(){var s=this.getSession();return s?s.user_id:null;},
  getRole:function(){var s=this.getSession();return s?s.role:'';}
};
var UTILS={
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  fdt:function(iso){if(!iso)return'—';try{var d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return String(iso).slice(0,16);}},
  fd:function(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return String(iso).slice(0,10);}},
  today:function(){return new Date(Date.now()+3*3600000).toISOString().slice(0,10);},
  tr:function(iso){if(!iso)return{label:'—',overdue:false,diffMs:0};var diff=new Date(iso)-Date.now(),abs=Math.abs(diff);var label=abs<3600000?Math.floor(abs/60000)+'m':abs<86400000?Math.floor(abs/3600000)+'h':Math.floor(abs/86400000)+'d';return{label:diff<0?label+' over':label+' left',overdue:diff<0,diffMs:diff};},
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  _avc:[['#dbeafe','#1d4ed8'],['#ede9fe','#6d28d9'],['#dcfce7','#15803d'],['#ffedd5','#c2410c'],['#fce7f3','#be185d'],['#ccfbf1','#0f766e']],
  avc:function(n){var h=0,s=String(n||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return this._avc[h%this._avc.length];},
  av:function(n,sz){sz=sz||28;var c=this.avc(n);return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c[0]+';color:'+c[1]+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.38)+'px;font-weight:700;flex-shrink:0">'+this.ini(n)+'</div>';},
  toast:function(msg,type){var c={success:'#0EA472',error:'#E5383B',warning:'#F4A523',info:'#1877C5'};var t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:340px;font-family:inherit';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);},
  empty:function(id,title,sub){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:#8A9BB0;text-align:center;gap:8px"><svg width="36" height="36" fill="none" stroke="#B8C5D4" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg><div style="font-size:13px;font-weight:600;color:#4A5568">'+(title||'No data')+'</div>'+(sub?'<div style="font-size:11px">'+sub+'</div>':'')+'</div>';},
  loader:function(id){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="padding:20px;display:flex;flex-direction:column;gap:10px"><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div></div>';},
  setUser:function(s){if(!s)return;var i=document.getElementById('avatarInitials'),n=document.getElementById('sidebarName'),r=document.getElementById('sidebarRole');if(i)i.textContent=this.ini(s.full_name);if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];if(r)r.textContent=s.role;document.querySelectorAll('[data-roles]').forEach(function(el){var roles=el.getAttribute('data-roles').split(',').map(function(r){return r.trim();});if(roles.indexOf(s.role)===-1)el.style.display='none';});},
  sidebar:function(){var btn=document.getElementById('sidebarToggle'),sb=document.getElementById('sidebar');if(btn&&sb)btn.addEventListener('click',function(){sb.classList.toggle('open');});}
};


AUTH.requireAuth();
UTILS.setUser(AUTH.getSession());
UTILS.sidebar();
async function loadBell(){
  try{var d=await API.get('notif_list',{limit:'5',unread_only:'true'});var nb=document.getElementById('notifBadge');if(nb){if(d.unread_count>0){nb.textContent=d.unread_count;nb.classList.remove('hidden');}else{nb.classList.add('hidden');}}}catch(e){}
}
loadBell();setInterval(loadBell,60000);

if(AUTH.canDo('tasks.create'))document.getElementById('btnNew').style.display='flex';
var COLS=[
  {id:'new',label:'New',s:['New'],c:'#7B61FF'},
  {id:'ip',label:'In Progress',s:['Assigned','InProgress','WaitingInput','UnderReview'],c:'#1877C5'},
  {id:'pend',label:'Pending',s:['Pending'],c:'#F4A523'},
  {id:'ov',label:'Overdue',s:['Overdue'],c:'#E5383B'},
  {id:'esc',label:'Escalated',s:['Escalated'],c:'#9B59B6'},
  {id:'done',label:'Completed',s:['Completed'],c:'#0EA472'}
];
var TC={Compliance:'ktag-c',QA:'ktag-q',Operational:'ktag-o',BackOffice:'ktag-m',TeamLeadership:'ktag-m',AssistantLeadership:'ktag-m',Managerial:'ktag-m',Sales:'ktag-s',Training:'ktag-t',Coaching:'ktag-t',Handover:'ktag-h',Escalation:'ktag-e',FollowUp:'ktag-g',General:'ktag-g'};
function kcard(t){
  var ov=t.is_overdue==='TRUE'&&t.status!=='Completed';
  var pct=Math.min(100,Number(t.progress_percentage)||0);
  var c=UTILS.avc(t.assigned_to_name);
  var tr=UTILS.tr(t.due_datetime);
  var tl=TC[t.category]||'ktag-g';
  var pd={Critical:'kp-c',High:'kp-h',Medium:'kp-m',Low:'kp-l'}[t.priority]||'kp-m';
  var pf=t.status==='Completed'?'pg':t.is_overdue==='TRUE'?'pd':pct>70?'pw':'';
  var tl2=t.status==='Completed'?'<span class="k-time kt-ok">Done ✓</span>':tr.overdue?'<span class="k-time kt-danger">'+tr.label+'</span>':tr.diffMs<7200000?'<span class="k-time kt-warn">'+tr.label+'</span>':'<span class="k-time kt-ok">'+tr.label+'</span>';
  var delegateBadge = t.delegated_flag==='TRUE' ? '<span class="k-tag" style="background:#FEF3C7;color:#92400E;font-size:9px">🔀 from '+UTILS.esc(t.delegated_from_name||'')+'</span>' : '';
  return '<button class="k-card'+(ov?' is-overdue':'')+(t.status==='Completed'?' is-done':'')+'" onclick="openTaskModal(\''+t.task_id+'\')">'
    +'<div class="k-card-id">'+t.task_id+'</div>'
    +'<div class="k-card-top"><div class="k-card-title">'+UTILS.esc(t.title)+'</div><div class="k-avatar" style="background:'+c[0]+';color:'+c[1]+'">'+UTILS.ini(t.assigned_to_name)+'</div></div>'
    +'<div class="k-card-tags"><span class="k-tag '+tl+'">'+t.category+'</span>'+(t.recurring_flag==='TRUE'?'<span class="k-tag ktag-r">↺</span>':'')+delegateBadge+'</div>'
    +'<div class="k-card-footer"><div class="k-priority '+pd+'"></div><div class="k-progress"><div class="k-prog-fill '+pf+'" style="width:'+pct+'%"></div></div>'+tl2+'</div></button>';
}
function renderBoard(tasks){
  document.getElementById('kT').textContent=tasks.length;
  var o=tasks.filter(function(t){return!['Completed','Cancelled'].includes(t.status)}).length;
  var x=tasks.filter(function(t){return t.is_overdue==='TRUE'}).length;
  var cc=tasks.filter(function(t){return t.status==='Completed'}).length;
  document.getElementById('kO').textContent=o;
  document.getElementById('kX').textContent=x;
  document.getElementById('kC').textContent=cc;
  document.getElementById('kR').textContent=(tasks.length>0?Math.round(cc/tasks.length*100):0)+'%';
  document.getElementById('board').innerHTML=COLS.map(function(col){
    var mine=tasks.filter(function(t){return col.s.includes(t.status)});
    var show=col.id==='done'?mine.slice(0,4):mine;
    var cards=show.length?show.map(kcard).join(''):'<div class="k-empty">No '+col.label.toLowerCase()+' tasks</div>';
    var plus=AUTH.canDo('tasks.create')?'<button class="k-plus-btn" onclick="location.href=\'/cc.task.mane/task-form.html\'">+</button>':'';
    return '<div class="kanban-col kcol-'+col.id+'"><div class="kanban-col-header"><span class="kcol-title"><div class="kcol-dot" style="background:'+col.c+'"></div>'+col.label+'</span><span class="kcol-count">'+mine.length+'</span></div>'+cards+plus+'</div>';
  }).join('');
}
var allT=[],curF='all';
async function loadT(){
  document.getElementById('board').innerHTML='<div style="padding:32px;color:var(--t3)">Loading...</div>';
  try{
    var p={limit:'200'};
    if(curF==='mine')p.assigned_to=AUTH.getUserId();
    if(curF==='overdue')p.status='Overdue';
    var d=await API.get('tasks_list',p);
    allT=d.tasks||[];
    renderBoard(allT);
  }catch(ex){document.getElementById('board').innerHTML='<div style="padding:32px;color:var(--t3)">Could not load: '+UTILS.esc(ex.message)+'</div>';}
}
function sf(f,btn){curF=f;['fa','fm','fo'].forEach(function(id){var b=document.getElementById(id);b.className='btn btn-secondary';});btn.className='btn btn-primary';loadT();}
if(document.getElementById('srch'))document.getElementById('srch').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase();
  renderBoard(q?allT.filter(function(t){return(t.title||'').toLowerCase().includes(q)||(t.assigned_to_name||'').toLowerCase().includes(q);}):allT);
});

// ── TASK MODAL ─────────────────────────────────────────────
var currentTask = null;

function openTaskModal(taskId) {
  var m = document.getElementById('taskModal');
  m.style.display = 'flex';
  document.getElementById('taskModalBody').innerHTML = '<div style="padding:60px;text-align:center;color:#94A3B8"><div style="width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#1A4A7A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>Loading...</div>';
  API.get('tasks_detail', {task_id: taskId}).then(function(d) {
    currentTask = d;
    renderTaskModal(d);
  }).catch(function(ex) {
    document.getElementById('taskModalBody').innerHTML = '<div style="padding:40px;text-align:center;color:#EF4444">Error: ' + UTILS.esc(ex.message) + '</div>';
  });
}

function closeTaskModal() {
  document.getElementById('taskModal').style.display = 'none';
  currentTask = null;
  loadT(); // refresh board
}

function renderTaskModal(d) {
  var t = d.task;
  var comments = d.comments || [];
  var activity = d.activity || [];
  var tr = UTILS.tr(t.due_datetime);
  var isA = t.assigned_to_user_id === AUTH.getUserId();
  var isM = AUTH.hasRole(['HoD','CC Manager','Manager']);
  var canAct = (isA || isM) && t.status !== 'Completed' && t.status !== 'Cancelled';

  var statusColors = {
    'New':'#6366F1','InProgress':'#3B82F6','Completed':'#10B981',
    'Blocked':'#EF4444','Escalated':'#F59E0B','Cancelled':'#94A3B8'
  };
  var statusBgs = {
    'New':'#EEF2FF','InProgress':'#EFF6FF','Completed':'#ECFDF5',
    'Blocked':'#FEF2F2','Escalated':'#FFFBEB','Cancelled':'#F8FAFC'
  };
  var priColors = {Critical:'#EF4444',High:'#F59E0B',Medium:'#3B82F6',Low:'#10B981'};
  var sc = statusColors[t.status] || '#94A3B8';
  var sb = statusBgs[t.status] || '#F8FAFC';
  var pc = priColors[t.priority] || '#94A3B8';
  var pct = Math.min(100, Number(t.progress_percentage) || 0);

  var avatarColors = ['#6366F1','#8B5CF6','#EC4899','#F59E0B','#10B981','#3B82F6','#0EA472','#EF4444'];
  function aColor(name){ return avatarColors[(name||'A').charCodeAt(0) % avatarColors.length]; }
  function avatar(name, size){
    size = size || 36;
    var c = aColor(name);
    var ini = String(name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+c+';display:flex;align-items:center;justify-content:center;font-size:'+(size*0.38|0)+'px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 2px 6px '+c+'44">'+ini+'</div>';
  }

  var html = '';

  // ── HEADER ──────────────────────────────────────────────────────
  html += '<div style="background:linear-gradient(160deg,#0D1F3C 0%,#1E3A6E 60%,#1A4A7A 100%);padding:22px 24px 0;flex-shrink:0">';
  // Top row — priority + status + ID
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">';
  html += '<span style="font-size:10px;font-weight:700;background:'+sb+';color:'+sc+';padding:3px 12px;border-radius:20px">'+t.status+'</span>';
  html += '<span style="font-size:10px;font-weight:700;background:'+pc+'22;color:'+pc+';padding:3px 10px;border-radius:20px">'+t.priority+'</span>';
  if (t.is_overdue === 'TRUE' && t.status !== 'Completed') html += '<span style="font-size:10px;font-weight:700;background:#FEF2F2;color:#EF4444;padding:3px 10px;border-radius:20px">⚠ OVERDUE</span>';
  html += '<span style="font-size:10px;color:rgba(255,255,255,.35);margin-left:auto">'+UTILS.esc(t.task_id)+'</span>';
  html += '</div>';
  // Title + avatar
  html += '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">';
  html += '<div style="flex:1;min-width:0">';
  html += '<div style="font-size:20px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:5px">'+UTILS.esc(t.title)+'</div>';
  html += '<div style="font-size:11px;color:rgba(255,255,255,.4)">'+UTILS.esc(t.category)+'  ·  Assigned by '+UTILS.esc(t.assigned_by_name||'—')+'</div>';
  html += '</div>';
  html += '<div style="flex-shrink:0;text-align:center">';
  html += avatar(t.assigned_to_name, 48);
  html += '<div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:4px;max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+UTILS.esc((t.assigned_to_name||'').split(' ')[0])+'</div>';
  html += '</div></div>';
  // Stats strip
  html += '<div style="display:flex;background:rgba(0,0,0,.15);border-radius:10px 10px 0 0;overflow:hidden;margin:0 -24px">';
  html += '<div style="flex:1;padding:10px 16px;border-right:1px solid rgba(255,255,255,.06)">';
  html += '<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">⏰ Due</div>';
  html += '<div style="font-size:12px;font-weight:700;color:'+(tr.overdue?'#FCA5A5':'rgba(255,255,255,.9)')+'">'+UTILS.fdt(t.due_datetime)+'</div>';
  html += '<div style="font-size:10px;color:rgba(255,255,255,.4)">'+tr.label+'</div>';
  html += '</div>';
  html += '<div style="flex:1;padding:10px 16px;border-right:1px solid rgba(255,255,255,.06)">';
  html += '<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">📋 Category</div>';
  html += '<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.9)">'+UTILS.esc(t.category||'—')+'</div>';
  html += '</div>';
  html += '<div style="flex:1;padding:10px 16px">';
  html += '<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">📊 Progress</div>';
  html += '<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.9)">'+pct+'%</div>';
  html += '</div>';
  html += '</div>';
  // Tabs
  html += '<div style="display:flex;background:rgba(0,0,0,.2);margin:0 -24px">';
  var subtasks   = d.subtasks   || [];
  var extensions = d.extensions || [];
  var assignees  = d.assignees  || [];
  var pendingExt = extensions.find(function(x){ return x.status==='Pending'; });
  var canExtend  = !pendingExt && (isM || t.assigned_to_user_id === AUTH.getUserId());
  var tmTabs = [
    {id:'tmtab-detail',    label:'Details'},
    {id:'tmtab-subtasks',  label:'Sub-tasks', badge: subtasks.length > 0 ? (subtasks.filter(function(s){return s.status==='Completed';}).length+'/'+subtasks.length) : ''},
    {id:'tmtab-comments',  label:'Comments',  badge: comments.length > 0 ? String(comments.length) : ''},
    {id:'tmtab-extension', label:'Extension', badge: pendingExt ? '!' : ''},
    {id:'tmtab-activity',  label:'Activity',  badge: activity.length > 0 ? String(activity.length) : ''}
  ];
  tmTabs.forEach(function(tb, i){
    var active = i === 0;
    html += '<button id="'+tb.id+'" data-tab="'+tb.id+'" onclick="switchTmTab(this.dataset.tab)" style="flex:1;background:none;border:none;border-bottom:'+(active?'2px solid #60A5FA':'2px solid transparent')+';padding:11px 6px 9px;font-size:12px;font-weight:'+(active?'700':'500')+';color:'+(active?'#fff':'rgba(255,255,255,.45)')+';cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s">';
    html += tb.label;
    if(tb.badge) html += ' <span style="background:rgba(255,255,255,.18);color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:3px">'+tb.badge+'</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '</div>'; // end header

  // ── PANELS ──────────────────────────────────────────────────────
  html += '<div style="padding:20px 22px 24px;min-height:200px">';

  // DETAIL PANEL
  html += '<div id="tmpanel-detail">';
  if (t.description) {
    html += '<div style="background:#EFF6FF;border-left:3px solid #3B82F6;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#1E3A5F;line-height:1.6">'+UTILS.esc(t.description)+'</div>';
  }
  // Progress bar
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html += '<div style="flex:1;background:#E2E8F0;border-radius:6px;height:8px;overflow:hidden">';
  html += '<div style="height:100%;border-radius:6px;background:'+(pct>=100?'#10B981':pct>50?'#3B82F6':'#F59E0B')+';width:'+pct+'%;transition:width .5s"></div>';
  html += '</div>';
  html += '<span style="font-size:12px;font-weight:700;color:'+(pct>=100?'#059669':'#64748B')+'">'+pct+'%</span>';
  html += '</div>';
  // Meta grid
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  html += '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:12px">';
  html += '<div style="font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Assigned To</div>';
  html += '<div style="display:flex;align-items:center;gap:8px">'+avatar(t.assigned_to_name,28)+'<span style="font-weight:600;font-size:13px;color:#0F172A">'+UTILS.esc(t.assigned_to_name||'—')+'</span></div>';
  html += '</div>';
  html += '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:12px">';
  html += '<div style="font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Assigned By</div>';
  html += '<div style="display:flex;align-items:center;gap:8px">'+avatar(t.assigned_by_name,28)+'<span style="font-weight:600;font-size:13px;color:#0F172A">'+UTILS.esc(t.assigned_by_name||'—')+'</span></div>';
  html += '</div>';
  html += '</div>';
  // SLA
  if(t.sla_value) {
    html += '<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#92400E">⏱ SLA: <b>'+UTILS.esc(t.sla_value+' '+t.sla_unit)+'</b></div>';
  }
  // Action buttons
  if (canAct) {
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid #F1F5F9;padding-top:16px">';
    if(t.status === 'New'||t.status === 'Assigned') html += '<button data-s="InProgress" onclick="updateTask(this.dataset.s)" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">▶ Start</button>';
    html += '<button data-s="Completed" onclick="updateTask(this.dataset.s)" style="background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">✓ Complete</button>';
    if(isM) html += '<button data-s="Escalated" onclick="updateTask(this.dataset.s)" style="background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">⚡ Escalate</button>';
    if(isM) html += '<button onclick="confirmCancel()" style="background:#FEF2F2;border:1.5px solid #FECACA;color:#EF4444;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer">✕ Cancel Task</button>';
    html += '</div>';
  }
  html += '</div>';

  // COMMENTS PANEL
  html += '<div id="tmpanel-comments" style="display:none">';
  if(comments.length === 0){
    html += '<div style="text-align:center;padding:36px 0 20px">';
    html += '<div style="width:52px;height:52px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px">💬</div>';
    html += '<div style="font-size:13px;font-weight:600;color:#64748B">No comments yet</div>';
    html += '</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:12px;max-height:260px;overflow-y:auto;margin-bottom:16px;padding-right:4px">';
    comments.forEach(function(c){
      var ac = aColor(c.author_name);
      var isMgr = c.is_manager_note === 'TRUE';
      html += '<div style="display:flex;gap:10px">';
      html += '<div style="width:36px;height:36px;border-radius:50%;background:'+ac+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:800;color:#fff">'+UTILS.ini(c.author_name)+'</div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="background:'+(isMgr?'#EFF6FF':'#F8FAFC')+';border:1px solid '+(isMgr?'#BFDBFE':'#E2E8F0')+';border-radius:4px 14px 14px 14px;padding:11px 14px">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:5px">';
      html += '<span style="font-size:12px;font-weight:700;color:#0F172A">'+UTILS.esc(c.author_name)+(isMgr?' <span style="font-size:9px;background:#BFDBFE;color:#1E40AF;padding:1px 6px;border-radius:10px">Manager</span>':'')+'</span>';
      html += '<span style="font-size:10px;color:#94A3B8">'+UTILS.fdt(c.created_datetime)+'</span>';
      html += '</div>';
      html += '<div style="font-size:13px;color:#334155;line-height:1.5;white-space:pre-wrap">'+UTILS.esc(c.comment_text)+'</div>';
      html += '</div></div></div>';
    });
    html += '</div>';
  }
  // Composer
  var myAc = aColor(AUTH.getSession()&&AUTH.getSession().full_name||'?');
  html += '<div style="display:flex;gap:10px;align-items:flex-end;padding-top:14px;border-top:1px solid #F1F5F9">';
  html += '<div style="width:36px;height:36px;border-radius:50%;background:'+myAc+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:800;color:#fff">'+UTILS.ini((AUTH.getSession()&&AUTH.getSession().full_name)||'?')+'</div>';
  html += '<textarea id="tmCmt" rows="2" placeholder="Write a comment..." style="flex:1;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:12px;font-size:13px;font-family:inherit;resize:none;box-sizing:border-box;background:#F8FAFC;outline:none;min-width:0"></textarea>';
  html += '<button onclick="addTaskComment()" style="background:linear-gradient(135deg,#1E3A6E,#1A4A7A);color:#fff;border:none;border-radius:12px;padding:11px 20px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Send</button>';
  html += '</div>';
  html += '</div>';

  // ACTIVITY PANEL
  html += '<div id="tmpanel-activity" style="display:none">';
  if(activity.length === 0){
    html += '<div style="text-align:center;padding:36px 0;color:#94A3B8;font-size:13px">No activity yet</div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:0;max-height:320px;overflow-y:auto">';
    activity.forEach(function(a, idx){
      html += '<div style="display:flex;gap:12px;padding:10px 0;'+(idx>0?'border-top:1px solid #F1F5F9':'')+'">';
      html += '<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px">';
      html += '<div style="width:8px;height:8px;border-radius:50%;background:#3B82F6;margin-top:4px"></div>';
      if(idx < activity.length-1) html += '<div style="width:1px;flex:1;background:#E2E8F0;margin-top:4px"></div>';
      html += '</div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:12px;font-weight:600;color:#0F172A">'+UTILS.esc(a.performed_by_name||'System')+'</div>';
      html += '<div style="font-size:12px;color:#64748B;margin-top:2px">'+UTILS.esc(a.action_description||a.action||'')+'</div>';
      html += '<div style="font-size:10px;color:#94A3B8;margin-top:3px">'+UTILS.fdt(a.performed_datetime||a.created_datetime||'')+'</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }
  html += '</div>';


  // SUB-TASKS PANEL
  html += '<div id="tmpanel-subtasks" style="display:none">';
  if(subtasks.length === 0){
    html += '<div style="text-align:center;padding:32px 0"><div style="font-size:36px;margin-bottom:8px">✅</div><div style="font-size:13px;font-weight:600;color:#64748B">No sub-tasks</div><div style="font-size:12px;color:#94A3B8;margin-top:4px">Add sub-tasks when creating the task</div></div>';
  } else {
    var stDone = subtasks.filter(function(s){return s.status==='Completed';}).length;
    var stPct  = Math.round(stDone/subtasks.length*100);
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">';
    html += '<div style="flex:1;background:#E2E8F0;border-radius:6px;height:8px;overflow:hidden"><div style="height:100%;border-radius:6px;background:'+(stPct>=100?'#10B981':'#3B82F6')+';width:'+stPct+'%;transition:width .5s"></div></div>';
    html += '<span style="font-size:12px;font-weight:700;color:'+(stPct>=100?'#059669':'#64748B')+'">'+stDone+'/'+subtasks.length+'</span>';
    html += '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px">';
    subtasks.forEach(function(st){
      var done = st.status === 'Completed';
      html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:'+(done?'#F0FDF4':'#F8FAFC')+';border:1.5px solid '+(done?'#A7F3D0':'#E2E8F0')+';border-radius:10px">';
      html += '<div style="width:22px;height:22px;border-radius:50%;background:'+(done?'#10B981':'#E2E8F0')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">';
      if(done) html += '<svg width=11 height=11 fill=none stroke=#fff stroke-width=2.5 viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
      html += '</div>';
      html += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#0F172A">'+UTILS.esc(st.title)+'</div>';
      if(done && st.marked_by_name) html += '<div style="font-size:10px;color:#059669;font-weight:600;margin-top:1px">✓ by '+UTILS.esc(st.marked_by_name)+(st.marked_datetime?' · '+st.marked_datetime.slice(0,10):'')+'</div>';
      html += '</div>';
      if(canAct||isM){
        if(!done){
          html += '<button data-sid="'+st.subtask_id+'" onclick="markSubtask(this.dataset.sid,true)" style="background:#10B981;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">✓ Done</button>';
        } else {
          html += '<button data-sid="'+st.subtask_id+'" onclick="markSubtask(this.dataset.sid,false)" style="background:#fff;color:#94A3B8;border:1.5px solid #E2E8F0;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;flex-shrink:0">↩</button>';
        }
      } else {
        html += '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;'+(done?'background:#D1FAE5;color:#065F46':'background:#FEF3C7;color:#92400E')+'">'+(done?'Done':'Pending')+'</span>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  // Delegate section inside sub-tasks panel
  if(isM||t.assigned_to_user_id===AUTH.getUserId()){
    html += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid #F1F5F9">';
    html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">🔀 Delegate Task</div>';
    if(t.delegated_flag==='TRUE'){
      html += '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400E">🔀 Delegated from <b>'+UTILS.esc(t.delegated_from_name||'')+'</b></div>';
    }
    html += '<div style="display:flex;gap:8px">';
    html += '<select id="delegateSelect" style="flex:1;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;background:#F8FAFC"><option value="">Select staff to delegate to...</option></select>';
    html += '<button onclick="delegateTask()" style="background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Delegate</button>';
    html += '</div>';
    html += '<input type="text" id="delegateReason" placeholder="Reason (optional)..." style="width:100%;margin-top:8px;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;background:#F8FAFC">';
    html += '</div>';
  }
  html += '</div>'; // end subtasks panel

  // EXTENSION PANEL
  html += '<div id="tmpanel-extension" style="display:none">';
  if(pendingExt && isM){
    html += '<div style="background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:1.5px solid #FDE68A;border-radius:14px;padding:18px;margin-bottom:14px">';
    html += '<div style="font-size:13px;font-weight:700;color:#92400E;margin-bottom:10px">⏳ Pending from '+UTILS.esc(pendingExt.requested_by_name)+'</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
    html += '<div style="background:#fff;border-radius:10px;padding:12px"><div style="font-size:10px;color:#92400E;font-weight:700;text-transform:uppercase;margin-bottom:4px">Current</div><div style="font-size:14px;font-weight:800;color:#0F172A">'+UTILS.fdt(pendingExt.current_due)+'</div></div>';
    html += '<div style="background:#EFF6FF;border-radius:10px;padding:12px"><div style="font-size:10px;color:#1E40AF;font-weight:700;text-transform:uppercase;margin-bottom:4px">Requested</div><div style="font-size:14px;font-weight:800;color:#1E40AF">'+UTILS.esc(pendingExt.requested_due)+'</div></div>';
    html += '</div>';
    html += '<div style="background:#fff;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#334155"><b>Reason:</b> '+UTILS.esc(pendingExt.reason)+'</div>';
    html += '<input type="text" id="extReviewNote" placeholder="Review note (optional)..." style="width:100%;padding:9px 12px;border:1.5px solid #FDE68A;border-radius:10px;font-size:12px;font-family:inherit;box-sizing:border-box;margin-bottom:12px;background:#fff">';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
    html += '<button data-extid="'+pendingExt.ext_id+'" data-dec="Approved" onclick="reviewTaskExt(this)" style="background:linear-gradient(135deg,#10B981,#059669);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">✅ Approve</button>';
    html += '<button data-extid="'+pendingExt.ext_id+'" data-dec="Rejected" onclick="reviewTaskExt(this)" style="background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">❌ Reject</button>';
    html += '</div></div>';
  }
  if(pendingExt && !isM){
    html += '<div style="background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:12px;padding:16px;margin-bottom:14px;font-size:13px;color:#1E40AF">⏳ Extension request to <b>'+UTILS.esc(pendingExt.requested_due)+'</b> is pending approval.</div>';
  }
  if(canExtend){
    html += '<div id="tmExtForm" style="display:none;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:14px;padding:18px;margin-bottom:12px">';
    html += '<div style="font-size:13px;font-weight:700;color:#0F172A;margin-bottom:12px">⏰ Request Deadline Extension</div>';
    html += '<div style="background:#EFF6FF;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#334155">Current due: <b style="color:#0F172A">'+UTILS.fdt(t.due_datetime)+'</b></div>';
    html += '<label style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">New Due Date *</label>';
    html += '<input type="date" id="tmExtDate" style="width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;margin-bottom:12px;background:#fff">';
    html += '<label style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Reason *</label>';
    html += '<textarea id="tmExtReason" rows="3" placeholder="Why is the extension needed?" style="width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:inherit;resize:none;box-sizing:border-box;margin-bottom:12px;background:#fff"></textarea>';
    html += '<div style="display:flex;gap:8px">';
    html += '<button onclick="submitTaskExt()" style="background:linear-gradient(135deg,#1E3A6E,#1A4A7A);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer">Submit Request</button>';
    html += '<button onclick="document.getElementById(\'tmExtForm\').style.display=\'none\';" style="background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;color:#64748B">Cancel</button>';
    html += '</div></div>';
    html += '<button onclick="document.getElementById(\'tmExtForm\').style.display=\'\';this.style.display=\'none\';" style="width:100%;background:#fff;border:2px dashed #CBD5E1;border-radius:12px;padding:13px;font-size:13px;font-weight:600;color:#64748B;cursor:pointer">⏰ Request Deadline Extension</button>';
  }
  html += '</div>'; // end extension panel

  html += '</div>'; // end panels

  document.getElementById('taskModalBody').innerHTML = html;

  // Populate delegate dropdown after render
  if(document.getElementById('delegateSelect')){
    API.get('agents_reference',{}).then(function(dr){
      var sel = document.getElementById('delegateSelect');
      if(!sel) return;
      (dr.agents||[]).sort(function(a,b){return a.full_name.localeCompare(b.full_name);}).forEach(function(u){
        if(u.user_id === t.assigned_to_user_id) return;
        var o = document.createElement('option');
        o.value = u.user_id; o.textContent = u.full_name+' ('+u.role+')';
        sel.appendChild(o);
      });
    }).catch(function(){});
  }
}

function switchTmTab(activeId) {
  var map = {'tmtab-detail':'tmpanel-detail','tmtab-subtasks':'tmpanel-subtasks','tmtab-comments':'tmpanel-comments','tmtab-extension':'tmpanel-extension','tmtab-activity':'tmpanel-activity'};
  Object.keys(map).forEach(function(tabId){
    var tab = document.getElementById(tabId);
    var panel = document.getElementById(map[tabId]);
    var active = tabId === activeId;
    if(tab){ tab.style.color = active?'#fff':'rgba(255,255,255,.45)'; tab.style.borderBottom = active?'2px solid #60A5FA':'2px solid transparent'; tab.style.fontWeight = active?'700':'500'; }
    if(panel) panel.style.display = active ? '' : 'none';
  });
}

async function updateTask(status) {
  if(!currentTask) return;
  var tid = currentTask.task.task_id;
  var notes = '';
  if(status === 'Completed') notes = prompt('Completion notes (optional):') || '';
  try {
    await API.post('tasks_update', {task_id: tid, status: status, completion_notes: notes});
    UTILS.toast('Task ' + status.toLowerCase(), 'success');
    var fresh = await API.get('tasks_detail', {task_id: tid});
    currentTask = fresh;
    renderTaskModal(fresh);
  } catch(ex) { UTILS.toast('Error: ' + ex.message, 'error'); }
}

async function addTaskComment() {
  if(!currentTask) return;
  var txt = (document.getElementById('tmCmt')||{}).value || '';
  txt = txt.trim();
  if(!txt) { UTILS.toast('Write a comment first', 'error'); return; }
  try {
    await API.post('tasks_comment', {task_id: currentTask.task.task_id, comment_text: txt});
    var fresh = await API.get('tasks_detail', {task_id: currentTask.task.task_id});
    currentTask = fresh;
    renderTaskModal(fresh);
    switchTmTab('tmtab-comments');
  } catch(ex) { UTILS.toast('Error: ' + ex.message, 'error'); }
}

function confirmCancel(){if(confirm("Cancel this task? This cannot be undone."))updateTask("Cancelled");}
async function markSubtask(sid, done) {
  if(!currentTask) return;
  try {
    await API.post('subtask_mark', {subtask_id: sid, status: done ? 'Completed' : 'Pending'});
    var fresh = await API.get('tasks_detail', {task_id: currentTask.task.task_id});
    currentTask = fresh;
    renderTaskModal(fresh);
    switchTmTab('tmtab-subtasks');
  } catch(ex) { UTILS.toast('Error: '+ex.message, 'error'); }
}

async function delegateTask() {
  if(!currentTask) return;
  var sel = document.getElementById('delegateSelect');
  var uid = sel ? sel.value : '';
  if(!uid) { UTILS.toast('Please select a staff member', 'error'); return; }
  var reason = (document.getElementById('delegateReason')||{}).value || '';
  try {
    var d = await API.post('task_delegate', {task_id: currentTask.task.task_id, delegate_to_user_id: uid, reason: reason});
    UTILS.toast('Task delegated to '+d.delegated_to, 'success');
    var fresh = await API.get('tasks_detail', {task_id: currentTask.task.task_id});
    currentTask = fresh;
    renderTaskModal(fresh);
  } catch(ex) { UTILS.toast('Error: '+ex.message, 'error'); }
}

async function submitTaskExt() {
  if(!currentTask) return;
  var date   = (document.getElementById('tmExtDate')||{}).value || '';
  var reason = ((document.getElementById('tmExtReason')||{}).value||'').trim();
  if(!date)   { UTILS.toast('Please select a new due date', 'error'); return; }
  if(!reason) { UTILS.toast('Please enter a reason', 'error'); return; }
  try {
    await API.post('task_ext_request', {task_id: currentTask.task.task_id, requested_due: date, reason: reason});
    UTILS.toast('Extension request submitted', 'success');
    var fresh = await API.get('tasks_detail', {task_id: currentTask.task.task_id});
    currentTask = fresh;
    renderTaskModal(fresh);
    switchTmTab('tmtab-extension');
  } catch(ex) { UTILS.toast('Error: '+ex.message, 'error'); }
}

async function reviewTaskExt(btn) {
  if(!currentTask) return;
  var extId = btn.dataset.extid;
  var dec   = btn.dataset.dec;
  var note  = (document.getElementById('extReviewNote')||{}).value || '';
  if(!confirm((dec==='Approved'?'Approve':'Reject')+' this extension request?')) return;
  try {
    await API.post('task_ext_review', {ext_id: extId, decision: dec, review_notes: note});
    UTILS.toast('Extension '+dec.toLowerCase(), 'success');
    var fresh = await API.get('tasks_detail', {task_id: currentTask.task.task_id});
    currentTask = fresh;
    renderTaskModal(fresh);
  } catch(ex) { UTILS.toast('Error: '+ex.message, 'error'); }
}

// Close modal on backdrop click — deferred so element exists
document.addEventListener('DOMContentLoaded', function(){
  var m = document.getElementById('taskModal');
  if(m) m.addEventListener('click', function(e){ if(e.target===this) closeTaskModal(); });
});
loadT();

</script>

</div>

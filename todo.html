<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To-Do — CC Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#060F24; --navy-2:#0D1B3E; --blue:#1877C5;
  --green:#0EA472; --red:#E5383B; --amber:#F4A523;
  --bg:#F0F4F9; --card:#FFFFFF; --border:#E4EAF3; --border-2:#D0D9E8;
  --t1:#0A1628; --t2:#4A5568; --t3:#8A9BB0;
  --sb:var(--navy); --sb-text:rgba(255,255,255,0.5);
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:18px;
  --sh-sm:0 1px 4px rgba(6,15,36,.06),0 2px 8px rgba(6,15,36,.04);
  --sh-md:0 4px 16px rgba(6,15,36,.1),0 1px 4px rgba(6,15,36,.06);
  --ease:0.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;min-height:100vh;overflow-x:hidden;}

/* Sidebar */
.sidebar{width:220px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform var(--ease);}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-kib{font-size:11px;font-weight:800;background:var(--blue);color:#fff;border-radius:6px;padding:3px 8px;letter-spacing:.5px;display:inline-block;}
.logo-name{font-size:13px;font-weight:700;color:#fff;margin-top:8px;}
.logo-sub{font-size:9px;color:var(--sb-text);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);color:var(--sb-text);font-size:12px;font-weight:500;text-decoration:none;transition:all var(--ease);margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(24,119,197,.25);color:#fff;font-weight:700;}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:#fff;}
.user-role{font-size:10px;color:var(--sb-text);}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--sb-text);margin-left:auto;padding:4px;}
.logout-btn:hover{color:#fff;}
.sidebar-toggle{display:none;}

/* Main */
.main-content{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.breadcrumb{font-size:14px;font-weight:700;color:var(--t1);flex:1;}
.page-content{padding:24px;flex:1;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border-radius:var(--r-lg);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--sh-sm);display:flex;align-items:center;gap:14px;}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stat-val{font-size:24px;font-weight:800;color:var(--t1);line-height:1;}
.stat-label{font-size:11px;color:var(--t3);margin-top:3px;font-weight:600;}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.filter-btn.active{background:var(--navy-2);color:#fff;border-color:var(--navy-2);}
.filter-btn:hover:not(.active){border-color:var(--blue);color:var(--blue);}
.search-wrap{flex:1;max-width:280px;position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;outline:none;background:var(--card);}
.search-wrap input:focus{border-color:var(--blue);}

/* Group headings */
.group-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.group-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* Todo card */
.todo-card{background:var(--card);border-radius:var(--r-lg);border:1.5px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:8px;overflow:hidden;transition:all .2s;cursor:pointer;}
.todo-card:hover{box-shadow:var(--sh-md);border-color:var(--border-2);transform:translateY(-1px);}
.todo-card.done{opacity:.65;}
.todo-card.overdue{border-left:4px solid var(--red);}
.todo-card.due-soon{border-left:4px solid var(--amber);}
.todo-card.done-border{border-left:4px solid var(--green);}
.todo-main{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;}
.todo-check.done-chk{background:var(--green);border-color:var(--green);}
.todo-check:hover:not(.done-chk){border-color:var(--green);background:#ECFDF5;}
.todo-body{flex:1;min-width:0;}
.todo-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px;line-height:1.3;}
.todo-title.done-txt{text-decoration:line-through;color:var(--t3);}
.todo-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.todo-meta-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t3);}
.todo-meta-item svg{flex-shrink:0;}
.meta-red{color:#EF4444;}
.meta-amber{color:#F59E0B;}
.meta-green{color:#10B981;}
.meta-blue{color:#3B82F6;}
.todo-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.pri-dot{width:8px;height:8px;border-radius:50%;}
.status-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.todo-subtasks{padding:0 16px 12px 50px;display:flex;flex-direction:column;gap:4px;}
.sub-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);}
.sub-check{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;}
.sub-check.done-s{background:var(--green);border-color:var(--green);}
.sub-progress{background:#E2E8F0;border-radius:4px;height:4px;flex:1;overflow:hidden;}
.sub-fill{height:100%;border-radius:4px;background:var(--green);}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3);}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* Notif badge */
.notif-bell{position:relative;background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;display:flex;align-items:center;}
.notif-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.notif-badge.hidden{display:none;}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main-content{margin-left:0;}
  .sidebar-toggle{display:flex;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-kib">KIB</div>
    <div class="logo-name">CC Task Manager</div>
    <div class="logo-sub">Kuwait International Bank</div>
  </div>
  <div class="sidebar-nav">

<!-- Main -->
<div class="main-content">
  <header class="top-bar">
    <button class="sidebar-toggle nav-item" id="sidebarToggle" style="width:36px;height:36px;justify-content:center;border:none;background:none;cursor:pointer;color:var(--t2)">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="breadcrumb" id="pageTitle">My To-Do List</div>
    <button class="notif-bell" id="notifBell" onclick="loadBell()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="notif-badge hidden" id="notifBadge"></div>
    </button>
  </header>

  <div class="page-content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:#EFF6FF">📋</div>
        <div><div class="stat-val" id="stTotal">—</div><div class="stat-label">Total Tasks</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FEF2F2">🔴</div>
        <div><div class="stat-val" id="stOverdue" style="color:#EF4444">—</div><div class="stat-label">Overdue</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#FFFBEB">⏰</div>
        <div><div class="stat-val" id="stSoon" style="color:#F59E0B">—</div><div class="stat-label">Due Today</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#ECFDF5">✅</div>
        <div><div class="stat-val" id="stDone" style="color:#10B981">—</div><div class="stat-label">Completed</div></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-btn active" data-f="pending" onclick="setFilter(this)">📌 Pending</button>
      <button class="filter-btn" data-f="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-f="overdue" onclick="setFilter(this)">🔴 Overdue</button>
      <button class="filter-btn" data-f="today" onclick="setFilter(this)">⏰ Today</button>
      <button class="filter-btn" data-f="done" onclick="setFilter(this)">✅ Done</button>
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search tasks..." oninput="applyFilter()">
      </div>
    </div>

    <!-- Task list -->

  </div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzgCYbHCXZ4pZJ-hGcexuE5ei_i9u3cvx0FUZ6oBwzzZKHgqO5YE7HIFc5bu9d2xUhWfw/exec';
var SES_KEY = 'kib_ops_session';

var API = {
  _s:function(){try{return JSON.parse(localStorage.getItem(SES_KEY));}catch(e){return null;}},
  _t:function(){var s=this._s();return s?s.session_token:null;},
  get:async function(action,params){
    var url=new URL(GAS_URL);url.searchParams.set('action',action);
    var t=this._t();if(t)url.searchParams.set('session_token',t);
    Object.keys(params||{}).forEach(function(k){if(params[k]!=null&&params[k]!=='')url.searchParams.set(k,params[k]);});
    var r=await fetch(url.toString(),{redirect:'follow'});
    var d=await r.json();if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:'API error');return d.data;
  },
  post:async function(action,body){
    var p=Object.assign({},body||{},{action:action});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(GAS_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p)});
    var txt=await r.text();var d;try{d=JSON.parse(txt);}catch(e){throw new Error('Invalid response');}
    if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:'API error');return d.data;
  }
};

var AUTH = {
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/cc.task.mane/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/cc.task.mane/login.html';},
  getUserId:function(){var s=this.getSession();return s?s.user_id:null;},
  getRole:function(){var s=this.getSession();return s?s.role:'';}
};

var UTILS = {
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  fdt:function(iso){if(!iso)return'—';try{var d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return String(iso).slice(0,16);}},
  fd:function(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return String(iso).slice(0,10);}},
  toast:function(msg,type){var c={success:'#0EA472',error:'#E5383B',warning:'#F4A523',info:'#1877C5'};var t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:340px;font-family:inherit';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);},
  setUser:function(s){if(!s)return;var i=document.getElementById('avatarInitials'),n=document.getElementById('sidebarName'),r=document.getElementById('sidebarRole');if(i)i.textContent=this.ini(s.full_name);if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];if(r)r.textContent=s.role;},
  sidebar:function(){var btn=document.getElementById('sidebarToggle'),sb=document.getElementById('sidebar');if(btn&&sb)btn.addEventListener('click',function(){sb.classList.toggle('open');});}
};

AUTH.requireAuth();
UTILS.setUser(AUTH.getSession());
UTILS.sidebar();

// Update page title with user's name
var S = AUTH.getSession() || {};
document.getElementById('pageTitle').textContent = (S.display_name || S.full_name || 'My') + "'s To-Do";

async function loadBell(){
  try{var d=await API.get('notif_list',{limit:'5',unread_only:'true'});var nb=document.getElementById('notifBadge');if(nb){if(d.unread_count>0){nb.textContent=d.unread_count;nb.classList.remove('hidden');}else{nb.classList.add('hidden');}}}catch(e){}
}

var allTasks = [];
var currentFilter = 'pending';
var priColors = {Critical:'#EF4444',High:'#F59E0B',Medium:'#3B82F6',Low:'#10B981'};
var statusColors = {
  Assigned:{bg:'#EEF2FF',c:'#4F46E5'},
  InProgress:{bg:'#EFF6FF',c:'#1D4ED8'},
  Completed:{bg:'#ECFDF5',c:'#065F46'},
  Escalated:{bg:'#FFFBEB',c:'#92400E'},
  Blocked:{bg:'#FEF2F2',c:'#991B1B'},
  Cancelled:{bg:'#F8FAFC',c:'#64748B'}
};

function isToday(iso){
  if(!iso) return false;
  var d = new Date(iso), now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}
function isOverdue(iso, status){
  if(!iso || status==='Completed' || status==='Cancelled') return false;
  return new Date(iso) < new Date();
}
function isDueSoon(iso, status){
  if(!iso || status==='Completed' || status==='Cancelled') return false;
  var diff = new Date(iso) - new Date();
  return diff > 0 && diff < 86400000 * 2;
}
function timeLabel(iso, status){
  if(!iso) return '';
  if(status==='Completed') return '';
  var diff = new Date(iso) - Date.now();
  var abs  = Math.abs(diff);
  var label = abs<3600000 ? Math.floor(abs/60000)+'m' : abs<86400000 ? Math.floor(abs/3600000)+'h' : Math.floor(abs/86400000)+'d';
  return diff < 0 ? label+' overdue' : label+' left';
}

async function loadTasks(){
  var list = document.getElementById('todoList');
  list.innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8"><div style="width:36px;height:36px;border:3px solid #E2E8F0;border-top-color:#1A4A7A;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>Loading your tasks...</div>';
  try{
    var d = await API.get('tasks_list', {assigned_to: AUTH.getUserId(), limit:'200'});
    allTasks = (d.tasks || []);
    updateStats();
    applyFilter();
  }catch(ex){
    list.innerHTML = '<div style="padding:40px;text-align:center;color:#EF4444">Could not load: '+UTILS.esc(ex.message)+'</div>';
  }
}

function updateStats(){
  var today = new Date().toDateString();
  document.getElementById('stTotal').textContent   = allTasks.filter(function(t){return t.status!=='Completed'&&t.status!=='Cancelled';}).length;
  document.getElementById('stOverdue').textContent  = allTasks.filter(function(t){return isOverdue(t.due_datetime,t.status);}).length;
  document.getElementById('stSoon').textContent     = allTasks.filter(function(t){return !isOverdue(t.due_datetime,t.status)&&isToday(t.due_datetime)&&t.status!=='Completed';}).length;
  document.getElementById('stDone').textContent     = allTasks.filter(function(t){return t.status==='Completed';}).length;
}

function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  applyFilter();
}

function applyFilter(){
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  var filtered = allTasks.filter(function(t){
    if(q && !(t.title||'').toLowerCase().includes(q) && !(t.assigned_by_name||'').toLowerCase().includes(q) && !(t.category||'').toLowerCase().includes(q)) return false;
    if(currentFilter==='pending')  return t.status!=='Completed'&&t.status!=='Cancelled';
    if(currentFilter==='overdue')  return isOverdue(t.due_datetime,t.status);
    if(currentFilter==='today')    return isToday(t.due_datetime)&&t.status!=='Completed';
    if(currentFilter==='done')     return t.status==='Completed';
    return true;
  });
  renderList(filtered);
}

function renderList(tasks){
  var list = document.getElementById('todoList');
  if(tasks.length===0){
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">'+(currentFilter==='done'?'🎉':'📭')+'</div><div class="empty-title">'+(currentFilter==='done'?'No completed tasks yet':'All clear!')+'</div><div class="empty-sub">'+(currentFilter==='pending'?'You have no pending tasks — great work!':'No tasks match this filter.')+'</div></div>';
    return;
  }

  // Group: overdue → today → upcoming → done
  var overdue  = tasks.filter(function(t){return isOverdue(t.due_datetime,t.status);});
  var today    = tasks.filter(function(t){return !isOverdue(t.due_datetime,t.status)&&isToday(t.due_datetime)&&t.status!=='Completed';});
  var upcoming = tasks.filter(function(t){return !isOverdue(t.due_datetime,t.status)&&!isToday(t.due_datetime)&&t.status!=='Completed'&&t.status!=='Cancelled';});
  var done     = tasks.filter(function(t){return t.status==='Completed'||t.status==='Cancelled';});

  var html = '';
  if(overdue.length)  html += renderGroup('🔴 Overdue', overdue);
  if(today.length)    html += renderGroup('⏰ Due Today', today);
  if(upcoming.length) html += renderGroup('📅 Upcoming', upcoming);
  if(done.length)     html += renderGroup('✅ Completed', done);

  list.innerHTML = html;
}

function renderGroup(label, tasks){
  var html = '<div class="group-title">'+label+'<span style="background:#E2E8F0;color:#64748B;font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;text-transform:none;letter-spacing:0">'+tasks.length+'</span></div>';
  tasks.forEach(function(t){
    html += renderCard(t);
  });
  return html;
}

function renderCard(t){
  var done     = t.status==='Completed';
  var ov       = isOverdue(t.due_datetime, t.status);
  var soon     = isDueSoon(t.due_datetime, t.status);
  var tLabel   = timeLabel(t.due_datetime, t.status);
  var sc       = statusColors[t.status] || {bg:'#F8FAFC',c:'#64748B'};
  var pc       = priColors[t.priority] || '#94A3B8';
  var cardClass = 'todo-card'+(done?' done':'')+(ov?' overdue':soon?' due-soon':done?' done-border':'');

  // Sub-tasks summary
  var subtasksHtml = '';
  var stJson = t.subtasks_json || '[]';
  var subs = [];
  try { subs = JSON.parse(stJson); } catch(e){}
  // If no subtasks_json, show nothing
  if(subs.length > 0){
    var stDone = subs.filter(function(s){return s.status==='Completed';}).length;
    var stPct  = Math.round(stDone/subs.length*100);
    subtasksHtml = '<div class="todo-subtasks">';
    subtasksHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    subtasksHtml += '<div class="sub-progress"><div class="sub-fill" style="width:'+stPct+'%"></div></div>';
    subtasksHtml += '<span style="font-size:10px;color:#64748B;font-weight:600;flex-shrink:0">'+stDone+'/'+subs.length+' done</span>';
    subtasksHtml += '</div>';
    subs.slice(0,3).forEach(function(s){
      subtasksHtml += '<div class="sub-row"><div class="sub-check'+(s.status==='Completed'?' done-s':'')+'"></div>'+UTILS.esc(s.title)+'</div>';
    });
    if(subs.length > 3) subtasksHtml += '<div style="font-size:11px;color:#94A3B8;padding-left:22px">+' + (subs.length-3) + ' more...</div>';
    subtasksHtml += '</div>';
  }

  // Assignees count
  var assignees = [];
  try { assignees = JSON.parse(t.assignees_json||'[]'); } catch(e){}
  var multiAssign = assignees.length > 1 ? '<span style="font-size:10px;background:#EEF2FF;color:#4F46E5;padding:2px 7px;border-radius:10px;font-weight:700">+' + (assignees.length-1) + ' more</span>' : '';

  var delegateFlag = t.delegated_flag==='TRUE' ?
    '<span style="font-size:10px;background:#FEF3C7;color:#92400E;padding:2px 7px;border-radius:10px;font-weight:700">🔀 Delegated</span>' : '';

  var recurFlag = t.recurring_flag==='TRUE' ?
    '<span style="font-size:10px;background:#F0F9FF;color:#0369A1;padding:2px 7px;border-radius:10px;font-weight:700">↺ '+UTILS.esc(t.recurring_type||'Recurring')+'</span>' : '';

  return '<div class="'+cardClass+'" onclick="openTask(\''+t.task_id+'\')">'
    + '<div class="todo-main">'
    // Check circle
    + '<div class="todo-check'+(done?' done-chk':'')+'" onclick="event.stopPropagation();quickDone(\''+t.task_id+'\','+done+')">'
    + (done ? '<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : '')
    + '</div>'
    // Content
    + '<div class="todo-body">'
    + '<div class="todo-title'+(done?' done-txt':'')+'">'+UTILS.esc(t.title)+'</div>'
    + '<div class="todo-meta">'
    // Assigned by
    + '<div class="todo-meta-item"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>From <b>'+UTILS.esc(t.assigned_by_name||'—')+'</b></span></div>'
    // Category
    + '<div class="todo-meta-item"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>'+UTILS.esc(t.category||'—')+'</div>'
    // Due date
    + (t.due_datetime ? '<div class="todo-meta-item '+(ov?'meta-red':soon?'meta-amber':done?'meta-green':'')+'">'
      + '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
      + UTILS.fd(t.due_datetime) + (tLabel ? ' · <b>'+tLabel+'</b>' : '')
      + '</div>' : '')
    // Sub-tasks count
    + (subs.length ? '<div class="todo-meta-item meta-blue"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'+subs.filter(function(s){return s.status==='Completed';}).length+'/'+subs.length+' sub-tasks</div>' : '')
    + multiAssign + delegateFlag + recurFlag
    + '</div>'
    + '</div>'
    // Right side
    + '<div class="todo-right">'
    + '<div class="pri-dot" style="background:'+pc+'" title="'+t.priority+'"></div>'
    + '<span class="status-chip" style="background:'+sc.bg+';color:'+sc.c+'">'+t.status+'</span>'
    + '</div>'
    + '</div>'
    + subtasksHtml
    + '</div>';
}

async function quickDone(taskId, isDone){
  var newStatus = isDone ? 'Assigned' : 'Completed';
  try{
    await API.post('tasks_update', {task_id: taskId, status: newStatus, completion_notes: ''});
    UTILS.toast(isDone ? 'Marked as pending' : '✅ Done!', 'success');
    loadTasks();
  }catch(ex){ UTILS.toast('Error: '+ex.message,'error'); }
}

function openTask(taskId){
  window.location.href = '/cc.task.mane/task-detail.html?id=' + taskId;
}

loadTasks();
loadBell();
</script>

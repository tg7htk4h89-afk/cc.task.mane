<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To-Do — CC Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#060F24;--navy-2:#0D1B3E;--blue:#1877C5;
  --green:#0EA472;--red:#E5383B;--amber:#F4A523;
  --bg:#F0F4F9;--card:#fff;--border:#E4EAF3;--border-2:#CBD5E1;
  --t1:#0A1628;--t2:#4A5568;--t3:#8A9BB0;
  --r-md:10px;--r-lg:14px;--r-xl:18px;
  --sh-sm:0 1px 4px rgba(6,15,36,.06),0 2px 8px rgba(6,15,36,.04);
  --sh-md:0 4px 16px rgba(6,15,36,.1);
  --ease:.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform var(--ease);}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-kib{font-size:11px;font-weight:800;background:var(--blue);color:#fff;border-radius:6px;padding:3px 8px;letter-spacing:.5px;display:inline-block;}
.logo-name{font-size:13px;font-weight:700;color:#fff;margin-top:8px;}
.logo-sub{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);color:rgba(255,255,255,.5);font-size:12px;font-weight:500;text-decoration:none;transition:all var(--ease);margin-bottom:2px;min-height:36px;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(24,119,197,.25);color:#fff;font-weight:700;}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:#fff;}
.user-role{font-size:10px;color:rgba(255,255,255,.4);}
.logout-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);margin-left:auto;padding:4px;border-radius:6px;}
.logout-btn:hover{color:#fff;}
.sidebar-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--t2);}
.main-content{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.breadcrumb{font-size:14px;font-weight:700;color:var(--t1);flex:1;}
.notif-bell{position:relative;background:none;border:none;cursor:pointer;color:var(--t3);padding:6px;display:flex;align-items:center;border-radius:8px;}
.notif-bell:hover{background:#F1F5F9;}
.notif-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.notif-badge.hidden{display:none;}
.page-content{padding:24px;flex:1;max-width:720px;margin:0 auto;width:100%;}

/* HERO */
.todo-hero{background:linear-gradient(135deg,#0D1B3E 0%,#1565A8 100%);border-radius:var(--r-xl);padding:24px 28px;margin-bottom:22px;position:relative;overflow:hidden;display:flex;align-items:center;gap:24px;}
.todo-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);}
.todo-hero::after{content:'';position:absolute;bottom:-60px;right:60px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.03);}
.hero-text{flex:1;z-index:1;}
.hero-greeting{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.hero-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:14px;}
.hero-stats{display:flex;gap:18px;flex-wrap:wrap;}
.hero-stat-val{font-size:20px;font-weight:800;color:#fff;line-height:1;}
.hero-stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.hero-ring{width:76px;height:76px;flex-shrink:0;z-index:1;}

/* ADD CARD */
.add-card{background:var(--card);border-radius:var(--r-xl);border:2px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:18px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.add-card.focused{border-color:var(--blue);box-shadow:0 0 0 4px rgba(24,119,197,.08);}
.add-main{display:flex;align-items:center;gap:14px;padding:16px 20px;}
.add-plus{width:24px;height:24px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.add-card.focused .add-plus{border-color:var(--blue);background:rgba(24,119,197,.1);}
#addInput{flex:1;border:none;outline:none;font-size:15px;font-weight:500;color:var(--t1);font-family:inherit;background:transparent;}
#addInput::placeholder{color:#CBD5E1;}
.add-expand{display:none;padding:0 20px 16px;padding-top:14px;gap:10px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--border);}
.add-card.focused .add-expand{display:flex;}
.add-field{display:flex;align-items:center;gap:6px;background:#F8FAFD;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;flex:1;min-width:130px;}
.add-field:focus-within{border-color:var(--blue);}
.add-field-lbl{font-size:10px;font-weight:700;color:var(--t3);white-space:nowrap;}
.add-field input{border:none;outline:none;font-size:12px;font-family:inherit;color:var(--t2);background:transparent;flex:1;min-width:60px;}
.btn-add{background:linear-gradient(135deg,var(--navy-2),var(--blue));color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-add:disabled{opacity:.5;cursor:not-allowed;}

/* FILTERS */
.filter-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.f-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.f-btn.on{background:var(--navy-2);color:#fff;border-color:var(--navy-2);}
.f-btn:hover:not(.on){border-color:var(--blue);color:var(--blue);}

/* GROUP */
.grp-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.grp-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.grp-cnt{background:#E2E8F0;color:#64748B;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:none;letter-spacing:0;}

/* TODO ITEM */
.todo-item{background:var(--card);border-radius:var(--r-lg);border:1.5px solid var(--border);margin-bottom:8px;display:flex;align-items:flex-start;transition:all .2s;position:relative;overflow:hidden;}
.todo-item:hover{border-color:var(--border-2);box-shadow:var(--sh-sm);}
.todo-item.done{opacity:.55;}
.todo-item.overdue{border-left:3px solid var(--red);}
.todo-item.due-today{border-left:3px solid var(--amber);}
.t-left{padding:15px 12px 15px 16px;display:flex;align-items:flex-start;}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.chk:hover{border-color:var(--green);background:#ECFDF5;transform:scale(1.1);}
.chk.chk-done{background:var(--green);border-color:var(--green);}
.t-body{flex:1;padding:13px 0;}
.t-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:2px;}
.t-title.done-txt{text-decoration:line-through;color:var(--t3);}
.t-note{font-size:12px;color:var(--t3);margin-bottom:5px;line-height:1.4;}
.t-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.t-date{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.d-ok{background:#F0FDF4;color:#166534;}
.d-today{background:#FFFBEB;color:#92400E;}
.d-over{background:#FEF2F2;color:#991B1B;}
.t-right{padding:8px 12px 8px 0;display:flex;align-items:flex-start;gap:2px;flex-shrink:0;}
.act-btn{background:none;border:none;cursor:pointer;width:32px;height:32px;border-radius:8px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.act-btn:hover{background:#F1F5F9;color:var(--t1);}
.act-del:hover{background:#FEF2F2;color:var(--red);}

/* EDIT */
.edit-wrap{flex:1;padding:12px 0;display:flex;flex-direction:column;gap:8px;}
.edit-title{border:none;outline:none;border-bottom:2px solid var(--blue);font-size:14px;font-weight:600;color:var(--t1);font-family:inherit;background:transparent;width:100%;padding-bottom:3px;}
.edit-row{display:flex;gap:8px;flex-wrap:wrap;}
.edit-fld{display:flex;align-items:center;gap:6px;background:#F8FAFD;border:1.5px solid var(--blue);border-radius:8px;padding:5px 10px;}
.edit-fld label{font-size:10px;font-weight:700;color:var(--t3);}
.edit-fld input{border:none;outline:none;font-size:12px;font-family:inherit;color:var(--t2);background:transparent;}
.edit-btns{display:flex;gap:6px;}
.btn-sv{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--t2);}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;}
.empty-icon{font-size:52px;margin-bottom:14px;display:block;}
.empty-title{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--t3);}

/* OVERLAY / MOBILE NAV */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0D1B3E;border-top:1px solid rgba(255,255,255,.1);z-index:200;padding:6px 0 env(safe-area-inset-bottom,6px);flex-direction:row;justify-content:space-around;align-items:center;}
.mbn-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,.5);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:10px;font-weight:600;transition:color .2s;min-width:52px;text-align:center;}
.mbn-item.active,.mbn-item:active{color:#fff;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;display:flex!important;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.35);}
  .sidebar-toggle{display:flex!important;}
  .main-content{margin-left:0;}
  .top-bar{padding:0 14px;}
  .page-content{padding:14px;}
  .mobile-bottom-nav{display:flex!important;}
  .main-content{padding-bottom:70px!important;}
  input,select{font-size:16px!important;}
  .act-btn{opacity:1!important;}
}
@media(max-width:480px){
  .page-content{padding:10px;}
  .todo-hero{flex-direction:column;gap:14px;}
  .hero-ring{display:none;}
  .hero-stats{gap:14px;}
  .add-main{padding:14px 16px;}
  .f-btn{font-size:10px;padding:5px 10px;}
}
</style>
</head>

<div class="main-content">
  <header class="top-bar">
    <button class="sidebar-toggle" id="sidebarToggle" style="touch-action:manipulation"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="breadcrumb" id="pageTitle">My To-Do</div>
    <button class="notif-bell" onclick="loadBell()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="notif-badge hidden" id="notifBadge"></div></button>
  </header>

  <div class="page-content">
    <!-- Hero card -->
    <div class="todo-hero">
      <div class="hero-text">
        <div class="hero-greeting">Personal Checklist</div>
        <div class="hero-title" id="heroTitle">My To-Do List</div>
        <div class="hero-stats" id="heroStats"></div>
      </div>
      <svg class="hero-ring" viewBox="0 0 76 76">
        <circle cx="38" cy="38" r="30" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="7"/>
        <circle cx="38" cy="38" r="30" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5"
          id="ringFill" transform="rotate(-90 38 38)" style="transition:stroke-dashoffset .7s ease"/>
        <text x="38" y="38" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="800" id="ringPct">0%</text>
      </svg>
    </div>

    <!-- Add new -->
    <div class="add-card" id="addCard">
      <div class="add-main">
        <div class="add-plus" id="addPlus">
          <svg width="10" height="10" fill="none" stroke="#94A3B8" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <input id="addInput" type="text" placeholder="What do you need to do?" autocomplete="off" onkeydown="if(event.key==='Enter')addTodo()">
      </div>
      <div class="add-expand" id="addExpand">
        <div class="add-field">
          <span class="add-field-lbl">📅 Due date</span>
          <input id="addDate" type="date">
        </div>
        <div class="add-field" style="flex:2">
          <span class="add-field-lbl">📝 Note</span>
          <input id="addNote" type="text" placeholder="Optional note...">
        </div>
        <button class="btn-add" id="btnAdd" onclick="addTodo()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <button class="f-btn on" data-f="pending" onclick="setF(this)">All Pending</button>
      <button class="f-btn" data-f="today" onclick="setF(this)">📅 Today</button>
      <button class="f-btn" data-f="overdue" onclick="setF(this)">🔴 Overdue</button>
      <button class="f-btn" data-f="done" onclick="setF(this)">✅ Done</button>
      <button class="f-btn" data-f="all" onclick="setF(this)">All</button>
    </div>

    <!-- List -->
    <div id="todoList">

      </div>

  <a href="/cc.task.mane/index.html" class="mbn-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Home</span></a>
  <a href="/cc.task.mane/tasks.html" class="mbn-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tasks</span></a>
  <a href="/cc.task.mane/handover.html" class="mbn-item" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span>Handover</span></a>
  <a href="/cc.task.mane/training.html" class="mbn-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Training</span></a>
  <a href="/cc.task.mane/notifications.html" class="mbn-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>Alerts</span></a>
</nav>

<script>
var API_BASE='https://n8n.kib-cc-wfm.com/webhook';
var SES_KEY='kib_ops_session';
var API={
  _t:function(){var s=AUTH.getSession();return s?s.session_token:null;},
  post:async function(action,body){
    var path=action.replace(/_/g,'-');
    var p=Object.assign({},body||{});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(API_BASE+'/kib/'+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    var txt=await r.text();var d;
    try{d=JSON.parse(txt);}catch(e){throw new Error('Server '+r.status+': '+(txt||'empty').slice(0,100));}
    if(!d.success)throw new Error(d.message||'API error');
    return d.data;
  },
  get:async function(a,p){return this.post(a,p||{});}
};
var AUTH={
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/cc.task.mane/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/cc.task.mane/login.html';}
};
var UTILS={
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  today:function(){return new Date(Date.now()+3*3600000).toISOString().slice(0,10);},
  fmtDate:function(d){if(!d)return '';var parts=d.split('-');var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[parseInt(parts[1])-1]+' '+parseInt(parts[2]);},
  toast:function(msg,type){
    var c={success:'#0EA472',error:'#E5383B',info:'#1877C5',warning:'#F4A523'};
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:80px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:300px;font-family:inherit;animation:fadeIn .2s ease';
    t.textContent=msg;document.body.appendChild(t);
    setTimeout(function(){t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(function(){t.remove();},300);},2800);
  },
  setUser:function(s){
    if(!s)return;
    var i=document.getElementById('avatarInitials'),n=document.getElementById('sidebarName'),r=document.getElementById('sidebarRole');
    if(i)i.textContent=this.ini(s.full_name);
    if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];
    if(r)r.textContent=s.role;
    document.querySelectorAll('[data-roles]').forEach(function(el){
      if(el.getAttribute('data-roles').split(',').map(function(x){return x.trim();}).indexOf(s.role)===-1)el.style.display='none';
    });
  }
};
AUTH.requireAuth();
var S=AUTH.getSession()||{};
UTILS.setUser(S);
var firstName=(S.display_name||S.full_name||'').split(' ')[0]||'My';
document.getElementById('pageTitle').textContent=firstName+"'s To-Do";
document.getElementById('heroTitle').textContent=firstName+"'s Personal To-Do";

// Sidebar
var _sb=document.getElementById('sidebar'),_ov=document.getElementById('sidebarOverlay');
document.getElementById('sidebarToggle').addEventListener('click',function(){_sb.classList.toggle('open');if(_ov)_ov.style.display=_sb.classList.contains('open')?'block':'none';});
if(_ov)_ov.addEventListener('click',function(){_sb.classList.remove('open');_ov.style.display='none';});

// Add card focus expand
var addCard=document.getElementById('addCard');
document.getElementById('addInput').addEventListener('focus',function(){addCard.classList.add('focused');});
document.addEventListener('click',function(e){
  if(!addCard.contains(e.target)&&document.getElementById('addInput').value==='')addCard.classList.remove('focused');
});
document.getElementById('addDate').min=UTILS.today();

// Bell
async function loadBell(){try{var d=await API.get('notif_list',{limit:'5'});var nb=document.getElementById('notifBadge');if(nb){if((d.unread_count||0)>0){nb.textContent=d.unread_count;nb.classList.remove('hidden');}else nb.classList.add('hidden');}}catch(e){}}

// State
var allTodos=[],curF='pending';
function isOver(dt){return dt&&dt<UTILS.today();}
function isToday(dt){return dt&&dt===UTILS.today();}

// Hero ring
function updateHero(){
  var total=allTodos.length;
  var done=allTodos.filter(function(t){return t.status==='Done';}).length;
  var pend=total-done;
  var over=allTodos.filter(function(t){return isOver(t.due_date)&&t.status!=='Done';}).length;
  var tod=allTodos.filter(function(t){return isToday(t.due_date)&&t.status!=='Done';}).length;
  var pct=total>0?Math.round(done/total*100):0;
  var circum=188.5;
  var ring=document.getElementById('ringFill');
  if(ring)ring.setAttribute('stroke-dashoffset',circum-(pct/100*circum));
  var rp=document.getElementById('ringPct');if(rp)rp.textContent=pct+'%';
  var hs='<div class="hero-stat"><div class="hero-stat-val">'+pend+'</div><div class="hero-stat-lbl">Pending</div></div>'+
    '<div class="hero-stat"><div class="hero-stat-val" style="color:#6EE7B7">'+done+'</div><div class="hero-stat-lbl">Done</div></div>'+
    (over?'<div class="hero-stat"><div class="hero-stat-val" style="color:#FCA5A5">'+over+'</div><div class="hero-stat-lbl">Overdue</div></div>':'')+
    (!over&&tod?'<div class="hero-stat"><div class="hero-stat-val" style="color:#FCD34D">'+tod+'</div><div class="hero-stat-lbl">Today</div></div>':'');
  document.getElementById('heroStats').innerHTML=hs;
}

// Load
async function loadTodos(){
  try{
    var d=await API.get('ptodo_list',{});
    allTodos=d.todos||[];
    render();
  }catch(ex){
    document.getElementById('todoList').innerHTML='<div style="padding:32px;text-align:center;color:#EF4444">⚠️ '+UTILS.esc(ex.message)+'</div>';
  }
}

function setF(btn){document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');curF=btn.dataset.f;render();}

function render(){
  updateHero();
  var items=allTodos.filter(function(t){
    if(curF==='pending')return t.status!=='Done';
    if(curF==='done')return t.status==='Done';
    if(curF==='today')return isToday(t.due_date)&&t.status!=='Done';
    if(curF==='overdue')return isOver(t.due_date)&&t.status!=='Done';
    return true;
  });
  if(!items.length){
    var ei={pending:'🎉',done:'📋',today:'☀️',overdue:'✅',all:'📝'};
    var em={pending:'All clear — nothing pending!',done:'No completed items yet.',today:'Nothing due today.',overdue:'No overdue items — nice!',all:'No to-dos yet. Add one above!'};
    document.getElementById('todoList').innerHTML='<div class="empty"><span class="empty-icon">'+(ei[curF]||'📝')+'</span><div class="empty-title">'+(em[curF]||'')+'</div><div class="empty-sub">Your list is looking great ✨</div></div>';
    return;
  }
  var ov=items.filter(function(t){return isOver(t.due_date)&&t.status!=='Done';});
  var td=items.filter(function(t){return isToday(t.due_date)&&t.status!=='Done';});
  var up=items.filter(function(t){return !isOver(t.due_date)&&!isToday(t.due_date)&&t.status!=='Done';});
  var dn=items.filter(function(t){return t.status==='Done';});
  var html='';
  if(ov.length)html+=grp('🔴 Overdue',ov);
  if(td.length)html+=grp('⏰ Due Today',td);
  if(up.length)html+=grp('📅 Upcoming',up);
  if(dn.length)html+=grp('✅ Done',dn);
  document.getElementById('todoList').innerHTML=html;
}

function grp(label,items){
  return '<div class="grp-lbl">'+label+'<span class="grp-cnt">'+items.length+'</span></div>'+items.map(card).join('');
}

function card(t){
  var done=t.status==='Done';
  var ov=isOver(t.due_date)&&!done;
  var tod=isToday(t.due_date)&&!done;
  var cls='todo-item'+(done?' done':'')+(ov?' overdue':tod?' due-today':'');
  var dp='';
  if(t.due_date){var dc=ov?'d-over':tod?'d-today':'d-ok';var di=ov?'🔴':tod?'⏰':'📅';dp='<span class="t-date '+dc+'">'+di+' '+UTILS.fmtDate(t.due_date)+'</span>';}
  return '<div class="'+cls+'" id="item_'+t.todo_id+'" style="animation:slideIn .18s ease">'+
    '<div class="t-left"><div class="chk'+(done?' chk-done':'')+'" data-tid="'+t.todo_id+'" data-done="'+done+'" onclick="handleToggle(this)">'+
      (done?'<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'')+
    '</div></div>'+
    '<div class="t-body">'+
      '<div class="t-title'+(done?' done-txt':'')+'">'+UTILS.esc(t.title)+'</div>'+
      (t.note?'<div class="t-note">'+UTILS.esc(t.note)+'</div>':'')+
      (dp?'<div class="t-meta">'+dp+'</div>':'')+
    '</div>'+
    '<div class="t-right">'+
      '<button class="act-btn" onclick="startEdit(\''+t.todo_id+'\')" title="Edit"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'+
      '<button class="act-btn act-del" onclick="deleteTodo(\''+t.todo_id+'\')" title="Delete"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>'+
    '</div>'+
  '</div>';
}

// Add
async function addTodo(){
  var title=(document.getElementById('addInput').value||'').trim();
  if(!title){document.getElementById('addInput').focus();UTILS.toast('Please enter a title','warning');return;}
  var date=document.getElementById('addDate').value||'';
  var note=(document.getElementById('addNote').value||'').trim();
  var btn=document.getElementById('btnAdd');
  btn.disabled=true;btn.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="animation:spin .8s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/></svg> Adding...';
  try{
    var d=await API.post('ptodo_add',{title:title,due_date:date,note:note});
    var newItem=d.todo||{todo_id:d.todo_id||('tmp_'+Date.now()),title:title,note:note,due_date:date,status:'Pending'};
    allTodos.unshift(newItem);
    document.getElementById('addInput').value='';
    document.getElementById('addDate').value='';
    document.getElementById('addNote').value='';
    addCard.classList.remove('focused');
    if(curF==='done')document.querySelector('[data-f="pending"]').click();else render();
    UTILS.toast('Added!','success');
  }catch(ex){UTILS.toast('Error: '+ex.message,'error');}
  btn.disabled=false;
  btn.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add';
}

// Toggle
function handleToggle(el){toggleDone(el.dataset.tid,el.dataset.done==='true');}
async function toggleDone(id,isDone){
  var ns=isDone?'Pending':'Done';
  var t=allTodos.find(function(x){return x.todo_id===id;});
  if(t)t.status=ns;
  render();
  try{await API.post('ptodo_update',{todo_id:id,status:ns});}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');if(t)t.status=isDone?'Done':'Pending';render();}
}

// Edit
function startEdit(id){
  var t=allTodos.find(function(x){return x.todo_id===id;});if(!t)return;
  var el=document.getElementById('item_'+id);if(!el)return;
  el.innerHTML=
    '<div class="t-left"><div class="chk" style="margin-top:3px"></div></div>'+
    '<div class="edit-wrap">'+
      '<input class="edit-title" id="et_'+id+'" value="'+UTILS.esc(t.title)+'" placeholder="Task title">'+
      '<div class="edit-row">'+
        '<div class="edit-fld"><label>📅 Due</label><input type="date" id="ed_'+id+'" value="'+(t.due_date||'')+'"></div>'+
        '<div class="edit-fld" style="flex:1"><label>📝</label><input id="en_'+id+'" value="'+UTILS.esc(t.note||'')+'" placeholder="Note..."></div>'+
      '</div>'+
      '<div class="edit-btns">'+
        '<button class="btn-sv" onclick="saveEdit(\''+id+'\')">Save</button>'+
        '<button class="btn-cn" onclick="render()">Cancel</button>'+
      '</div>'+
    '</div>'+
    '<div class="t-right"></div>';
  document.getElementById('et_'+id).focus();
}

async function saveEdit(id){
  var title=(document.getElementById('et_'+id).value||'').trim();
  var date=document.getElementById('ed_'+id).value||'';
  var note=(document.getElementById('en_'+id).value||'').trim();
  if(!title){UTILS.toast('Title cannot be empty','error');return;}
  var t=allTodos.find(function(x){return x.todo_id===id;});
  if(t){t.title=title;t.due_date=date;t.note=note;}
  render();
  try{await API.post('ptodo_update',{todo_id:id,title:title,due_date:date,note:note});UTILS.toast('Saved','success');}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}

// Delete
async function deleteTodo(id){
  if(!confirm('Delete this to-do?'))return;
  allTodos=allTodos.filter(function(t){return t.todo_id!==id;});render();
  try{await API.post('ptodo_delete',{todo_id:id});}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}

loadTodos();loadBell();
setInterval(function(){loadTodos();},300000);
</script>
</body>
</html>

.k-card-id { font-size: 9px !important; color: #B8C5D4 !important; letter-spacing: .3px !important; }

/* Kanban column headers */
.k-header, .kanban-col-header {
  background: #fff !important;
  border: 1.5px solid #E8EFF8 !important;
  border-radius: 14px !important;
  padding: 11px 14px !important;
  border-top: 3px solid !important;
  box-shadow: 0 1px 4px rgba(6,15,36,.04) !important;
}
.k-label, .kcol-title { font-size: 12px !important; font-weight: 700 !important; }
.k-count, .kcol-count {
  background: #F4F6FB !important; border: 1px solid #E4EAF3 !important;
  color: #4A5568 !important; font-size: 11px !important; font-weight: 700 !important;
  border-radius: 6px !important; padding: 2px 8px !important;
}

/* ── 6. HERO CARD ───────────────────────────────────────────── */
.task-hero, .page-hero, .ph-card {
  background: linear-gradient(135deg, #0D1B3E 0%, #1565A8 60%, #1877C5 100%) !important;
  border-radius: 20px !important;
  padding: 24px 28px !important;
  margin-bottom: 20px !important;
  position: relative !important; overflow: hidden !important;
  box-shadow: 0 8px 32px rgba(13,27,62,.25) !important;
}
.task-hero::before, .page-hero::before {
  content: '' !important; position: absolute !important;
  top: -60px !important; right: -40px !important;
  width: 220px !important; height: 220px !important; border-radius: 50% !important;
  background: rgba(255,255,255,.05) !important; pointer-events: none !important;
}
.task-hero::after, .page-hero::after {
  content: '' !important; position: absolute !important;
  bottom: -80px !important; right: 120px !important;
  width: 160px !important; height: 160px !important; border-radius: 50% !important;
  background: rgba(255,255,255,.03) !important; pointer-events: none !important;
}

/* ── 7. BUTTONS — REFINED ──────────────────────────────────── */
.btn {
  display: inline-flex !important; align-items: center !important; gap: 7px !important;
  padding: 9px 18px !important; border-radius: 10px !important;
  font-size: 12px !important; font-weight: 700 !important;
  border: none !important; cursor: pointer !important;
  transition: all .18s ease !important; letter-spacing: .1px !important;
  white-space: nowrap !important; text-decoration: none !important;
}
.btn-primary {
  background: linear-gradient(135deg, #1877C5, #1565A8) !important;
  color: #fff !important;
  box-shadow: 0 2px 8px rgba(24,119,197,.35) !important;
}
.btn-primary:hover {
  background: linear-gradient(135deg, #1565A8, #0D4F8C) !important;
  box-shadow: 0 4px 16px rgba(24,119,197,.45) !important;
  transform: translateY(-1px) !important;
}
.btn-ghost {
  background: #F4F6FB !important; color: #4A5568 !important;
  border: 1.5px solid #E4EAF3 !important;
}
.btn-ghost:hover { background: #E8F1FB !important; border-color: #1877C5 !important; color: #1877C5 !important; }
.btn-danger {
  background: linear-gradient(135deg, #E5383B, #C0182A) !important;
  color: #fff !important;
  box-shadow: 0 2px 8px rgba(229,56,59,.3) !important;
}
.btn-danger:hover { box-shadow: 0 4px 14px rgba(229,56,59,.4) !important; transform: translateY(-1px) !important; }
.btn-success {
  background: linear-gradient(135deg, #0EA472, #0A7A55) !important;
  color: #fff !important;
  box-shadow: 0 2px 8px rgba(14,164,114,.3) !important;
}

/* ── 8. FORMS & INPUTS ─────────────────────────────────────── */
input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
select, textarea {
  border: 1.5px solid #E4EAF3 !important;
  border-radius: 10px !important;
  padding: 9px 12px !important;
  font-size: 13px !important;
  color: #0A1628 !important;
  background: #FAFBFE !important;
  transition: border-color .18s, box-shadow .18s !important;
  outline: none !important;
}
input:focus, select:focus, textarea:focus {
  border-color: #1877C5 !important;
  background: #fff !important;
  box-shadow: 0 0 0 3px rgba(24,119,197,.12) !important;
}
input::placeholder, textarea::placeholder { color: #B8C5D4 !important; }
label, .form-label {
  font-size: 11px !important; font-weight: 700 !important;
  color: #4A5568 !important; text-transform: uppercase !important;
  letter-spacing: .6px !important; display: block !important; margin-bottom: 6px !important;
}

/* ── 9. STATUS BADGES — CRISP & CONSISTENT ─────────────────── */
.badge, .status-badge, .badge-pill {
  display: inline-flex !important; align-items: center !important;
  padding: 3px 10px !important; border-radius: 20px !important;
  font-size: 11px !important; font-weight: 700 !important;
  letter-spacing: .2px !important; white-space: nowrap !important;
}
.badge-new, .status-new { background: #EEF0FF !important; color: #4338CA !important; }
.badge-inprogress, .status-inprogress { background: #EFF6FF !important; color: #1D4ED8 !important; }
.badge-pending { background: #FFFBEB !important; color: #B45309 !important; }
.badge-overdue, .status-overdue { background: #FFF0F0 !important; color: #B91C1C !important; }
.badge-completed, .status-completed { background: #ECFDF5 !important; color: #065F46 !important; }
.badge-escalated { background: #F5F3FF !important; color: #5B21B6 !important; }
.badge-cancelled { background: #F8FAFC !important; color: #64748B !important; }

/* Priority badges */
.badge-critical, .pri-critical { background: #FEF2F2 !important; color: #DC2626 !important; border: 1px solid #FECACA !important; }
.badge-high, .pri-high { background: #FFFBEB !important; color: #D97706 !important; border: 1px solid #FDE68A !important; }
.badge-medium, .pri-medium { background: #EFF6FF !important; color: #2563EB !important; border: 1px solid #BFDBFE !important; }
.badge-low, .pri-low { background: #F0FDF4 !important; color: #16A34A !important; border: 1px solid #BBF7D0 !important; }

/* ── 10. PAGE HERO (training / archive / settings variant) ──── */
.ph-body { position: relative !important; z-index: 1 !important; }
.ph-tag {
  font-size: 9px !important; font-weight: 800 !important;
  color: rgba(255,255,255,.45) !important; text-transform: uppercase !important;
  letter-spacing: 1.5px !important; margin-bottom: 6px !important;
}
.ph-title {
  font-size: 20px !important; font-weight: 900 !important; color: #fff !important;
  letter-spacing: -.4px !important; margin-bottom: 18px !important;
  text-shadow: 0 2px 8px rgba(0,0,0,.2) !important;
}
.ph-stats { display: flex !important; gap: 24px !important; flex-wrap: wrap !important; }
.ph-stat { line-height: 1 !important; }
.ph-stat-val { font-size: 26px !important; font-weight: 900 !important; color: #fff !important; }
.ph-stat-lbl {
  font-size: 9px !important; font-weight: 600 !important;
  color: rgba(255,255,255,.45) !important; text-transform: uppercase !important;
  letter-spacing: .8px !important; margin-top: 4px !important;
}

/* ── 11. FILTER / TAB BARS ─────────────────────────────────── */
.filter-bar, .board-filters, .tab-bar, .filter-row {
  display: flex !important; gap: 6px !important; flex-wrap: wrap !important;
  align-items: center !important;
}
.filter-btn, .tab-btn, .f-btn {
  padding: 7px 14px !important; border-radius: 8px !important;
  font-size: 12px !important; font-weight: 600 !important;
  background: #fff !important; border: 1.5px solid #E4EAF3 !important;
  color: #4A5568 !important; cursor: pointer !important;
  transition: all .15s ease !important; white-space: nowrap !important;
}
.filter-btn:hover, .tab-btn:hover, .f-btn:hover { border-color: #1877C5 !important; color: #1877C5 !important; background: #EBF3FC !important; }
.filter-btn.active, .tab-btn.active, .f-btn.active {
  background: #1877C5 !important; color: #fff !important;
  border-color: #1877C5 !important;
  box-shadow: 0 2px 8px rgba(24,119,197,.3) !important;
}

/* ── 12. SEARCH BAR ────────────────────────────────────────── */
.search-bar {
  background: #F4F6FB !important;
  border: 1.5px solid #E4EAF3 !important;
  border-radius: 10px !important;
  padding: 8px 12px !important;
  gap: 8px !important;
}
.search-bar:focus-within { border-color: #1877C5 !important; background: #fff !important; box-shadow: 0 0 0 3px rgba(24,119,197,.1) !important; }
.search-bar input { font-size: 13px !important; color: #0A1628 !important; }
.search-bar svg { stroke: #8A9BB0 !important; }

/* ── 13. EMPTY STATES ──────────────────────────────────────── */
.empty-state, .k-empty {
  padding: 40px 24px !important;
  text-align: center !important;
  color: #8A9BB0 !important;
  border: 2px dashed #E4EAF3 !important;
  border-radius: 16px !important;
  background: #FAFCFF !important;
}
.empty-state-icon {
  font-size: 32px !important;
  margin-bottom: 12px !important;
  opacity: .6 !important;
}
.empty-state-title {
  font-size: 14px !important; font-weight: 700 !important;
  color: #4A5568 !important; margin-bottom: 6px !important;
}
.empty-state-sub { font-size: 12px !important; color: #8A9BB0 !important; }

/* ── 14. LOADING SKELETON ──────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, #F0F4F9 25%, #E8EFF8 50%, #F0F4F9 75%) !important;
  background-size: 300% 100% !important;
  animation: sk-wave 1.6s ease-in-out infinite !important;
  border-radius: 8px !important;
}
@keyframes sk-wave {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* ── 15. TOAST NOTIFICATIONS ───────────────────────────────── */
.toast-container {
  position: fixed !important; bottom: 80px !important; right: 20px !important;
  z-index: 9999 !important; display: flex !important;
  flex-direction: column !important; gap: 8px !important; max-width: 320px !important;
}
.toast {
  background: #fff !important;
  border: 1px solid #E4EAF3 !important;
  border-left: 4px solid !important;
  border-radius: 12px !important;
  padding: 12px 16px !important;
  font-size: 13px !important; font-weight: 500 !important;
  box-shadow: 0 8px 24px rgba(6,15,36,.12) !important;
  animation: toast-in .25s ease !important;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── 16. PROGRESS BARS ─────────────────────────────────────── */
.k-prog, .k-progress, .progress-bar-bg {
  height: 5px !important; border-radius: 5px !important;
  background: #EEF1F7 !important;
  overflow: hidden !important;
}
.k-prog-fill, .k-prog-fill, .progress-fill {
  height: 100% !important; border-radius: 5px !important;
  background: linear-gradient(90deg, #1565A8, #1877C5) !important;
  transition: width .5s ease !important;
}

/* ── 17. TABLE IMPROVEMENTS ────────────────────────────────── */
table {
  width: 100% !important; border-collapse: collapse !important;
  font-size: 12.5px !important;
}
th {
  font-size: 10px !important; font-weight: 800 !important;
  text-transform: uppercase !important; letter-spacing: .6px !important;
  color: #8A9BB0 !important; padding: 10px 14px !important;
  border-bottom: 2px solid #E4EAF3 !important;
  background: #F8FAFC !important; white-space: nowrap !important;
}
td {
  padding: 12px 14px !important;
  border-bottom: 1px solid #F0F4F9 !important;
  color: #0A1628 !important; vertical-align: middle !important;
}
tr:hover td { background: #FAFCFF !important; }
tr:last-child td { border-bottom: none !important; }

/* ── 18. PLAN / TRAINING CARDS ─────────────────────────────── */
.plan-card {
  background: #fff !important;
  border: 1.5px solid #E8EFF8 !important;
  border-radius: 16px !important;
  padding: 20px !important;
  box-shadow: 0 2px 8px rgba(6,15,36,.05) !important;
  transition: box-shadow .2s, transform .2s !important;
}
.plan-card:hover {
  box-shadow: 0 6px 20px rgba(6,15,36,.1) !important;
  transform: translateY(-2px) !important;
  border-color: #C5D5EE !important;
}
.plan-header { display: flex !important; align-items: flex-start !important; justify-content: space-between !important; gap: 12px !important; margin-bottom: 14px !important; }
.plan-title { font-size: 14px !important; font-weight: 700 !important; color: #0A1628 !important; line-height: 1.35 !important; }
.plan-sub { font-size: 11px !important; color: #8A9BB0 !important; margin-top: 3px !important; }
.plan-footer { display: flex !important; align-items: center !important; gap: 10px !important; padding-top: 14px !important; border-top: 1px solid #F0F4F9 !important; }

/* ── 19. TODO ITEMS ────────────────────────────────────────── */
.todo-item, .td-item {
  background: #fff !important;
  border: 1.5px solid #E8EFF8 !important;
  border-radius: 14px !important;
  padding: 14px 16px !important;
  display: flex !important; align-items: flex-start !important; gap: 12px !important;
  transition: box-shadow .2s, border-color .2s !important;
  box-shadow: 0 1px 4px rgba(6,15,36,.04) !important;
  cursor: pointer !important;
}
.todo-item:hover, .td-item:hover {
  box-shadow: 0 4px 16px rgba(6,15,36,.08) !important;
  border-color: #C5D5EE !important;
}
.todo-item.done, .td-item.done { opacity: .65 !important; }
.todo-item.done .td-title { text-decoration: line-through !important; color: #8A9BB0 !important; }

/* ── 20. SETTINGS FORMS ────────────────────────────────────── */
.settings-section {
  background: #fff !important;
  border: 1px solid #E4EAF3 !important;
  border-radius: 16px !important;
  padding: 24px !important;
  margin-bottom: 20px !important;
  box-shadow: 0 1px 6px rgba(6,15,36,.04) !important;
}
.settings-title {
  font-size: 15px !important; font-weight: 800 !important;
  color: #0A1628 !important; margin-bottom: 4px !important; letter-spacing: -.2px !important;
}
.settings-subtitle { font-size: 12px !important; color: #8A9BB0 !important; margin-bottom: 20px !important; }
.settings-row {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  padding: 14px 0 !important; border-bottom: 1px solid #F0F4F9 !important; gap: 16px !important;
}
.settings-row:last-child { border-bottom: none !important; padding-bottom: 0 !important; }

/* ── 21. MOBILE BOTTOM NAV — FINAL ─────────────────────────── */
.mobile-bottom-nav {
  position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
  background: #0D1B3E !important;
  border-top: 1px solid rgba(255,255,255,.08) !important;
  box-shadow: 0 -4px 20px rgba(6,15,36,.25) !important;
  z-index: 300 !important;
  padding: 6px 4px max(env(safe-area-inset-bottom), 8px) !important;
  flex-direction: row !important; justify-content: space-around !important; align-items: stretch !important;
}
.mbn-item {
  display: flex !important; flex-direction: column !important; align-items: center !important;
  justify-content: center !important; gap: 3px !important;
  color: rgba(255,255,255,.38) !important; text-decoration: none !important;
  padding: 6px 4px !important; border-radius: 10px !important;
  font-size: 10px !important; font-weight: 600 !important;
  transition: all .18s ease !important; flex: 1 !important; min-width: 52px !important;
}
.mbn-item:active { background: rgba(255,255,255,.07) !important; color: #fff !important; }
.mbn-item.active { color: #1877C5 !important; }
.mbn-item.active svg { stroke: #1877C5 !important; }
.mbn-item svg { width: 22px !important; height: 22px !important; }
.mbn-item span { font-size: 10px !important; }

/* ── 22. RESPONSIVE FINAL AUTHORITY ────────────────────────── */
@media (max-width: 768px) {
  /* Clean mobile scrolling */
  html, body { overflow-x: hidden !important; }
  .main-content { overflow-x: hidden !important; }
  
  /* Bottom nav visible */
  .mobile-bottom-nav { display: flex !important; }
  /* Sidebar hidden */
  .sidebar { transform: translateX(-100%) !important; display: flex !important; z-index: 500 !important; }
  .sidebar.open { transform: translateX(0) !important; box-shadow: 6px 0 40px rgba(0,0,0,.5) !important; }
  .main-content { margin-left: 0 !important; }
  .sidebar-toggle { display: flex !important; }
  
  /* Content padding */
  .page-content { 
    padding: 14px 14px calc(80px + max(env(safe-area-inset-bottom), 12px)) !important; 
  }
  
  /* Kanban columns */
  .k-col, .kanban-col { min-width: 82vw !important; max-width: 82vw !important; scroll-snap-align: start !important; }
  .kanban-scroll, .kanban-wrap { scroll-snap-type: x mandatory !important; }
  
  /* Filters */
  .board-filters, .filter-bar, .filter-row {
    overflow-x: auto !important; flex-wrap: nowrap !important;
    scrollbar-width: none !important; padding-bottom: 4px !important;
  }
  .board-filters::-webkit-scrollbar, .filter-bar::-webkit-scrollbar { display: none !important; }
  
  /* Modals */
  #taskModal { align-items: flex-end !important; }
  
  /* Tables */
  .arch-table-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
}
@media (min-width: 769px) {
  .mobile-bottom-nav { display: none !important; }
  .sidebar { transform: none !important; display: flex !important; }
  .sidebar-toggle { display: none !important; }
  .main-content { margin-left: 220px !important; }
}

/* ── 23. MICRO-INTERACTIONS ─────────────────────────────────── */
* { -webkit-tap-highlight-color: transparent !important; }
button, .btn, a { cursor: pointer !important; }
.btn:active { transform: scale(.98) !important; }

/* ── 24. SCROLLBARS ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px !important; height: 5px !important; }
::-webkit-scrollbar-track { background: transparent !important; }
::-webkit-scrollbar-thumb { background: #D0D9E8 !important; border-radius: 10px !important; }
::-webkit-scrollbar-thumb:hover { background: #B8C5D4 !important; }

/* ── 25. PAGE LOAD ANIMATION ────────────────────────────────── */
.page-content { animation: fadeUp .3s ease !important; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Notification badge pulse */
.notif-badge:not(.hidden), .nav-badge {
  animation: pulse-dot 2s ease-in-out infinite !important;
}
@keyframes pulse-dot {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.25); }
}

<script>


var API_BASE='https://n8n.kib-cc-wfm.com/webhook';
var SES_KEY='kib_ops_session';
var API={
  _t:function(){var s=AUTH.getSession();return s?s.session_token:null;},
  post:async function(action,body){
    var path=action.replace(/_/g,'-');
    var url=API_BASE+'/kib/'+path;
    var p=Object.assign({},body||{});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    var txt=await r.text();var d;
    try{d=JSON.parse(txt);}catch(e){throw new Error('Server '+r.status+': '+(txt||'empty').slice(0,120));}
    if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:d.message||'API error');
    return d.data;
  },
  get:async function(action,params){return this.post(action,params||{});}
};
var AUTH={
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/login.html';},
  hasRole:function(r){var s=this.getSession();if(!s)return false;return Array.isArray(r)?r.indexOf(s.role)!==-1:s.role===r;},
  canDo:function(a){var s=this.getSession();if(!s)return false;var m={'tasks.create':['HoD','Manager','DGM','DataEntry','QA Manager'],'handover.create':['HoD','Manager','TL','AL'],'training.create':['HoD','Manager','QA Manager'],'sales.entry':['HoD','Manager','TL','AL'],'settings.edit':['HoD','DGM']};if(a==='tasks.create'&&window.KIB_HIERARCHY){return KIB_HIERARCHY.canCreateTask(s.role);}return m[a]?m[a].indexOf(s.role)!==-1:true;},
  getUserId:function(){var s=this.getSession();return s?s.user_id:null;},
  getRole:function(){var s=this.getSession();return s?s.role:'';}
};
var UTILS={
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  fdt:function(iso){if(!iso)return'—';try{var d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return String(iso).slice(0,16);}},
  fd:function(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return String(iso).slice(0,10);}},
  today:function(){return new Date(Date.now()+3*3600000).toISOString().slice(0,10);},
  tr:function(iso){
    if(!iso)return{label:'—',overdue:false,diffMs:0};
    var diff=new Date(iso)-Date.now();
    var abs=Math.abs(diff);
    var label=abs<3600000?Math.floor(abs/60000)+'m':abs<86400000?Math.floor(abs/3600000)+'h':Math.floor(abs/86400000)+'d';
    var isOv=window.KIB_CALENDAR?KIB_CALENDAR.isOverdue(iso,'active'):diff<0;
    return{label:diff<0?label+' over':label+' left',overdue:isOv,diffMs:diff};
  },
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  _avc:[['#3B82F6','#fff'],['#8B5CF6','#fff'],['#10B981','#fff'],['#F59E0B','#fff'],['#EC4899','#fff'],['#0EA472','#fff'],['#EF4444','#fff'],['#6366F1','#fff'],['#14B8A6','#fff'],['#F97316','#fff']],
  avc:function(n){var h=0,s=String(n||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return this._avc[h%this._avc.length];},
  av:function(n,sz){sz=sz||28;var c=this.avc(n);return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c[0]+';color:'+c[1]+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.38)+'px;font-weight:700;flex-shrink:0">'+this.ini(n)+'</div>';},
  toast:function(msg,type){var c={success:'#0EA472',error:'#E5383B',warning:'#F4A523',info:'#1877C5'};var t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:340px;font-family:inherit';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);},
  empty:function(id,title,sub){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:#8A9BB0;text-align:center;gap:8px"><svg width="36" height="36" fill="none" stroke="#B8C5D4" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg><div style="font-size:13px;font-weight:600;color:#4A5568">'+(title||'No data')+'</div>'+(sub?'<div style="font-size:11px">'+sub+'</div>':'')+'</div>';},
  loader:function(id){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="padding:20px;display:flex;flex-direction:column;gap:10px"><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div></div>';},
  setUser:function(s){
    if(!s)return;
    // Support both sidebar HTML structures
    var i=document.getElementById('avatarInitials')||document.querySelector('.user-avatar');
    var n=document.getElementById('sidebarName')||document.querySelector('.user-name');
    var r=document.getElementById('sidebarRole')||document.querySelector('.user-role');
    if(i)i.textContent=this.ini(s.full_name);
    if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];
    if(r)r.textContent=s.role;
    document.querySelectorAll('[data-roles]').forEach(function(el){
      if(el.getAttribute('data-roles').split(',').map(function(x){return x.trim();}).indexOf(s.role)===-1)el.style.display='none';
    });
  },
  sidebar:function(){var btn=document.getElementById('sidebarToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');if(btn&&sb){btn.addEventListener('click',function(){sb.classList.toggle('open');if(ov)ov.style.display=sb.classList.contains('open')?'block':'none';});}}
};



AUTH.requireAuth();
var _sess = AUTH.getSession() || {};
UTILS.setUser(_sess);
UTILS.sidebar();

// ── PAGE TITLE ───────────────────────────────────────────
var _name = (_sess.full_name || '').split(' ')[0] || 'My';
document.getElementById('heroTitle').textContent = _name + "'s To-Do List";
document.getElementById('pageTitle').textContent = _name + "'s To-Do";

// ── STATE ────────────────────────────────────────────────
var todos = [];
var currentFilter = 'pending';
var editingId = null;

// ── DATE HELPERS ─────────────────────────────────────────
function todayStr() {
  // Kuwait is UTC+3
  var now = new Date(Date.now() + 3 * 3600000);
  return now.toISOString().slice(0, 10);
}
function normDate(d) {
  if (!d) return '';
  return String(d).slice(0, 10);
}
function formatDate(iso) {
  if (!iso || iso === 'null' || iso === 'undefined') return null;
  // Handle both date-only (YYYY-MM-DD) and full ISO strings
  var dateStr = String(iso).slice(0, 10);
  if (!dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) return null;
  var parts = dateStr.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function dateClass(iso) {
  if (!iso) return '';
  var d = normDate(iso);
  if (!d) return '';
  var today = todayStr();
  if (d < today) return 'overdue';
  if (d === today) return 'today-due';
  return '';
}

// ── LOAD ─────────────────────────────────────────────────
async function loadTodos() {
  try {
    var d = await API.get('ptodo_list', {});
    todos = (d.todos || []).filter(function(t) { return t && t.todo_id; }).map(function(t){
      // Normalize status: n8n stores 'Done', UI uses 'Completed'
      if(t.status === 'Done') t.status = 'Completed';
      // Normalize due_date to YYYY-MM-DD string
      if(t.due_date && typeof t.due_date === 'string' && t.due_date.length > 10) {
        t.due_date = t.due_date.slice(0, 10);
      }
      return t;
    });
    updateUI();
  } catch(ex) {
    document.getElementById('tdList').innerHTML = '<div class="td-empty"><div class="td-empty-icon">⚠️</div><div class="td-empty-title">Could not load to-do list</div><div class="td-empty-sub">' + UTILS.esc(ex.message) + '</div></div>';
  }
}

// ── UPDATE UI ─────────────────────────────────────────────
function updateUI() {
  updateHero();
  updateTabs();
  renderList();
}

function updateHero() {
  var today = todayStr();
  var pending = todos.filter(function(t){ return t.status !== 'Completed'; });
  var done    = todos.filter(function(t){ return t.status === 'Completed'; });
  var overdue = pending.filter(function(t){ return normDate(t.due_date) && normDate(t.due_date) < today; });
  var dueToday = pending.filter(function(t){ return normDate(t.due_date) === today; });
  document.getElementById('heroPending').textContent   = pending.length;
  document.getElementById('heroDone').textContent      = done.length;
  document.getElementById('heroOverdue').textContent   = overdue.length;
  document.getElementById('heroDueToday').textContent  = dueToday.length;
  var pct = todos.length > 0 ? Math.round(done.length / todos.length * 100) : 0;
  var circ = 32 * 2 * Math.PI; // r=32
  var offset = circ - (pct / 100) * circ;
  var ring = document.getElementById('ringFill');
  if (ring) { ring.style.strokeDashoffset = offset; ring.setAttribute('stroke-dasharray', circ); }
  var ringPct = document.getElementById('ringPct');
  if (ringPct) ringPct.textContent = pct + '%';
}

function updateTabs() {
  var today = todayStr();
  var pending = todos.filter(function(t){ return t.status !== 'Completed'; });
  var done    = todos.filter(function(t){ return t.status === 'Completed'; });
  var overdue = pending.filter(function(t){ return normDate(t.due_date) && normDate(t.due_date) < today; });
  var dueToday = pending.filter(function(t){ return normDate(t.due_date) === today; });
  document.getElementById('cntPending').textContent  = pending.length;
  document.getElementById('cntToday').textContent    = dueToday.length;
  document.getElementById('cntOverdue').textContent  = overdue.length;
  document.getElementById('cntDone').textContent     = done.length;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.td-tab').forEach(function(b){ b.classList.remove('active'); });
  if (el) el.classList.add('active');
  renderList();
}

// ── RENDER ────────────────────────────────────────────────
function renderList() {
  var today = todayStr();
  var list = document.getElementById('tdList');

  // Filter
  var items;
  if (currentFilter === 'pending')  items = todos.filter(function(t){ return t.status !== 'Completed'; });
  else if (currentFilter === 'done') items = todos.filter(function(t){ return t.status === 'Completed'; });
  else if (currentFilter === 'overdue') items = todos.filter(function(t){ return t.status !== 'Completed' && normDate(t.due_date) && normDate(t.due_date) < today; });
  else if (currentFilter === 'today') items = todos.filter(function(t){ return t.status !== 'Completed' && normDate(t.due_date) === today; });
  else items = todos;

  if (!items.length) {
    var msgs = {
      pending: ['📋', 'All caught up!', 'No pending tasks. Add something above.'],
      done:    ['✅', 'Nothing done yet', 'Complete a task to see it here.'],
      overdue: ['🎉', 'No overdue tasks!', 'Everything is on track.'],
      today:   ['📅', 'Nothing due today', 'Your schedule is clear.'],
      all:     ['📝', 'No to-do items', 'Add your first task above.'],
    };
    var m = msgs[currentFilter] || msgs.all;
    list.innerHTML = '<div class="td-empty"><div class="td-empty-icon">'+m[0]+'</div><div class="td-empty-title">'+m[1]+'</div><div class="td-empty-sub">'+m[2]+'</div></div>';
    return;
  }

  // Group: Overdue / Today / Upcoming / Done
  if (currentFilter === 'all' || currentFilter === 'pending') {
    var groups = [
      { key:'overdue',  label:'Overdue',  items: items.filter(function(t){ return t.status!=='Completed' && normDate(t.due_date) && normDate(t.due_date) < today; }) },
      { key:'today',    label:'Due Today', items: items.filter(function(t){ return t.status!=='Completed' && normDate(t.due_date) === today; }) },
      { key:'upcoming', label:'Upcoming',  items: items.filter(function(t){ return t.status!=='Completed' && (!t.due_date || normDate(t.due_date) > today); }) },
      { key:'done',     label:'Completed', items: items.filter(function(t){ return t.status==='Completed'; }) },
    ].filter(function(g){ return g.items.length > 0; });

    list.innerHTML = groups.map(function(g) {
      return renderGroup(g.label, g.items);
    }).join('');
  } else {
    var groupLabel = { done:'Completed', overdue:'Overdue', today:'Due Today', all:'All Tasks' };
    list.innerHTML = renderGroup(groupLabel[currentFilter] || '', items);
  }
}

function renderGroup(label, items) {
  var html = '<div class="td-group"><span>' + UTILS.esc(label) + '</span><span class="td-group-cnt">' + items.length + '</span></div>';
  html += items.map(renderItem).join('');
  return html;
}

function renderItem(t) {
  var today = todayStr();
  var dc = dateClass(normDate(t.due_date));
  var isDone = t.status === 'Completed';
  var eid = t.todo_id;

  var dateHtml = '';
  if (normDate(t.due_date)) {
    var cls = isDone ? 'td-ok' : (dc === 'overdue' ? 'td-over' : dc === 'today-due' ? 'td-today' : 'td-ok');
    var icon = dc === 'overdue' ? '⚠️' : dc === 'today-due' ? '⏰' : '📅';
    dateHtml = '<span class="td-date ' + cls + '">' + icon + ' ' + (formatDate(normDate(t.due_date)) || '') + '</span>';
  }
  var noteHtml = t.note ? '<div class="td-note">' + UTILS.esc(t.note) + '</div>' : '';
  var doneChk = isDone
    ? '<svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
    : '';

  return (
    '<div class="td-item' + (isDone?' done':'') + (dc?' '+dc:'') + '" id="item-'+eid+'">'
    + '<div class="td-chk-wrap">'
    + '<div class="td-chk'+(isDone?' done':'')+'" data-id="'+eid+'" data-action="toggle">'
    + doneChk
    + '</div></div>'
    + '<div class="td-body">'
    + '<div class="td-title'+(isDone?' done':'')+'">'+UTILS.esc(t.title)+'</div>'
    + noteHtml
    + '<div class="td-meta">'+dateHtml+'</div>'
    + '</div>'
    + '<div class="td-actions">'
    + '<button class="td-btn" data-id="'+eid+'" data-action="edit" title="Edit">'
    + '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
    + '</button>'
    + '<button class="td-btn del" data-id="'+eid+'" data-action="delete" title="Delete">'
    + '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
    + '</button>'
    + '</div>'
    + '</div>'
  );
}

// ── ADD ───────────────────────────────────────────────────

// ── ADD CARD INTERACTIONS ────────────────────────────────
var noteShowing = false;

function focusAdd() {
  document.getElementById('addCard').classList.add('focused');
  document.getElementById('tdInput').focus();
}

function blurAdd() {
  document.getElementById('addCard').classList.remove('focused');
  document.getElementById('tdInput').value = '';
  document.getElementById('tdDue').value = '';
  document.getElementById('tdNote').value = '';
  document.getElementById('dueLbl').textContent = 'Due date';
  document.getElementById('noteLblTxt').textContent = 'Note';
  var dp=document.getElementById('datePill'); if(dp) dp.classList.remove('set');
  var np=document.getElementById('notePill'); if(np) np.classList.remove('set');
  if(noteShowing){ hideNote(); }
  document.getElementById('btnAdd').disabled = true;
}

function openDatePicker() {
  var inp = document.getElementById('tdDue');
  try {
    if (inp.showPicker) { inp.showPicker(); }
    else { inp.click(); }
  } catch(e) { inp.click(); }
}

function updateDueLabel() {
  var val = document.getElementById('tdDue').value;
  var pill = document.getElementById('datePill');
  if(val) {
    var d = new Date(val + 'T00:00:00');
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('dueLbl').textContent = d.getDate()+' '+months[d.getMonth()];
    if(pill) pill.classList.add('set');
  } else {
    document.getElementById('dueLbl').textContent = 'Due date';
    if(pill) pill.classList.remove('set');
  }
}

function toggleNote() {
  noteShowing = !noteShowing;
  var pill = document.getElementById('notePill');
  if(noteShowing) {
    document.getElementById('noteWrap').style.display = 'block';
    document.getElementById('tdNote').focus();
    document.getElementById('noteLblTxt').textContent = 'Hide note';
    if(pill) pill.classList.add('set');
  } else {
    hideNote();
  }
}
function hideNote(){
  noteShowing = false;
  document.getElementById('noteWrap').style.display = 'none';
  document.getElementById('tdNote').value = '';
  document.getElementById('noteLblTxt').textContent = 'Note';
  var pill = document.getElementById('notePill');
  if(pill) pill.classList.remove('set');
}

// Close add card on outside click
document.addEventListener('click', function(e) {
  var card = document.getElementById('addCard');
  if (card && !card.contains(e.target)) {
    card.classList.remove('focused');
  }
});

// Enable Add button only when input has text
document.getElementById('tdInput').addEventListener('input', function() {
  document.getElementById('btnAdd').disabled = !this.value.trim();
});

// Note pill uses onclick directly


async function addTodo() {
  var title = (document.getElementById('tdInput').value || '').trim();
  if (!title) return;
  var due   = document.getElementById('tdDue').value || '';
  var note  = document.getElementById('tdNote').value || '';
  document.getElementById('btnAdd').disabled = true;
  try {
    await API.post('ptodo_add', { title: title, note: note, due_date: due });
    document.getElementById('tdInput').value = '';
    document.getElementById('tdDue').value = '';
    document.getElementById('tdNote').value = '';
    document.getElementById('addCard').classList.remove('focused');
    document.getElementById('btnAdd').disabled = true;
    UTILS.toast('Task added ✓', 'success');
    await loadTodos();
  } catch(ex) {
    UTILS.toast('Error: ' + ex.message, 'error');
    document.getElementById('btnAdd').disabled = false;
  }
}

// ── TOGGLE DONE ──────────────────────────────────────────
async function toggleDone(id) {
  var t = todos.find(function(x){ return x.todo_id === id; });
  if (!t) return;
  var newStatus = t.status === 'Completed' ? 'Pending' : 'Completed';
  var dbStatus = newStatus === 'Completed' ? 'Done' : 'Pending';
  // Optimistic update
  t.status = newStatus;
  updateUI();
  try {
    await API.post('ptodo_update', { todo_id: id, status: dbStatus });
  } catch(ex) {
    t.status = newStatus === 'Completed' ? 'Pending' : 'Completed';
    updateUI();
    UTILS.toast('Error updating task', 'error');
  }
}

// ── EDIT ─────────────────────────────────────────────────
function startEdit(id) {
  if (editingId) cancelEdit();
  editingId = id;
  var t = todos.find(function(x){ return x.todo_id === id; });
  if (!t) return;
  var el = document.getElementById('item-' + id);
  if (!el) return;

  // Build edit form using DOM (avoids string quoting issues)
  var body = el.querySelector('.td-body');
  body.innerHTML = '';
  var wrap = document.createElement('div'); wrap.className = 'td-edit';

  var inp = document.createElement('input'); inp.className = 'td-edit-title'; inp.id = 'editTitle';
  inp.value = t.title || ''; inp.placeholder = 'Task title';
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter')saveEdit(id); if(e.key==='Escape')cancelEdit(); });

  var row = document.createElement('div'); row.className = 'td-edit-row';

  var f1 = document.createElement('div'); f1.className = 'td-edit-field';
  var l1 = document.createElement('label'); l1.textContent = '📅 Due';
  var d1 = document.createElement('input'); d1.type = 'date'; d1.id = 'editDue'; d1.value = t.due_date || '';
  f1.appendChild(l1); f1.appendChild(d1);

  var f2 = document.createElement('div'); f2.className = 'td-edit-field'; f2.style.flex = '2';
  var l2 = document.createElement('label'); l2.textContent = '📝 Note';
  var n2 = document.createElement('input'); n2.id = 'editNote'; n2.value = t.note || ''; n2.placeholder = 'Optional note...';
  f2.appendChild(l2); f2.appendChild(n2);

  row.appendChild(f1); row.appendChild(f2);

  var btns = document.createElement('div'); btns.className = 'td-edit-btns';
  var bSave = document.createElement('button'); bSave.className = 'btn-save'; bSave.textContent = 'Save';
  bSave.addEventListener('click', function(){ saveEdit(id); });
  var bCancel = document.createElement('button'); bCancel.className = 'btn-cancel'; bCancel.textContent = 'Cancel';
  bCancel.addEventListener('click', cancelEdit);
  btns.appendChild(bSave); btns.appendChild(bCancel);

  wrap.appendChild(inp); wrap.appendChild(row); wrap.appendChild(btns);
  body.appendChild(wrap);

  el.querySelector('.td-actions').style.display = 'none';
  inp.focus();
}

function cancelEdit() {
  editingId = null;
  renderList();
}

async function saveEdit(id) {
  var title = (document.getElementById('editTitle').value || '').trim();
  if (!title) { UTILS.toast('Title cannot be empty', 'warning'); return; }
  var due  = document.getElementById('editDue').value || '';
  var note = document.getElementById('editNote').value || '';
  try {
    await API.post('ptodo_update', { todo_id: id, title: title, due_date: due, note: note });
    editingId = null;
    UTILS.toast('Updated ✓', 'success');
    await loadTodos();
  } catch(ex) {
    UTILS.toast('Error: ' + ex.message, 'error');
  }
}

// ── DELETE ────────────────────────────────────────────────
async function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  todos = todos.filter(function(t){ return t.todo_id !== id; });
  updateUI();
  try {
    await API.post('ptodo_delete', { todo_id: id });
    UTILS.toast('Deleted', 'info');
  } catch(ex) {
    UTILS.toast('Error deleting', 'error');
    await loadTodos();
  }
}

// ── REFRESH ───────────────────────────────────────────────
async function refreshTodos() {
  var icon = document.getElementById('refreshIcon');
  if (icon) icon.classList.add('spinning');
  await loadTodos();
  setTimeout(function(){ if(icon) icon.classList.remove('spinning'); }, 600);
}

// ── NOTIFICATIONS BELL ────────────────────────────────────
async function loadBell() {
  try {
    var d = await API.get('notif_list', { limit:'5', unread_only:'true' });
    var nb = document.getElementById('notifBadge');
    if (nb) {
      if ((d.unread_count || 0) > 0) { nb.textContent = d.unread_count; nb.classList.remove('hidden'); }
      else nb.classList.add('hidden');
    }
  } catch(e) {}
}


// Event delegation for todo items
document.getElementById('tdList').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var id = btn.getAttribute('data-id');
  var action = btn.getAttribute('data-action');
  if (action === 'toggle') toggleDone(id);
  else if (action === 'edit') startEdit(id);
  else if (action === 'delete') deleteTodo(id);
});

// ── INIT ─────────────────────────────────────────────────
loadBell();
loadTodos();
setInterval(loadBell, 60000);
setInterval(loadTodos, 60000);

</script>
<script>
// ── MOBILE MORE SHEET ─────────────────────────────────────
function toggleMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var isOpen=sheet&&sheet.style.transform==='translateY(0px)';
  isOpen?closeMobileMore():openMobileMore();
}
function openMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var overlay=document.getElementById('mobileMoreOverlay');
  var btn=document.getElementById('btnMobileMore');
  if(!sheet)return;
  sheet.style.display='block';
  if(overlay)overlay.style.display='block';
  if(btn)btn.classList.add('active');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){sheet.style.transform='translateY(0px)';});
  });
  var s=AUTH&&AUTH.getSession?AUTH.getSession():{};
  if(s&&s.full_name){
    var ini=s.full_name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var av=document.getElementById('moreAvatar');if(av)av.textContent=ini;
    var nm=document.getElementById('moreName');if(nm)nm.textContent=s.full_name;
    var rl=document.getElementById('moreRole');if(rl)rl.textContent=s.role||'';
    var dp=document.getElementById('moreDept');if(dp)dp.textContent=s.department||'KIB';
  }
}
function closeMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var overlay=document.getElementById('mobileMoreOverlay');
  var btn=document.getElementById('btnMobileMore');
  if(sheet)sheet.style.transform='translateY(100%)';
  if(btn)btn.classList.remove('active');
  setTimeout(function(){
    if(sheet)sheet.style.display='none';
    if(overlay)overlay.style.display='none';
  },280);
}
</script>

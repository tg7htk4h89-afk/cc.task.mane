<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To-Do — ADC Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   ADC Task Manager — Design System v2
   Clean Enterprise | Deep Navy + Precision Blue
═══════════════════════════════════════════════ */

/* ── Design Tokens ─────────────────────────── */
:root {
  /* Brand — KIB */
  --navy:        #060F24;
  --navy-2:      #0D1B3E;
  --navy-3:      #142556;
  --blue:        #1877C5;
  --blue-2:      #1565A8;
  --blue-dim:    rgba(24,119,197,0.12);
  --blue-light:  #E8F1FB;

  /* Semantic */
  --green:       #0EA472;
  --green-dim:   #ECFDF5;
  --red:         #E5383B;
  --red-dim:     #FFF0F0;
  --amber:       #F4A523;
  --amber-dim:   #FFFBEB;
  --purple:      #7B61FF;
  --purple-dim:  #F5F3FF;
  --teal:        #0891B2;
  --teal-dim:    #F0F9FF;
  --pink:        #EC4899;
  --pink-dim:    #FFF0F9;
  --orange:      #F97316;
  --orange-dim:  #FFF7ED;

  /* Surface — WFM-matching */
  --bg:          #F4F6FB;
  --card:        #FFFFFF;
  --card-hover:  #FAFCFF;
  --border:      #E4EAF3;
  --border-2:    #D0D9E8;

  /* Text */
  --t1:          #0A1628;
  --t2:          #4A5568;
  --t3:          #8A9BB0;
  --t4:          #B8C5D4;

  /* Sidebar */
  --sb:          var(--navy-2);
  --sb-text:     rgba(255,255,255,0.5);
  --sb-active-bg:rgba(24,119,197,0.22);
  --sb-width:    220px;

  /* Sizing */
  --r-sm:        8px;
  --r-md:        12px;
  --r-lg:        16px;
  --r-xl:        20px;

  /* Shadows */
  --sh-xs:  0 1px 3px rgba(6,15,36,.04);
  --sh-sm:  0 2px 8px rgba(6,15,36,.06), 0 1px 3px rgba(6,15,36,.04);
  --sh-md:  0 4px 16px rgba(6,15,36,.10);
  --sh-lg:  0 12px 40px rgba(6,15,36,.15);

  --ease: .2s cubic-bezier(.4,0,.2,1);
}

/* ── Reset ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--t1);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }

/* ── App Layout ─────────────────────────────── */
.app-layout { display: flex; min-height: 100vh; }

/* ── Sidebar ────────────────────────────────── */
.sidebar {
  width: var(--sb-width);
  background: var(--sb);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 200;
  overflow-y: auto;
  transition: transform var(--ease);
}
.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logomark {
  width: 34px; height: 34px;
  background: var(--blue); border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #fff;
  letter-spacing: -0.5px; margin-bottom: 10px;
}
.sidebar-title { color: #fff; font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-sub   { color: rgba(255,255,255,0.3); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.sidebar-nav   { padding: 10px 0; flex: 1; }
.nav-section {
  padding: 10px 18px 4px;
  font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,0.22);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin-top: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; margin: 1px 8px;
  border-radius: var(--r-md);
  color: var(--sb-text); font-size: 12px; font-weight: 500;
  transition: all var(--ease); cursor: pointer; text-decoration: none;
}
.nav-item svg { width: 16px; height: 16px; stroke-width: 2; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); text-decoration: none; }
.nav-item.active { background: var(--sb-active-bg); color: var(--sb-active); }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--red); color: #fff;
  font-size: 9px; font-weight: 700;
  border-radius: 5px; padding: 1px 5px;
  line-height: 1.4;
}
.sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.user-chip { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.user-name  { color: #fff; font-size: 12px; font-weight: 600; }
.user-role  { color: rgba(255,255,255,0.4); font-size: 10px; }
.btn-logout {
  margin-left: auto; background: none; border: none;
  color: rgba(255,255,255,0.3); padding: 4px;
  border-radius: var(--r-sm); transition: color var(--ease);
  display: flex; align-items: center;
}
.btn-logout:hover { color: var(--red); }
.btn-logout svg { width: 14px; height: 14px; }
.sidebar-toggle {
  display: none; background: none; border: none;
  padding: 6px; color: var(--t2);
}
.sidebar-toggle svg { width: 20px; height: 20px; }

/* ── Main Content ───────────────────────────── */
.main-content { margin-left: var(--sb-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top Bar ────────────────────────────────── */
.top-bar {
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
}
.breadcrumb { font-size: 13px; font-weight: 600; color: var(--t1); flex: 1; }
.breadcrumb span { color: var(--t3); font-weight: 400; }
.search-bar {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 7px 12px;
  display: flex; align-items: center; gap: 8px;
  transition: border-color var(--ease);
}
.search-bar:focus-within { border-color: var(--blue); }
.search-bar svg { width: 14px; height: 14px; color: var(--t3); stroke: var(--t3); flex-shrink: 0; }
.search-bar input {
  background: none; border: none; outline: none;
  font-size: 12px; color: var(--t1); width: 200px;
}
.search-bar input::placeholder { color: var(--t4); }
.notif-bell {
  width: 32px; height: 32px; border-radius: var(--r-md);
  background: var(--bg); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; transition: background var(--ease);
}
.notif-bell:hover { background: var(--blue-light); border-color: var(--blue); }
.notif-bell svg { width: 15px; height: 15px; stroke: var(--t2); }
.notif-badge {
  position: absolute; top: 4px; right: 4px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 1.5px solid var(--card);
}
.notif-badge.hidden { display: none; }
.date-chip {
  font-size: 11px; color: var(--t3); font-weight: 500;
  white-space: nowrap; display: none;
}

/* ── Page Content ───────────────────────────── */
.page-content { padding: 24px; flex: 1; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title  { font-size: 20px; font-weight: 800; color: var(--t1); letter-spacing: -0.5px; line-height: 1.2; }
.page-sub    { font-size: 12px; color: var(--t3); margin-top: 3px; }
.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Buttons ────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--r-md);
  font-size: 12px; font-weight: 600; font-family: var(--font);
  border: none; cursor: pointer; transition: all var(--ease);
  white-space: nowrap; line-height: 1;
}
.btn svg { width: 13px; height: 13px; }
.btn-primary  { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(24,119,197,0.25); }
.btn-primary:hover  { background: #1565A8; box-shadow: 0 4px 14px rgba(24,119,197,0.35); }
.btn-secondary { background: var(--card); color: var(--t1); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); border-color: var(--border-2); }
.btn-danger   { background: var(--red); color: #fff; }
.btn-danger:hover { background: #C12D2F; }
.btn-ghost    { background: none; color: var(--t2); border: none; padding: 6px 10px; }
.btn-ghost:hover { background: var(--bg); color: var(--t1); }
.btn-sm       { padding: 5px 12px; font-size: 11px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }


/* ── KPI CARDS — WFM Style ─────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card {
  background: var(--card);
  border-radius: var(--r-lg);
  padding: 18px 18px 16px;
  border: 1.5px solid var(--border);
  box-shadow: var(--sh-xs);
  position: relative;
  overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  cursor: default;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--sh-sm); }
.kpi-icon {
  width: 38px; height: 38px; border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 12px;
}
.kpi-val, .kpi-value {
  font-size: 28px; font-weight: 800; color: var(--t1);
  line-height: 1; margin-bottom: 4px; letter-spacing: -1px;
}
.kpi-label, .kpi-lbl {
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: .6px;
}
.kpi-delta { font-size: 11px; font-weight: 600; margin-top: 4px; }
.kpi-delta.up   { color: var(--green); }
.kpi-delta.dn   { color: var(--red); }
.kpi-delta.warn { color: var(--amber); }

/* Colored KPI variants — matching WFM portal */
.kpi-green  { background: var(--green-dim);  border-color: #A7F3D0; }
.kpi-green  .kpi-val, .kpi-green  .kpi-value { color: var(--green); }
.kpi-green  .kpi-icon { background: #A7F3D0; }

.kpi-amber  { background: var(--amber-dim);  border-color: #FDE68A; }
.kpi-amber  .kpi-val, .kpi-amber  .kpi-value { color: var(--amber); }
.kpi-amber  .kpi-icon { background: #FDE68A; }

.kpi-red    { background: var(--red-dim);    border-color: #FECACA; }
.kpi-red    .kpi-val, .kpi-red    .kpi-value { color: var(--red); }
.kpi-red    .kpi-icon { background: #FECACA; }

.kpi-blue   { background: var(--blue-light); border-color: #BFDBFE; }
.kpi-blue   .kpi-val, .kpi-blue   .kpi-value { color: var(--blue); }
.kpi-blue   .kpi-icon { background: #BFDBFE; }

.kpi-purple { background: var(--purple-dim); border-color: #DDD6FE; }
.kpi-purple .kpi-val, .kpi-purple .kpi-value { color: var(--purple); }
.kpi-purple .kpi-icon { background: #DDD6FE; }

.kpi-teal   { background: var(--teal-dim);   border-color: #A5F3FC; }
.kpi-teal   .kpi-val, .kpi-teal   .kpi-value { color: var(--teal); }
.kpi-teal   .kpi-icon { background: #A5F3FC; }

.kpi-orange { background: var(--orange-dim); border-color: #FED7AA; }
.kpi-orange .kpi-val, .kpi-orange .kpi-value { color: var(--orange); }
.kpi-orange .kpi-icon { background: #FED7AA; }

/* Legacy color support */
.kpi-blue::after, .kpi-red::after, .kpi-green::after, .kpi-amber::after, .kpi-purple::after { display: none; }


/* ── Chart Cards ────────────────────────────── */
.chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
.chart-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-sm);
}
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.chart-title  { font-size: 13px; font-weight: 700; color: var(--t1); }
.chart-sub    { font-size: 11px; color: var(--t3); }
.chart-wrap   { position: relative; height: 200px; }

/* ── Panel ──────────────────────────────────── */
.panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px; box-shadow: var(--sh-sm);
  overflow: hidden;
}
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-title  { font-size: 13px; font-weight: 700; color: var(--t1); }
.panel-link   { font-size: 11px; font-weight: 600; color: var(--blue); cursor: pointer; }
.panel-link:hover { text-decoration: underline; }

/* ── Bottom grid ────────────────────────────── */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr 300px; gap: 12px; }

/* ── Task list rows ─────────────────────────── */
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background var(--ease);
  border-radius: var(--r-sm); margin: 0 -4px; padding-left: 4px;
}
.task-row:last-child { border-bottom: none; }
.task-row:hover .task-title { color: var(--blue); }
.priority-line { width: 3px; height: 34px; border-radius: 2px; flex-shrink: 0; }
.pl-critical { background: var(--red); }
.pl-high     { background: var(--amber); }
.pl-medium   { background: var(--blue); }
.pl-low      { background: var(--green); }
.task-info   { flex: 1; min-width: 0; }
.task-title  { font-size: 12px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color var(--ease); }
.task-meta   { font-size: 10px; color: var(--t3); margin-top: 2px; }
.task-av-sm {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.status-pill {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 5px; white-space: nowrap; flex-shrink: 0;
}
.sp-inprogress { background: var(--blue-light);  color: #1060A0; }
.sp-overdue    { background: var(--red-dim);      color: #A32020; }
.sp-completed  { background: var(--green-dim);    color: #0A6E4A; }
.sp-new        { background: var(--purple-dim);   color: #4E38A0; }
.sp-pending    { background: var(--amber-dim);    color: #8A5A0A; }
.sp-escalated  { background: #F3E8FF;              color: #5B21B6; }

/* ── Notification items ─────────────────────── */
.notif-item {
  display: flex; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.notif-item:last-child { border-bottom: none; }
.notif-severity { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.ns-critical { background: var(--red); }
.ns-warning  { background: var(--amber); }
.ns-info     { background: var(--green); }
.notif-title { font-size: 11px; font-weight: 600; color: var(--t1); }
.notif-body  { font-size: 10px; color: var(--t2); margin-top: 2px; line-height: 1.4; }
.notif-time  { font-size: 9px; color: var(--t3); margin-top: 3px; font-weight: 500; }

/* ── Score panel ────────────────────────────── */
.score-ring-wrap { position: relative; width: 96px; height: 96px; margin: 4px auto 12px; }
.score-ring-wrap canvas { width: 96px !important; height: 96px !important; }
.score-center-val {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 22px; font-weight: 800; color: var(--t1); text-align: center; line-height: 1;
}
.score-center-lbl { font-size: 9px; color: var(--t3); font-weight: 500; margin-top: 2px; }
.score-breakdown .sr {
  display: flex; align-items: center;
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
.score-breakdown .sr:last-child { border-bottom: none; }
.sr-lbl { font-size: 10px; color: var(--t2); min-width: 110px; }
.sr-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 0 8px; }
.sr-fill { height: 100%; border-radius: 2px; background: var(--blue); }
.sr-val { font-size: 10px; font-weight: 700; color: var(--t1); min-width: 24px; text-align: right; }

/* ── KANBAN BOARD ───────────────────────────── */
.kanban-wrap { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; align-items: flex-start; }
.kanban-wrap::-webkit-scrollbar { height: 6px; }
.kanban-wrap::-webkit-scrollbar-track { background: var(--bg); border-radius: 3px; }
.kanban-wrap::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.kanban-col { min-width: 272px; max-width: 272px; display: flex; flex-direction: column; gap: 8px; }
.kanban-col-header {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 3px solid var(--border);
}
.kcol-new        .kanban-col-header { border-top-color: #7B61FF; }
.kcol-inprogress .kanban-col-header { border-top-color: var(--blue); }
.kcol-pending    .kanban-col-header { border-top-color: var(--amber); }
.kcol-overdue    .kanban-col-header { border-top-color: var(--red); }
.kcol-escalated  .kanban-col-header { border-top-color: #9B59B6; }
.kcol-completed  .kanban-col-header { border-top-color: var(--green); }
.kcol-title { font-size: 12px; font-weight: 700; color: var(--t1); display: flex; align-items: center; gap: 8px; }
.kcol-dot { width: 8px; height: 8px; border-radius: 50%; }
.kcol-count {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--t2); font-size: 11px; font-weight: 600;
  border-radius: 6px; padding: 2px 8px;
}

/* ── Task Card (Kanban) ─────────────────────── */
.k-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 14px;
  cursor: pointer; transition: all var(--ease);
  box-shadow: var(--sh-sm); width: 100%; font-family: var(--font); text-align: left;
}
.k-card:hover { box-shadow: var(--sh-md); border-color: var(--border-2); transform: translateY(-1px); }
.k-card.is-overdue { border-left: 3px solid var(--red); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.k-card.is-done    { opacity: 0.75; }
.k-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.k-card-title { font-size: 12px; font-weight: 700; color: var(--t1); line-height: 1.4; flex: 1; }
.k-card-id { font-size: 9px; color: var(--t3); font-weight: 600; margin-bottom: 6px; font-family: var(--mono); }
.k-card-desc { font-size: 11px; color: var(--t2); line-height: 1.5; margin-bottom: 10px; }
.k-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.k-tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
}
.ktag-c  { background: #F0EEFF; color: #4E38A0; }
.ktag-q  { background: var(--blue-light); color: #0F5EA0; }
.ktag-o  { background: var(--green-dim); color: #0A6030; }
.ktag-s  { background: var(--amber-dim); color: #7A4800; }
.ktag-t  { background: #FDE8F3; color: #8B1A5A; }
.ktag-h  { background: #E0F2FE; color: #065080; }
.ktag-g  { background: var(--bg); color: var(--t2); }
.ktag-e  { background: var(--red-dim); color: #8A1818; }
.ktag-r  { background: var(--purple-dim); color: #4E38A0; }
.ktag-m  { background: var(--green-dim); color: #0A5030; }
.k-card-footer { display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
.k-priority { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.kp-c{background:var(--red)} .kp-h{background:var(--amber)} .kp-m{background:var(--blue)} .kp-l{background:var(--green)}
.k-progress { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.k-prog-fill { height: 100%; border-radius: 2px; background: var(--blue); }
.k-prog-fill.pw { background: var(--amber); }
.k-prog-fill.pd { background: var(--red); }
.k-prog-fill.pg { background: var(--green); }
.k-time { font-size: 10px; font-weight: 600; white-space: nowrap; }
.kt-ok     { color: var(--green); }
.kt-warn   { color: var(--amber); }
.kt-danger { color: var(--red); }
.k-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.k-plus-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--bg); border: 1.5px dashed var(--border-2);
  color: var(--t3); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 2px auto 0; cursor: pointer; transition: all var(--ease);
}
.k-plus-btn:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.k-empty {
  background: var(--bg); border: 1.5px dashed var(--border-2);
  border-radius: var(--r-lg); padding: 18px;
  text-align: center; color: var(--t3); font-size: 11px; font-weight: 500;
}

/* ── Forms ──────────────────────────────────── */
.form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; box-shadow: var(--sh-sm); margin-bottom: 14px; }
.form-section-title { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--t2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: var(--r-md);
  font-size: 13px; color: var(--t1); background: var(--card);
  transition: border-color var(--ease), box-shadow var(--ease); outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(24,119,197,0.12);
}
.form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.req { color: var(--red); }

/* ── Tables ─────────────────────────────────── */
.table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-sm); overflow: hidden; }
.table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.table-filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-select {
  padding: 7px 12px; border: 1px solid var(--border);
  border-radius: var(--r-md); font-size: 12px; font-family: var(--font);
  background: var(--bg); color: var(--t1); outline: none; cursor: pointer;
  transition: border-color var(--ease);
}
.filter-select:focus { border-color: var(--blue); }
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 16px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--t3);
  border-bottom: 1px solid var(--border);
  background: var(--bg); white-space: nowrap;
}
.data-table td { padding: 11px 16px; font-size: 12px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #FAFCFF; }
.data-table tr.row-overdue td { background: #FFF5F5; }

/* ── Badges ─────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600; letter-spacing: 0.2px; white-space: nowrap; }
.badge-blue    { background: var(--blue-light);  color: #0F5EA0; }
.badge-indigo  { background: #E8E6FF; color: #3D2DB0; }
.badge-yellow  { background: #FFFBEB; color: #856C00; }
.badge-green   { background: var(--green-dim);   color: #0A6030; }
.badge-red     { background: var(--red-dim);     color: #8A1818; }
.badge-gray    { background: var(--bg);           color: var(--t2); }
.badge-purple  { background: var(--purple-dim);  color: #4E38A0; }
.badge-orange  { background: var(--amber-dim);   color: #7A4800; }

/* ── Progress ───────────────────────────────── */
.progress-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bar  { flex: 1; background: var(--border); border-radius: 3px; height: 5px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width 0.5s ease; }
.progress-fill.success { background: var(--green); }
.progress-fill.warning { background: var(--amber); }
.progress-fill.danger  { background: var(--red); }
.progress-label { font-size: 11px; color: var(--t2); white-space: nowrap; min-width: 36px; text-align: right; }

/* ── Handover cards ─────────────────────────── */
.handover-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.ho-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px; cursor: pointer;
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.ho-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.ho-card.missing { border-color: var(--red); background: #FFFAFB; }
.ho-card.missing::before { content: 'MISSING'; font-size: 9px; font-weight: 700; color: var(--red); letter-spacing: 1px; margin-bottom: 8px; display: block; }
.shift-chip { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 5px; display: inline-flex; align-items: center; }
.shift-morning   { background: #FEF9C3; color: #7A5F00; }
.shift-afternoon { background: var(--amber-dim); color: #7A4800; }
.shift-evening   { background: var(--purple-dim); color: #4E38A0; }
.shift-night     { background: #F0F0F5; color: #4A4A6A; }
.quality-score { font-size: 22px; font-weight: 800; }

/* ── Training cards ─────────────────────────── */
.training-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
.trn-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px; cursor: pointer;
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.trn-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }
.trn-card.delayed { border-left: 3px solid var(--red); border-radius: 0 var(--r-lg) var(--r-lg) 0; }
.trend-chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
.trend-ahead   { background: var(--green-dim);  color: #0A6030; }
.trend-ontrack { background: var(--blue-light); color: #0F5EA0; }
.trend-behind  { background: var(--amber-dim);  color: #7A4800; }
.trend-atrisk  { background: var(--red-dim);    color: #8A1818; }

/* ── Sales ranks ────────────────────────────── */
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-row {
  display: grid; grid-template-columns: 24px 20px 1fr auto auto;
  align-items: center; gap: 10px;
  padding: 11px 14px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--r-md);
  box-shadow: var(--sh-sm); transition: all var(--ease);
}
.rank-row:hover { box-shadow: var(--sh-md); }
.rank-row.r1 { border-left: 3px solid #F4A523; background: #FFFCF0; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-row.r2 { border-left: 3px solid #9DAEC2; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-row.r3 { border-left: 3px solid #CD7C2F; background: #FFF9F5; border-radius: 0 var(--r-md) var(--r-md) 0; }
.rank-pos  { font-size: 12px; font-weight: 800; color: var(--t3); text-align: center; }
.rank-medal { font-size: 14px; text-align: center; }
.rank-name { font-size: 12px; font-weight: 600; color: var(--t1); }
.rank-team { font-size: 10px; color: var(--t3); }
.rank-amount { font-size: 12px; font-weight: 700; text-align: right; white-space: nowrap; }
.rank-pct  { font-size: 11px; font-weight: 700; text-align: right; white-space: nowrap; }

/* ── Toast ──────────────────────────────────── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  display: flex; align-items: center; gap: 10px;
  background: var(--navy-2); color: #fff;
  border-radius: var(--r-lg); padding: 12px 16px;
  box-shadow: var(--sh-lg); min-width: 260px; max-width: 380px;
  border-left: 3px solid var(--blue);
  animation: slideUp 0.3s ease; opacity: 1; transition: opacity 0.3s;
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; }
.toast span { font-size: 12px; flex: 1; }
.toast.success { border-left-color: var(--green); }
.toast.success svg { stroke: var(--green); }
.toast.error   { border-left-color: var(--red); }
.toast.error svg { stroke: var(--red); }
.toast.warning { border-left-color: var(--amber); }
.toast.warning svg { stroke: var(--amber); }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── Modal ──────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(6,15,36,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(3px); animation: fadeIn 0.2s ease; }
.modal { background: var(--card); border-radius: var(--r-xl); box-shadow: var(--sh-lg); width: 100%; max-width: 520px; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid var(--border); }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title  { font-size: 15px; font-weight: 700; color: var(--t1); }
.modal-close  { background: var(--bg); border: none; width: 28px; height: 28px; border-radius: var(--r-sm); cursor: pointer; font-size: 16px; color: var(--t2); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); }
.modal-body   { padding: 20px 22px; overflow-y: auto; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Skeleton loader ────────────────────────── */
.skeleton-wrap { padding: 14px; }
.skeleton-row { height: 48px; background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%); background-size: 200% 100%; animation: shimmer 1.6s infinite; border-radius: var(--r-md); margin-bottom: 10px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Empty state ────────────────────────────── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; color: var(--t3); text-align: center; gap: 12px; }
.empty-state svg { width: 40px; height: 40px; stroke: var(--t4); }
.empty-state-title { font-size: 14px; font-weight: 600; color: var(--t2); }
.empty-state-sub   { font-size: 12px; }

/* ── Notification drawer ────────────────────── */
.notif-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 340px;
  background: var(--card); box-shadow: var(--sh-lg);
  z-index: 500; display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  transform: translateX(0); transition: transform var(--ease);
}
.notif-drawer.hidden { transform: translateX(100%); }
.notif-drawer-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.notif-drawer-header h3 { font-size: 14px; font-weight: 700; flex: 1; color: var(--t1); }
.notif-drawer-header button { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 10px; font-size: 11px; color: var(--t2); cursor: pointer; font-family: var(--font); }
.notif-list { flex: 1; overflow-y: auto; }
.notif-list .notif-item { padding: 12px 18px; cursor: pointer; transition: background var(--ease); }
.notif-list .notif-item.unread { background: #F5F9FF; }
.notif-list .notif-item:hover { background: var(--bg); }
.notif-unread-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 5px; }

/* ── Login page ─────────────────────────────── */
.login-page { background: #0D1B3E; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: var(--card); border-radius: var(--r-xl); padding: 40px; width: 400px; max-width: 100%; box-shadow: var(--sh-lg); }
.login-logo { margin-bottom: 32px; }
.login-logomark { width: 48px; height: 48px; background: var(--blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -0.5px; margin-bottom: 14px; }
.login-heading { font-size: 20px; font-weight: 800; color: var(--t1); letter-spacing: -0.5px; }
.login-sub { font-size: 12px; color: var(--t3); margin-top: 4px; }
.form-error { background: var(--red-dim); color: #8A1818; border-radius: var(--r-md); padding: 10px 12px; font-size: 12px; margin-top: 10px; }
.login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--t3); }

/* ── Utility ────────────────────────────────── */
.hidden { display: none !important; }
.mono   { font-family: var(--mono); }
.t-muted   { color: var(--t3); }
.t-danger  { color: var(--red); }
.t-success { color: var(--green); }
.t-warning { color: var(--amber); }
.t-blue    { color: var(--blue); }
.fw-700    { font-weight: 700; }
.flex      { display: flex; }
.flex-center  { display: flex; align-items: center; justify-content: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
.mt-4 { margin-top: 16px; } .mb-4 { margin-bottom: 16px; }
.mb-5 { margin-bottom: 20px; } .p-4 { padding: 16px; }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 1280px) {
  .kpi-grid  { grid-template-columns: repeat(3, 1fr); }
  .bottom-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 1024px) {
  .chart-grid  { grid-template-columns: 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  .kpi-grid    { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex; align-items: center; }
  .main-content { margin-left: 0; }
  .top-bar { padding: 0 16px; }
  .search-bar { display: none; }
  .page-content { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .kanban-wrap { padding-bottom: 70px; }
  .page-content { padding-bottom: 80px; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .kpi-value { font-size: 20px; }
}

/* ── UNIVERSAL MOBILE ─────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .25s ease; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.35); }
  .sidebar-toggle { display: flex !important; align-items: center; justify-content: center; }
  .main-content { margin-left: 0 !important; }
  .top-bar { padding: 0 14px; gap: 8px; }
  .page-content { padding: 14px !important; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .page-title { font-size: 18px; }
  .breadcrumb { font-size: 13px; }
  .search-bar { display: none; }
  .form-row, .form-row-3 { grid-template-columns: 1fr !important; }
  .form-card { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
  .kanban-board { grid-template-columns: 1fr !important; }
  .kanban-col { min-width: 0 !important; }
  .kanban-wrap { overflow-x: unset; }
  .stats-row, .bottom-grid, .chart-grid { grid-template-columns: 1fr !important; }
  .btn { padding: 8px 14px; font-size: 12px; }
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .modal-inner, [style*="max-width:660px"], [style*="max-width: 660px"] { max-width: 100% !important; margin: 8px !important; border-radius: 14px !important; }
  #taskModal { padding: 8px !important; }
  .filter-bar, .filter-row { gap: 6px; flex-wrap: wrap; }
  .filter-btn, .f-btn { font-size: 11px; padding: 5px 11px; }
  .add-bottom { flex-wrap: wrap; }
  .todo-actions { opacity: 1 !important; }
  .stats-strip { flex-wrap: wrap; gap: 8px; }
  .rec-btn { padding: 10px 6px !important; font-size: 12px !important; }
  .sidebar-overlay { display: block; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr !important; }
  .page-content { padding: 10px !important; }
  .form-card { padding: 14px; }
  .top-bar { height: 50px; }
  .stats-strip { gap: 6px; }
  .stat-pill { font-size: 11px; padding: 5px 10px; }
}
.sidebar-overlay { display: none; }
@media (max-width: 768px) {
  #sidebarOverlay { display: none; }
  .sidebar.open ~ #sidebarOverlay, #sidebarOverlay.visible { display: block !important; }
}


/* ═══════════════════════════════════════════════════════
   MOBILE UX IMPROVEMENTS — Full Access on Mobile
   ═══════════════════════════════════════════════════════ */

/* Base touch targets */
button, .btn, .nav-item, a.nav-item, .k-card, .task-row {
  min-height: 44px;
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.05);
}

/* Prevent zoom on input focus */
input, select, textarea {
  font-size: 16px !important;
}

/* Smooth scrolling */
* { -webkit-overflow-scrolling: touch; }

/* ── PHONE (≤480px) ───────────────────────────────── */
@media (max-width: 480px) {

  /* Sidebar */
  .sidebar { width: 85vw !important; max-width: 300px; }
  .main-content { margin-left: 0 !important; }

  /* Top bar */
  .top-bar { padding: 0 10px !important; height: 52px !important; }
  .breadcrumb { font-size: 13px !important; }
  .search-bar { display: none !important; }

  /* Page content */
  .page-content { padding: 10px !important; }

  /* KPI grids — 2 columns always */
  .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
  .kpi-card { padding: 12px 10px !important; }
  .kpi-value { font-size: 20px !important; }
  .kpi-label { font-size: 10px !important; }

  /* Page headers */
  .page-header { flex-direction: column !important; align-items: flex-start !important; gap: 10px !important; }
  .page-actions { width: 100% !important; justify-content: space-between !important; }

  /* Cards */
  .card, .kpi-card, .shift-card { border-radius: 10px !important; }

  /* Modals — full screen on phone */
  #taskModal, #trainingModal, #newTaskModal, #hoModal {
    padding: 0 !important;
    align-items: flex-end !important;
  }
  #taskModal > div, #trainingModal > div, #newTaskModal > div, #hoModal > div {
    border-radius: 20px 20px 0 0 !important;
    max-height: 92vh !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  #taskModalBody, #cardBody {
    max-height: calc(92vh - 120px) !important;
  }

  /* Kanban — horizontal scroll */
  .kanban-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; padding-bottom: 16px !important; }
  .kanban-board { display: flex !important; gap: 10px !important; min-width: max-content !important; }
  .kanban-col { min-width: 260px !important; width: 260px !important; }

  /* Tables — horizontal scroll */
  .table-card, table { overflow-x: auto !important; display: block !important; }
  thead, tbody, tr { display: table !important; width: 100% !important; table-layout: fixed !important; }
  table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; }

  /* Forms */
  .form-row { flex-direction: column !important; }
  .form-group { width: 100% !important; }
  input[type=date], input[type=number], select { width: 100% !important; }

  /* Buttons */
  .btn { padding: 10px 16px !important; font-size: 12px !important; }
  .btn-primary, .btn-post { min-height: 44px !important; }

  /* Training cards */
  .plan-card { padding: 14px !important; }
  .plan-header { flex-direction: column !important; gap: 8px !important; }

  /* Handover */
  .shifts-grid { grid-template-columns: 1fr !important; }
  .kpi-row { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }

  /* Sales */
  .sales-grid { grid-template-columns: 1fr !important; }
  .chart-grid { grid-template-columns: 1fr !important; }

  /* Notifications */
  .notif-list { padding: 0 !important; }

  /* Tab bars — horizontal scroll */
  .tab-bar, [class*="tab-bar"] {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch !important;
    flex-wrap: nowrap !important;
    scrollbar-width: none !important;
  }
  .tab-bar::-webkit-scrollbar { display: none !important; }

  /* Hide non-essential columns in tables */
  .col-hide-mobile { display: none !important; }

  /* Floating action button for New Task */
  .fab-new {
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;

// ================================================================
// KIB WORKING CALENDAR — Kuwait Public Holidays + Working Hours
// Working days: Sunday–Thursday
// Weekend: Friday, Saturday
// Working hours: 08:00 – 16:00 AST (UTC+3)
// ================================================================

var KIB_CALENDAR = {

  // Kuwait timezone offset (UTC+3, no DST)
  TZ_OFFSET: 3 * 60, // minutes

  // Working hours
  WORK_START: 8,  // 8:00 AM
  WORK_END:   16, // 4:00 PM

  // Weekend days (0=Sun,1=Mon,...,5=Fri,6=Sat)
  WEEKEND: [5, 6], // Friday, Saturday

  // Kuwait Public Holidays (add each year)
  HOLIDAYS: [
    // 2025
    '2025-01-01', // New Year
    '2025-02-25', // National Day
    '2025-02-26', // Liberation Day
    '2025-03-31', // Isra Mi'raj (estimated)
    '2025-06-07', // Eid Al Fitr (estimated)
    '2025-06-08',
    '2025-06-09',
    '2025-06-15', // Arafat Day (estimated)
    '2025-06-16', // Eid Al Adha
    '2025-06-17',
    '2025-06-18',
    '2025-07-07', // Islamic New Year (estimated)
    '2025-09-15', // Prophet's Birthday (estimated)
    // 2026
    '2026-01-01', // New Year
    '2026-02-25', // National Day
    '2026-02-26', // Liberation Day
    '2026-03-20', // Isra Mi'raj (estimated)
    '2026-05-27', // Eid Al Fitr (estimated)
    '2026-05-28',
    '2026-05-29',
    '2026-06-06', // Arafat Day (estimated)
    '2026-06-07', // Eid Al Adha
    '2026-06-08',
    '2026-06-09',
    '2026-06-27', // Islamic New Year (estimated)
    '2026-09-05', // Prophet's Birthday (estimated)
  ],

  // Get current Kuwait time
  nowKuwait: function() {
    var now = new Date();
    return new Date(now.getTime() + (this.TZ_OFFSET - now.getTimezoneOffset()) * 60000);
  },

  // Convert any date to Kuwait date
  toKuwait: function(date) {
    var d = date instanceof Date ? date : new Date(date);
    return new Date(d.getTime() + (this.TZ_OFFSET - d.getTimezoneOffset()) * 60000);
  },

  // Format date as YYYY-MM-DD
  toDateStr: function(date) {
    var d = this.toKuwait(date instanceof Date ? date : new Date(date));
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  },

  // Is a given date a holiday?
  isHoliday: function(date) {
    var ds = this.toDateStr(date);
    return this.HOLIDAYS.indexOf(ds) !== -1;
  },

  // Is a given date a weekend day?
  isWeekend: function(date) {
    var d = this.toKuwait(date instanceof Date ? date : new Date(date));
    return this.WEEKEND.indexOf(d.getDay()) !== -1;
  },

  // Is a given date a working day?
  isWorkingDay: function(date) {
    return !this.isWeekend(date) && !this.isHoliday(date);
  },

  // Is the current moment within working hours?
  // A task is only "overdue" during working hours on working days
  isWorkingTime: function(date) {
    var d = this.toKuwait(date instanceof Date ? date : new Date(date));
    if (!this.isWorkingDay(d)) return false;
    var h = d.getHours();
    return h >= this.WORK_START && h < this.WORK_END;
  },

  // Add N working days to a date, returning the due datetime
  // Due time = WORK_END (16:00) on the Nth working day
  addWorkingDays: function(fromDate, days) {
    var d = this.toKuwait(fromDate instanceof Date ? fromDate : new Date(fromDate));
    // Start from next working day if outside working hours
    var h = d.getHours();
    if (h >= this.WORK_END || !this.isWorkingDay(d)) {
      // Move to start of next working day
      d.setDate(d.getDate() + 1);
      d.setHours(this.WORK_START, 0, 0, 0);
      while (!this.isWorkingDay(d)) {
        d.setDate(d.getDate() + 1);
      }
      days--; // First day already consumed
    }
    // Count working days
    var counted = 0;
    while (counted < days) {
      d.setDate(d.getDate() + 1);
      if (this.isWorkingDay(d)) counted++;
    }
    // Set due time to end of working day
    d.setHours(this.WORK_END, 0, 0, 0);
    return d;
  },

  // Check if a task is currently overdue
  // Only overdue during working hours on working days
  isOverdue: function(dueDateStr, status) {
    if (!dueDateStr || status === 'Completed' || status === 'Cancelled') return false;
    var now = this.nowKuwait();
    if (!this.isWorkingTime(now)) return false; // Not overdue outside working hours
    var due = this.toKuwait(new Date(dueDateStr));
    return now > due;
  },

  // Get next working day start
  nextWorkingDayStart: function() {
    var d = this.nowKuwait();
    d.setDate(d.getDate() + 1);
    d.setHours(this.WORK_START, 0, 0, 0);
    while (!this.isWorkingDay(d)) {
      d.setDate(d.getDate() + 1);
    }
    return d;
  },

  // Get minimum due date for calendar picker (next working day)
  minDueDate: function() {
    var d = this.nowKuwait();
    // If still in working hours today, today is valid
    if (this.isWorkingDay(d) && d.getHours() < this.WORK_END) {
      return this.toDateStr(d);
    }
    return this.toDateStr(this.nextWorkingDayStart());
  },

  // Format relative time label (working-hours aware)
  formatTimeLabel: function(dueDateStr) {
    if (!dueDateStr) return { label: '—', overdue: false };
    var now = this.nowKuwait();
    var due = this.toKuwait(new Date(dueDateStr));
    var diff = due - now;
    var abs = Math.abs(diff);
    var label;
    if (abs < 3600000) label = Math.floor(abs / 60000) + 'm';
    else if (abs < 86400000) label = Math.floor(abs / 3600000) + 'h';
    else label = Math.floor(abs / 86400000) + 'd';
    return {
      label: diff < 0 ? label + ' over' : label + ' left',
      overdue: this.isOverdue(dueDateStr, 'active')
    };
  }
};

    '<div class="hero-stat"><div class="hero-stat-val" style="color:#6EE7B7">'+done+'</div><div class="hero-stat-lbl">Done</div></div>'+
    (over?'<div class="hero-stat"><div class="hero-stat-val" style="color:#FCA5A5">'+over+'</div><div class="hero-stat-lbl">Overdue</div></div>':'')+
    (!over&&tod?'<div class="hero-stat"><div class="hero-stat-val" style="color:#FCD34D">'+tod+'</div><div class="hero-stat-lbl">Today</div></div>':'');
  document.getElementById('heroStats').innerHTML=hs;
}

// Load
async function loadTodos(){
  try{
    var d=await API.get('ptodo_list',{});
    allTodos=d.todos||[];
    render();
  }catch(ex){
    document.getElementById('todoList').innerHTML='<div style="padding:32px;text-align:center;color:#EF4444">⚠️ '+UTILS.esc(ex.message)+'</div>';
  }
}

function setF(btn){document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');curF=btn.dataset.f;render();}

function render(){
  updateHero();
  var items=allTodos.filter(function(t){
    if(curF==='pending')return t.status!=='Done';
    if(curF==='done')return t.status==='Done';
    if(curF==='today')return isToday(t.due_date)&&t.status!=='Done';
    if(curF==='overdue')return isOver(t.due_date)&&t.status!=='Done';
    return true;
  });
  if(!items.length){
    var ei={pending:'🎉',done:'📋',today:'☀️',overdue:'✅',all:'📝'};
    var em={pending:'All clear — nothing pending!',done:'No completed items yet.',today:'Nothing due today.',overdue:'No overdue items — nice!',all:'No to-dos yet. Add one above!'};
    document.getElementById('todoList').innerHTML='<div class="empty"><span class="empty-icon">'+(ei[curF]||'📝')+'</span><div class="empty-title">'+(em[curF]||'')+'</div><div class="empty-sub">Your list is looking great ✨</div></div>';
    return;
  }
  var ov=items.filter(function(t){return isOver(t.due_date)&&t.status!=='Done';});
  var td=items.filter(function(t){return isToday(t.due_date)&&t.status!=='Done';});
  var up=items.filter(function(t){return !isOver(t.due_date)&&!isToday(t.due_date)&&t.status!=='Done';});
  var dn=items.filter(function(t){return t.status==='Done';});
  var html='';
  if(ov.length)html+=grp('🔴 Overdue',ov);
  if(td.length)html+=grp('⏰ Due Today',td);
  if(up.length)html+=grp('📅 Upcoming',up);
  if(dn.length)html+=grp('✅ Done',dn);
  document.getElementById('todoList').innerHTML=html;
}

function grp(label,items){
  return '<div class="grp-lbl">'+label+'<span class="grp-cnt">'+items.length+'</span></div>'+items.map(card).join('');
}

function card(t){
  var done=t.status==='Done';
  var ov=isOver(t.due_date)&&!done;
  var tod=isToday(t.due_date)&&!done;
  var cls='todo-item'+(done?' done':'')+(ov?' overdue':tod?' due-today':'');
  var dp='';
  if(t.due_date){var dc=ov?'d-over':tod?'d-today':'d-ok';var di=ov?'🔴':tod?'⏰':'📅';dp='<span class="t-date '+dc+'">'+di+' '+UTILS.fmtDate(t.due_date)+'</span>';}
  return '<div class="'+cls+'" id="item_'+t.todo_id+'" style="animation:slideIn .18s ease">'+
    '<div class="t-left"><div class="chk'+(done?' chk-done':'')+'" data-tid="'+t.todo_id+'" data-done="'+done+'" onclick="handleToggle(this)">'+
      (done?'<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'')+
    '</div></div>'+
    '<div class="t-body">'+
      '<div class="t-title'+(done?' done-txt':'')+'">'+UTILS.esc(t.title)+'</div>'+
      (t.note?'<div class="t-note">'+UTILS.esc(t.note)+'</div>':'')+
      (dp?'<div class="t-meta">'+dp+'</div>':'')+
    '</div>'+
    '<div class="t-right">'+
      '<button class="act-btn" onclick="startEdit(\''+t.todo_id+'\')" title="Edit"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'+
      '<button class="act-btn act-del" onclick="deleteTodo(\''+t.todo_id+'\')" title="Delete"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>'+
    '</div>'+
  '</div>';
}

// Add
async function addTodo(){
  var title=(document.getElementById('addInput').value||'').trim();
  if(!title){document.getElementById('addInput').focus();UTILS.toast('Please enter a title','warning');return;}
  var date=document.getElementById('addDate').value||'';
  var note=(document.getElementById('addNote').value||'').trim();
  var btn=document.getElementById('btnAdd');
  btn.disabled=true;btn.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="animation:spin .8s linear infinite"><line x1="12" y1="2" x2="12" y2="6"/></svg> Adding...';
  try{
    var d=await API.post('ptodo_add',{title:title,due_date:date,note:note});
    var newItem=d.todo||{todo_id:d.todo_id||('tmp_'+Date.now()),title:title,note:note,due_date:date,status:'Pending'};
    allTodos.unshift(newItem);
    document.getElementById('addInput').value='';
    document.getElementById('addDate').value='';
    document.getElementById('addNote').value='';
    addCard.classList.remove('focused');
    if(curF==='done')document.querySelector('[data-f="pending"]').click();else render();
    UTILS.toast('Added!','success');
  }catch(ex){UTILS.toast('Error: '+ex.message,'error');}
  btn.disabled=false;
  btn.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add';
}

// Toggle
function handleToggle(el){toggleDone(el.dataset.tid,el.dataset.done==='true');}
async function toggleDone(id,isDone){
  var ns=isDone?'Pending':'Done';
  var t=allTodos.find(function(x){return x.todo_id===id;});
  if(t)t.status=ns;
  render();
  try{await API.post('ptodo_update',{todo_id:id,status:ns});}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');if(t)t.status=isDone?'Done':'Pending';render();}
}

// Edit
function startEdit(id){
  var t=allTodos.find(function(x){return x.todo_id===id;});if(!t)return;
  var el=document.getElementById('item_'+id);if(!el)return;
  el.innerHTML=
    '<div class="t-left"><div class="chk" style="margin-top:3px"></div></div>'+
    '<div class="edit-wrap">'+
      '<input class="edit-title" id="et_'+id+'" value="'+UTILS.esc(t.title)+'" placeholder="Task title">'+
      '<div class="edit-row">'+
        '<div class="edit-fld"><label>📅 Due</label><input type="date" id="ed_'+id+'" value="'+(t.due_date||'')+'"></div>'+
        '<div class="edit-fld" style="flex:1"><label>📝</label><input id="en_'+id+'" value="'+UTILS.esc(t.note||'')+'" placeholder="Note..."></div>'+
      '</div>'+
      '<div class="edit-btns">'+
        '<button class="btn-sv" onclick="saveEdit(\''+id+'\')">Save</button>'+
        '<button class="btn-cn" onclick="render()">Cancel</button>'+
      '</div>'+
    '</div>'+
    '<div class="t-right"></div>';
  document.getElementById('et_'+id).focus();
}

async function saveEdit(id){
  var title=(document.getElementById('et_'+id).value||'').trim();
  var date=document.getElementById('ed_'+id).value||'';
  var note=(document.getElementById('en_'+id).value||'').trim();
  if(!title){UTILS.toast('Title cannot be empty','error');return;}
  var t=allTodos.find(function(x){return x.todo_id===id;});
  if(t){t.title=title;t.due_date=date;t.note=note;}
  render();
  try{await API.post('ptodo_update',{todo_id:id,title:title,due_date:date,note:note});UTILS.toast('Saved','success');}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}

// Delete
async function deleteTodo(id){
  if(!confirm('Delete this to-do?'))return;
  allTodos=allTodos.filter(function(t){return t.todo_id!==id;});render();
  try{await API.post('ptodo_delete',{todo_id:id});}
  catch(ex){UTILS.toast('Error: '+ex.message,'error');loadTodos();}
}

loadTodos();loadBell();
setInterval(function(){loadTodos();},300000);

var _scrollY = 0;
function lockBodyScroll() {
  _scrollY = document.querySelector('.main-content') ? 
    document.querySelector('.main-content').scrollTop : window.scrollY;
  document.body.classList.add('modal-open');
}
function unlockBodyScroll() {
  document.body.classList.remove('modal-open');
  var mc = document.querySelector('.main-content');
  if (mc) mc.scrollTop = _scrollY;
}
// ── END MOBILE SCROLL ──────────────────────────────────────

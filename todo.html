<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
<title>My To-Do — ADC Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   ADC TASK MANAGER — Clean CSS (branches design system)
   Single file, no conflicts, 22KB
   ══════════════════════════════════════════════════════════ */
:root {
  --navy: #060F24; --navy-2: #0D1B3E; --navy-3: #142556;
  --blue: #1877C5; --blue-2: #1565A8;
  --blue-dim: rgba(24,119,197,0.12); --blue-light: #E8F1FB;
  --green: #0EA472; --green-dim: #ECFDF5;
  --red: #E5383B; --red-dim: #FEE8E8;
  --amber: #F4A523; --amber-dim: #FEF5E7;
  --purple: #7B61FF; --purple-dim: #F0EEFF;
  --bg: #F0F4F9; --card: #FFFFFF; --card-hover: #FAFCFF;
  --border: #E4EAF3; --border-2: #D0D9E8;
  --t1: #0A1628; --t2: #4A5568; --t3: #8A9BB0; --t4: #B8C5D4;
  --sb: var(--navy-2); --sb-text: rgba(255,255,255,0.5);
  --sb-active-bg: rgba(24,119,197,0.18); --sb-active: #5BA8E8;
  --sb-width: 220px; --topbar-h: 52px;
  --font: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px;
  --sh-sm: 0 1px 3px rgba(10,22,40,.06), 0 1px 2px rgba(10,22,40,.04);
  --sh-md: 0 4px 12px rgba(10,22,40,.08), 0 1px 3px rgba(10,22,40,.05);
  --sh-lg: 0 12px 32px rgba(10,22,40,.12), 0 4px 8px rgba(10,22,40,.06);
  --ease: .2s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body { font-family: var(--font); background: var(--bg); color: var(--t1); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: var(--blue); text-decoration: none; }
button, input, select, textarea { font-family: var(--font); }

/* ── APP LAYOUT ──────────────────────────────────────────── */
.app-layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar {
  width: var(--sb-width); background: var(--sb);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 200; overflow-y: auto;
  transition: transform .25s ease;
}
.sidebar-header {
  padding: 18px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logomark {
  width: 34px; height: 34px; background: var(--blue);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 800; letter-spacing: -0.5px; flex-shrink: 0;
}
.sidebar-title { color: #fff; font-size: 12.5px; font-weight: 700; letter-spacing: -.2px; }
.sidebar-sub { color: rgba(255,255,255,.35); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-top: 1px; }

.sidebar-nav { padding: 10px 8px; flex: 1; }
.nav-section { padding: 8px 10px 5px; font-size: 9px; font-weight: 700; color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: 1px; }
.nav-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border: none; background: transparent;
  color: var(--sb-text); font-size: 12.5px; font-weight: 500;
  border-radius: var(--r-sm); text-align: left; margin-bottom: 1px;
  transition: background .15s, color .15s; position: relative;
  text-decoration: none; cursor: pointer;
}
.nav-item:hover { background: rgba(255,255,255,.04); color: rgba(255,255,255,.8); }
.nav-item.active { background: var(--sb-active-bg); color: var(--sb-active); font-weight: 600; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 2.5px; background: var(--sb-active); border-radius: 0 2px 2px 0;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .8; }
.nav-item.active svg { opacity: 1; }

.sidebar-footer { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.08); }
.sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--r-sm); }
.user-av {
  width: 28px; height: 28px; background: var(--blue); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.user-name { color: #fff; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { color: rgba(255,255,255,.4); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }

/* ── SIDEBAR OVERLAY ─────────────────────────────────────── */
#sidebarOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 190;
}

/* ── MAIN CONTENT AREA ───────────────────────────────────── */
.layout-main, .main-content {
  flex: 1; margin-left: var(--sb-width);
  display: flex; flex-direction: column; min-height: 100vh;
}

/* ── TOP BAR ──────────────────────────────────────────────── */
.top-bar {
  height: var(--topbar-h); background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.sb-toggle, .sidebar-toggle {
  display: none; background: transparent; border: 1px solid var(--border);
  color: var(--t2); padding: 6px; border-radius: var(--r-md); cursor: pointer;
  align-items: center; justify-content: center; width: 34px; height: 34px;
  transition: background .15s; flex-shrink: 0;
}
.sb-toggle:hover, .sidebar-toggle:hover { background: var(--bg); }
.breadcrumb {
  font-size: 15px; font-weight: 700; color: var(--t1);
  letter-spacing: -.2px; flex: 1;
}
.breadcrumb small { display: block; font-size: 10px; font-weight: 500; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }
.top-spacer { flex: 1; }
.top-btn {
  background: transparent; border: 1px solid var(--border); color: var(--t2);
  padding: 6px 12px; border-radius: var(--r-md); font-size: 12px; font-weight: 500;
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  transition: all .15s;
}
.top-btn:hover { background: var(--bg); color: var(--t1); border-color: var(--border-2); }

/* ── PAGE CONTENT ────────────────────────────────────────── */
.page-content { padding: 24px; flex: 1; max-width: 1400px; }

/* ── HERO CARD ───────────────────────────────────────────── */
.task-hero {
  background: linear-gradient(135deg, var(--navy-2) 0%, var(--blue-2) 60%, var(--blue) 100%);
  border-radius: var(--r-xl); padding: 22px 24px;
  margin-bottom: 20px; display: flex; align-items: center;
  justify-content: space-between; gap: 20px;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 24px rgba(13,27,62,.2);
}
.task-hero::before {
  content: ''; position: absolute; top: -60px; right: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(255,255,255,.05); pointer-events: none;
}
.task-hero-body { flex: 1; min-width: 0; position: relative; z-index: 1; }
.task-hero-tag { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 4px; }
.task-hero-title { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -.3px; margin-bottom: 14px; }
.task-hero-stats { display: flex; gap: 20px; flex-wrap: wrap; }
.task-hero-val { font-size: 26px; font-weight: 800; color: #fff; line-height: 1; }
.task-hero-lbl { font-size: 9px; font-weight: 600; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .7px; margin-top: 3px; }
.task-hero-ring { width: 76px; height: 76px; flex-shrink: 0; position: relative; z-index: 1; }

/* ── BOARD HEADER ────────────────────────────────────────── */
.board-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
}
.board-filters {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
}
.board-filters::-webkit-scrollbar { display: none; }
.f-pill {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--t2); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all .15s; white-space: nowrap;
  display: inline-flex; align-items: center; height: 32px; flex-shrink: 0;
}
.f-pill:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.f-pill.on { background: var(--navy-2); color: #fff; border-color: var(--navy-2); box-shadow: var(--sh-sm); }

/* ── NEW TASK BUTTON ──────────────────────────────────────── */
.btn-new {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue); color: #fff; border: none;
  border-radius: var(--r-md); padding: 8px 16px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background .15s, transform .1s;
  white-space: nowrap;
}
.btn-new:hover { background: var(--blue-2); }
.btn-new:active { transform: translateY(1px); }

/* ── KANBAN ───────────────────────────────────────────────── */
.kanban-wrap {
  display: flex; gap: 12px; align-items: flex-start;
  overflow-x: auto; padding-bottom: 20px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.kanban-wrap::-webkit-scrollbar { display: none; }
.k-col { flex-shrink: 0; width: 260px; }
.k-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-top: 3px solid; border-radius: var(--r-md);
  padding: 9px 12px; margin-bottom: 8px;
  box-shadow: var(--sh-sm);
}
.k-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.k-label { font-size: 11.5px; font-weight: 700; color: var(--t1); flex: 1; }
.k-count {
  font-size: 10px; font-weight: 700; color: var(--t3);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px 8px;
}
.k-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px 13px;
  margin-bottom: 7px; cursor: pointer; width: 100%;
  text-align: left; font-family: inherit;
  transition: box-shadow .15s, border-color .15s, transform .15s;
  box-shadow: var(--sh-sm);
}
.k-card:hover { box-shadow: var(--sh-md); border-color: var(--border-2); transform: translateY(-1px); }
.k-card.is-overdue { border-left: 3px solid var(--red); border-radius: 0 var(--r-md) var(--r-md) 0; }
.k-card-id { font-size: 9px; color: var(--t4); margin-bottom: 4px; letter-spacing: .3px; }
.k-card-title { font-size: 12.5px; font-weight: 700; color: var(--t1); line-height: 1.4; margin-bottom: 6px; }
.k-card-cat { display: inline-flex; font-size: 10px; color: var(--blue); background: var(--blue-light); padding: 2px 7px; border-radius: 4px; margin-bottom: 7px; font-weight: 600; }
.k-card-bottom { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.k-pri { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.k-pri.Critical { color: #991B1B; background: var(--red-dim); }
.k-pri.High     { color: #92400E; background: var(--amber-dim); }
.k-pri.Medium   { color: #1E40AF; background: var(--blue-light); }
.k-pri.Low      { color: #065F46; background: var(--green-dim); }
.k-prog { flex: 1; height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
.k-prog-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .5s; }
.k-empty {
  padding: 24px 16px; text-align: center; color: var(--t4);
  font-size: 12px; border: 1.5px dashed var(--border);
  border-radius: var(--r-md); background: var(--card-hover);
}
.k-add {
  width: 100%; margin-top: 4px; height: 34px;
  border: 1.5px dashed var(--border); border-radius: var(--r-md);
  background: transparent; color: var(--t3); font-size: 12px;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 5px; font-family: inherit;
  transition: all .15s;
}
.k-add:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn {
  background: var(--blue); color: #fff; border: none;
  border-radius: var(--r-md); padding: 8px 16px;
  font-size: 12px; font-weight: 600; letter-spacing: .2px;
  cursor: pointer; transition: background .15s, transform .1s;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.btn:hover:not(:disabled) { background: var(--blue-2); }
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: .55; cursor: not-allowed; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--t2); }
.btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--t1); border-color: var(--border-2); }
.btn-danger { background: transparent; border: 1px solid rgba(229,56,59,.3); color: var(--red); }
.btn-danger:hover:not(:disabled) { background: var(--red-dim); }
.btn-success { background: var(--green); }
.btn-success:hover:not(:disabled) { background: #0A7A55; }
.btn-sm { padding: 5px 11px; font-size: 11px; }

/* ── BADGES ──────────────────────────────────────────────── */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; letter-spacing: .2px; }
.b-new       { background: #EEF0FF; color: #3730A3; }
.b-inprogress{ background: var(--blue-light); color: #1E40AF; }
.b-pending   { background: var(--amber-dim); color: #92400E; }
.b-overdue   { background: var(--red-dim); color: #991B1B; }
.b-completed { background: var(--green-dim); color: #065F46; }
.b-escalated { background: var(--purple-dim); color: #5B21B6; }
.b-cancelled { background: #F1F5F9; color: #64748B; }

/* ── CARDS ───────────────────────────────────────────────── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--sh-sm); margin-bottom: 14px; overflow: hidden; }
.card-head { padding: 13px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.card-title { font-size: 13px; font-weight: 700; color: var(--t1); }
.card-sub   { font-size: 11px; color: var(--t3); margin-top: 2px; }
.card-body  { padding: 16px 18px; }

/* ── FORM ────────────────────────────────────────────────── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
.form-label { font-size: 10px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: var(--r-md); font-size: 13px; font-family: var(--font);
  background: #FAFCFF; color: var(--t1); outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px var(--blue-dim);
}
.form-input::placeholder { color: var(--t3); }

/* ── TABLE ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .6px; background: #F8FAFC; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--card-hover); }
tbody td { padding: 11px 14px; font-size: 12.5px; color: var(--t2); vertical-align: middle; }

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay, #taskModal, #newTaskModal {
  position: fixed; inset: 0;
  background: rgba(10,22,40,.55); backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  z-index: 300; padding: 20px;
}
#taskModal { padding: 20px; }
.modal, .modal-inner {
  background: var(--card); border-radius: var(--r-lg);
  width: 100%; max-width: 640px; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--sh-lg);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* Task modal — larger */
#taskModalSheet {
  background: var(--card); border-radius: var(--r-lg);
  width: 100%; max-width: 860px; height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: var(--sh-lg); overflow: hidden;
  transform: scale(.97) translateY(10px); opacity: 0;
  transition: transform .28s cubic-bezier(.32,0,.15,1), opacity .25s;
}
#taskModalHeader { flex-shrink: 0; overflow: hidden; }
#taskModalBody   { overflow-y: auto; flex: 1; min-height: 0; padding-bottom: 20px; }

.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 14px; font-weight: 700; color: var(--t1); }
.modal-close { background: none; border: none; color: var(--t3); font-size: 22px; line-height: 1; cursor: pointer; width: 28px; height: 28px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--bg); color: var(--t1); }
.modal-body   { padding: 16px 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── TASK MODAL TABS ──────────────────────────────────────── */
.tmtab {
  padding: 10px 16px; font-size: 11px; font-weight: 600;
  color: var(--t3); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .15s; font-family: inherit;
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.tmtab:hover { color: var(--t1); }
.tmtab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tmtab-wrap { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.tmtab-wrap::-webkit-scrollbar { display: none; }
.tmpanel { display: none; padding: 16px 20px; }
.tmpanel.active { display: block; }

/* ── LOADING / EMPTY / TOAST ─────────────────────────────── */
.loading-wrap { padding: 48px; text-align: center; color: var(--t3); font-size: 13px; }
.spinner-sm { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.k-empty-global { padding: 48px 20px; text-align: center; }
.k-empty-global svg { margin: 0 auto 12px; display: block; }
.k-empty-title { font-size: 14px; font-weight: 700; color: var(--t2); margin-bottom: 4px; }
.k-empty-sub   { font-size: 12px; color: var(--t3); }

/* Progress bar */
.prog-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog-fill  { height: 100%; background: var(--blue); border-radius: 3px; transition: width .4s; }

/* ── MOBILE BOTTOM NAV ───────────────────────────────────── */
.mobile-bottom-nav {
  display: none;
  background: var(--navy-2); border-top: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 -4px 16px rgba(10,22,40,.2);
  flex-direction: row; align-items: stretch;
}
.mbn-item {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; flex: 1;
  color: rgba(255,255,255,.38); text-decoration: none;
  padding: 6px 4px; font-size: 10px; font-weight: 600;
  transition: color .15s; min-width: 48px; cursor: pointer;
}
.mbn-item:hover, .mbn-item.active { color: var(--blue); }
.mbn-item.active svg { stroke: var(--blue) !important; }
.mbn-item svg { width: 21px; height: 21px; }
.mbn-more { background: none; border: none; }

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.page-content { animation: fadeIn .25s ease; }

/* ── MOBILE BOTTOM SHEET (more menu) ────────────────────── */
.more-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
  background: var(--card); border-radius: 18px 18px 0 0;
  box-shadow: 0 -8px 32px rgba(10,22,40,.15);

<script>


var API_BASE='https://n8n.kib-cc-wfm.com/webhook';
var SES_KEY='kib_ops_session';
var API={
  _t:function(){var s=AUTH.getSession();return s?s.session_token:null;},
  post:async function(action,body){
    var path=action.replace(/_/g,'-');
    var url=API_BASE+'/kib/'+path;
    var p=Object.assign({},body||{});
    var t=this._t();if(t)p.session_token=t;
    var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    var txt=await r.text();var d;
    try{d=JSON.parse(txt);}catch(e){throw new Error('Server '+r.status+': '+(txt||'empty').slice(0,120));}
    if(!d.success)throw new Error(d.error&&d.error.message?d.error.message:d.message||'API error');
    return d.data;
  },
  get:async function(action,params){return this.post(action,params||{});}
};
var AUTH={
  getSession:function(){try{var s=JSON.parse(localStorage.getItem(SES_KEY));return s&&new Date(s.expires_at)>new Date()?s:null;}catch(e){return null;}},
  requireAuth:function(){if(!this.getSession())window.location.href='/login.html';},
  logout:function(){localStorage.removeItem(SES_KEY);window.location.href='/login.html';},
  hasRole:function(r){var s=this.getSession();if(!s)return false;return Array.isArray(r)?r.indexOf(s.role)!==-1:s.role===r;},
  canDo:function(a){var s=this.getSession();if(!s)return false;var m={'tasks.create':['HoD','Manager','DGM','DataEntry','QA Manager'],'handover.create':['HoD','Manager','TL','AL'],'training.create':['HoD','Manager','QA Manager'],'sales.entry':['HoD','Manager','TL','AL'],'settings.edit':['HoD','DGM']};if(a==='tasks.create'&&window.KIB_HIERARCHY){return KIB_HIERARCHY.canCreateTask(s.role);}return m[a]?m[a].indexOf(s.role)!==-1:true;},
  getUserId:function(){var s=this.getSession();return s?s.user_id:null;},
  getRole:function(){var s=this.getSession();return s?s.role:'';}
};
var UTILS={
  esc:function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');},
  fdt:function(iso){if(!iso)return'—';try{var d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}catch(e){return String(iso).slice(0,16);}},
  fd:function(iso){if(!iso)return'—';try{return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return String(iso).slice(0,10);}},
  today:function(){return new Date(Date.now()+3*3600000).toISOString().slice(0,10);},
  tr:function(iso){
    if(!iso)return{label:'—',overdue:false,diffMs:0};
    var diff=new Date(iso)-Date.now();
    var abs=Math.abs(diff);
    var label=abs<3600000?Math.floor(abs/60000)+'m':abs<86400000?Math.floor(abs/3600000)+'h':Math.floor(abs/86400000)+'d';
    var isOv=window.KIB_CALENDAR?KIB_CALENDAR.isOverdue(iso,'active'):diff<0;
    return{label:diff<0?label+' over':label+' left',overdue:isOv,diffMs:diff};
  },
  ini:function(n){return String(n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();},
  _avc:[['#3B82F6','#fff'],['#8B5CF6','#fff'],['#10B981','#fff'],['#F59E0B','#fff'],['#EC4899','#fff'],['#0EA472','#fff'],['#EF4444','#fff'],['#6366F1','#fff'],['#14B8A6','#fff'],['#F97316','#fff']],
  avc:function(n){var h=0,s=String(n||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return this._avc[h%this._avc.length];},
  av:function(n,sz){sz=sz||28;var c=this.avc(n);return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c[0]+';color:'+c[1]+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.38)+'px;font-weight:700;flex-shrink:0">'+this.ini(n)+'</div>';},
  toast:function(msg,type){var c={success:'#0EA472',error:'#E5383B',warning:'#F4A523',info:'#1877C5'};var t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0D1B3E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;border-left:3px solid '+(c[type]||c.info)+';box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;max-width:340px;font-family:inherit';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},3500);},
  empty:function(id,title,sub){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:#8A9BB0;text-align:center;gap:8px"><svg width="36" height="36" fill="none" stroke="#B8C5D4" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg><div style="font-size:13px;font-weight:600;color:#4A5568">'+(title||'No data')+'</div>'+(sub?'<div style="font-size:11px">'+sub+'</div>':'')+'</div>';},
  loader:function(id){var el=document.getElementById(id);if(!el)return;el.innerHTML='<div style="padding:20px;display:flex;flex-direction:column;gap:10px"><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div><div style="height:44px;background:linear-gradient(90deg,#F0F4F9 25%,#E4EAF3 50%,#F0F4F9 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px"></div></div>';},
  setUser:function(s){
    if(!s)return;
    // Support both sidebar HTML structures
    var i=document.getElementById('avatarInitials')||document.querySelector('.user-avatar');
    var n=document.getElementById('sidebarName')||document.querySelector('.user-name');
    var r=document.getElementById('sidebarRole')||document.querySelector('.user-role');
    if(i)i.textContent=this.ini(s.full_name);
    if(n)n.textContent=s.display_name||s.full_name.split(' ')[0];
    if(r)r.textContent=s.role;
    document.querySelectorAll('[data-roles]').forEach(function(el){
      if(el.getAttribute('data-roles').split(',').map(function(x){return x.trim();}).indexOf(s.role)===-1)el.style.display='none';
    });
  },
  sidebar:function(){var btn=document.getElementById('sidebarToggle'),sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');if(btn&&sb){btn.addEventListener('click',function(){sb.classList.toggle('open');if(ov)ov.style.display=sb.classList.contains('open')?'block':'none';});}}
};



AUTH.requireAuth();
var _sess = AUTH.getSession() || {};
UTILS.setUser(_sess);
UTILS.sidebar();

// ── PAGE TITLE ───────────────────────────────────────────
var _name = (_sess.full_name || '').split(' ')[0] || 'My';
document.getElementById('heroTitle').textContent = _name + "'s To-Do List";
document.getElementById('pageTitle').textContent = _name + "'s To-Do";

// ── STATE ────────────────────────────────────────────────
var todos = [];
var currentFilter = 'pending';
var editingId = null;

// ── DATE HELPERS ─────────────────────────────────────────
function todayStr() {
  // Kuwait is UTC+3
  var now = new Date(Date.now() + 3 * 3600000);
  return now.toISOString().slice(0, 10);
}
function normDate(d) {
  if (!d) return '';
  return String(d).slice(0, 10);
}
function formatDate(iso) {
  if (!iso || iso === 'null' || iso === 'undefined') return null;
  // Handle both date-only (YYYY-MM-DD) and full ISO strings
  var dateStr = String(iso).slice(0, 10);
  if (!dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) return null;
  var parts = dateStr.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()];
}
function dateClass(iso) {
  if (!iso) return '';
  var d = normDate(iso);
  if (!d) return '';
  var today = todayStr();
  if (d < today) return 'overdue';
  if (d === today) return 'today-due';
  return '';
}

// ── LOAD ─────────────────────────────────────────────────
async function loadTodos() {
  try {
    var d = await API.get('ptodo_list', {});
    todos = (d.todos || []).filter(function(t) { return t && t.todo_id; }).map(function(t){
      // Normalize status: n8n stores 'Done', UI uses 'Completed'
      if(t.status === 'Done') t.status = 'Completed';
      // Normalize due_date to YYYY-MM-DD string
      if(t.due_date && typeof t.due_date === 'string' && t.due_date.length > 10) {
        t.due_date = t.due_date.slice(0, 10);
      }
      return t;
    });
    updateUI();
  } catch(ex) {
    document.getElementById('tdList').innerHTML = '<div class="td-empty"><div class="td-empty-icon">⚠️</div><div class="td-empty-title">Could not load to-do list</div><div class="td-empty-sub">' + UTILS.esc(ex.message) + '</div></div>';
  }
}

// ── UPDATE UI ─────────────────────────────────────────────
function updateUI() {
  updateHero();
  updateTabs();
  renderList();
}

function updateHero() {
  var today = todayStr();
  var pending = todos.filter(function(t){ return t.status !== 'Completed'; });
  var done    = todos.filter(function(t){ return t.status === 'Completed'; });
  var overdue = pending.filter(function(t){ return normDate(t.due_date) && normDate(t.due_date) < today; });
  var dueToday = pending.filter(function(t){ return normDate(t.due_date) === today; });
  document.getElementById('heroPending').textContent   = pending.length;
  document.getElementById('heroDone').textContent      = done.length;
  document.getElementById('heroOverdue').textContent   = overdue.length;
  document.getElementById('heroDueToday').textContent  = dueToday.length;
  var pct = todos.length > 0 ? Math.round(done.length / todos.length * 100) : 0;
  var circ = 32 * 2 * Math.PI; // r=32
  var offset = circ - (pct / 100) * circ;
  var ring = document.getElementById('ringFill');
  if (ring) { ring.style.strokeDashoffset = offset; ring.setAttribute('stroke-dasharray', circ); }
  var ringPct = document.getElementById('ringPct');
  if (ringPct) ringPct.textContent = pct + '%';
}

function updateTabs() {
  var today = todayStr();
  var pending = todos.filter(function(t){ return t.status !== 'Completed'; });
  var done    = todos.filter(function(t){ return t.status === 'Completed'; });
  var overdue = pending.filter(function(t){ return normDate(t.due_date) && normDate(t.due_date) < today; });
  var dueToday = pending.filter(function(t){ return normDate(t.due_date) === today; });
  document.getElementById('cntPending').textContent  = pending.length;
  document.getElementById('cntToday').textContent    = dueToday.length;
  document.getElementById('cntOverdue').textContent  = overdue.length;
  document.getElementById('cntDone').textContent     = done.length;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.td-tab').forEach(function(b){ b.classList.remove('active'); });
  if (el) el.classList.add('active');
  renderList();
}

// ── RENDER ────────────────────────────────────────────────
function renderList() {
  var today = todayStr();
  var list = document.getElementById('tdList');

  // Filter
  var items;
  if (currentFilter === 'pending')  items = todos.filter(function(t){ return t.status !== 'Completed'; });
  else if (currentFilter === 'done') items = todos.filter(function(t){ return t.status === 'Completed'; });
  else if (currentFilter === 'overdue') items = todos.filter(function(t){ return t.status !== 'Completed' && normDate(t.due_date) && normDate(t.due_date) < today; });
  else if (currentFilter === 'today') items = todos.filter(function(t){ return t.status !== 'Completed' && normDate(t.due_date) === today; });
  else items = todos;

  if (!items.length) {
    var msgs = {
      pending: ['📋', 'All caught up!', 'No pending tasks. Add something above.'],
      done:    ['✅', 'Nothing done yet', 'Complete a task to see it here.'],
      overdue: ['🎉', 'No overdue tasks!', 'Everything is on track.'],
      today:   ['📅', 'Nothing due today', 'Your schedule is clear.'],
      all:     ['📝', 'No to-do items', 'Add your first task above.'],
    };
    var m = msgs[currentFilter] || msgs.all;
    list.innerHTML = '<div class="td-empty"><div class="td-empty-icon">'+m[0]+'</div><div class="td-empty-title">'+m[1]+'</div><div class="td-empty-sub">'+m[2]+'</div></div>';
    return;
  }

  // Group: Overdue / Today / Upcoming / Done
  if (currentFilter === 'all' || currentFilter === 'pending') {
    var groups = [
      { key:'overdue',  label:'Overdue',  items: items.filter(function(t){ return t.status!=='Completed' && normDate(t.due_date) && normDate(t.due_date) < today; }) },
      { key:'today',    label:'Due Today', items: items.filter(function(t){ return t.status!=='Completed' && normDate(t.due_date) === today; }) },
      { key:'upcoming', label:'Upcoming',  items: items.filter(function(t){ return t.status!=='Completed' && (!t.due_date || normDate(t.due_date) > today); }) },
      { key:'done',     label:'Completed', items: items.filter(function(t){ return t.status==='Completed'; }) },
    ].filter(function(g){ return g.items.length > 0; });

    list.innerHTML = groups.map(function(g) {
      return renderGroup(g.label, g.items);
    }).join('');
  } else {
    var groupLabel = { done:'Completed', overdue:'Overdue', today:'Due Today', all:'All Tasks' };
    list.innerHTML = renderGroup(groupLabel[currentFilter] || '', items);
  }
}

function renderGroup(label, items) {
  var html = '<div class="td-group"><span>' + UTILS.esc(label) + '</span><span class="td-group-cnt">' + items.length + '</span></div>';
  html += items.map(renderItem).join('');
  return html;
}

function renderItem(t) {
  var today = todayStr();
  var dc = dateClass(normDate(t.due_date));
  var isDone = t.status === 'Completed';
  var eid = t.todo_id;

  var dateHtml = '';
  if (normDate(t.due_date)) {
    var cls = isDone ? 'td-ok' : (dc === 'overdue' ? 'td-over' : dc === 'today-due' ? 'td-today' : 'td-ok');
    var icon = dc === 'overdue' ? '⚠️' : dc === 'today-due' ? '⏰' : '📅';
    dateHtml = '<span class="td-date ' + cls + '">' + icon + ' ' + (formatDate(normDate(t.due_date)) || '') + '</span>';
  }
  var noteHtml = t.note ? '<div class="td-note">' + UTILS.esc(t.note) + '</div>' : '';
  var doneChk = isDone
    ? '<svg width="12" height="12" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
    : '';

  return (
    '<div class="td-item' + (isDone?' done':'') + (dc?' '+dc:'') + '" id="item-'+eid+'">'
    + '<div class="td-chk-wrap">'
    + '<div class="td-chk'+(isDone?' done':'')+'" data-id="'+eid+'" data-action="toggle">'
    + doneChk
    + '</div></div>'
    + '<div class="td-body">'
    + '<div class="td-title'+(isDone?' done':'')+'">'+UTILS.esc(t.title)+'</div>'
    + noteHtml
    + '<div class="td-meta">'+dateHtml+'</div>'
    + '</div>'
    + '<div class="td-actions">'
    + '<button class="td-btn" data-id="'+eid+'" data-action="edit" title="Edit">'
    + '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
    + '</button>'
    + '<button class="td-btn del" data-id="'+eid+'" data-action="delete" title="Delete">'
    + '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
    + '</button>'
    + '</div>'
    + '</div>'
  );
}

// ── ADD ───────────────────────────────────────────────────

// ── ADD CARD INTERACTIONS ────────────────────────────────
var noteShowing = false;

function focusAdd() {
  document.getElementById('addCard').classList.add('focused');
  document.getElementById('tdInput').focus();
}

function blurAdd() {
  document.getElementById('addCard').classList.remove('focused');
  document.getElementById('tdInput').value = '';
  document.getElementById('tdDue').value = '';
  document.getElementById('tdNote').value = '';
  document.getElementById('dueLbl').textContent = 'Due date';
  document.getElementById('noteLblTxt').textContent = 'Note';
  var dp=document.getElementById('datePill'); if(dp) dp.classList.remove('set');
  var np=document.getElementById('notePill'); if(np) np.classList.remove('set');
  if(noteShowing){ hideNote(); }
  document.getElementById('btnAdd').disabled = true;
}

function openDatePicker() {
  var inp = document.getElementById('tdDue');
  try {
    if (inp.showPicker) { inp.showPicker(); }
    else { inp.click(); }
  } catch(e) { inp.click(); }
}

function updateDueLabel() {
  var val = document.getElementById('tdDue').value;
  var pill = document.getElementById('datePill');
  if(val) {
    var d = new Date(val + 'T00:00:00');
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('dueLbl').textContent = d.getDate()+' '+months[d.getMonth()];
    if(pill) pill.classList.add('set');
  } else {
    document.getElementById('dueLbl').textContent = 'Due date';
    if(pill) pill.classList.remove('set');
  }
}

function toggleNote() {
  noteShowing = !noteShowing;
  var pill = document.getElementById('notePill');
  if(noteShowing) {
    document.getElementById('noteWrap').style.display = 'block';
    document.getElementById('tdNote').focus();
    document.getElementById('noteLblTxt').textContent = 'Hide note';
    if(pill) pill.classList.add('set');
  } else {
    hideNote();
  }
}
function hideNote(){
  noteShowing = false;
  document.getElementById('noteWrap').style.display = 'none';
  document.getElementById('tdNote').value = '';
  document.getElementById('noteLblTxt').textContent = 'Note';
  var pill = document.getElementById('notePill');
  if(pill) pill.classList.remove('set');
}

// Close add card on outside click
document.addEventListener('click', function(e) {
  var card = document.getElementById('addCard');
  if (card && !card.contains(e.target)) {
    card.classList.remove('focused');
  }
});

// Enable Add button only when input has text
document.getElementById('tdInput').addEventListener('input', function() {
  document.getElementById('btnAdd').disabled = !this.value.trim();
});

// Note pill uses onclick directly


async function addTodo() {
  var title = (document.getElementById('tdInput').value || '').trim();
  if (!title) return;
  var due   = document.getElementById('tdDue').value || '';
  var note  = document.getElementById('tdNote').value || '';
  document.getElementById('btnAdd').disabled = true;
  try {
    await API.post('ptodo_add', { title: title, note: note, due_date: due });
    document.getElementById('tdInput').value = '';
    document.getElementById('tdDue').value = '';
    document.getElementById('tdNote').value = '';
    document.getElementById('addCard').classList.remove('focused');
    document.getElementById('btnAdd').disabled = true;
    UTILS.toast('Task added ✓', 'success');
    await loadTodos();
  } catch(ex) {
    UTILS.toast('Error: ' + ex.message, 'error');
    document.getElementById('btnAdd').disabled = false;
  }
}

// ── TOGGLE DONE ──────────────────────────────────────────
async function toggleDone(id) {
  var t = todos.find(function(x){ return x.todo_id === id; });
  if (!t) return;
  var newStatus = t.status === 'Completed' ? 'Pending' : 'Completed';
  var dbStatus = newStatus === 'Completed' ? 'Done' : 'Pending';
  // Optimistic update
  t.status = newStatus;
  updateUI();
  try {
    await API.post('ptodo_update', { todo_id: id, status: dbStatus });
  } catch(ex) {
    t.status = newStatus === 'Completed' ? 'Pending' : 'Completed';
    updateUI();
    UTILS.toast('Error updating task', 'error');
  }
}

// ── EDIT ─────────────────────────────────────────────────
function startEdit(id) {
  if (editingId) cancelEdit();
  editingId = id;
  var t = todos.find(function(x){ return x.todo_id === id; });
  if (!t) return;
  var el = document.getElementById('item-' + id);
  if (!el) return;

  // Build edit form using DOM (avoids string quoting issues)
  var body = el.querySelector('.td-body');
  body.innerHTML = '';
  var wrap = document.createElement('div'); wrap.className = 'td-edit';

  var inp = document.createElement('input'); inp.className = 'td-edit-title'; inp.id = 'editTitle';
  inp.value = t.title || ''; inp.placeholder = 'Task title';
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter')saveEdit(id); if(e.key==='Escape')cancelEdit(); });

  var row = document.createElement('div'); row.className = 'td-edit-row';

  var f1 = document.createElement('div'); f1.className = 'td-edit-field';
  var l1 = document.createElement('label'); l1.textContent = '📅 Due';
  var d1 = document.createElement('input'); d1.type = 'date'; d1.id = 'editDue'; d1.value = t.due_date || '';
  f1.appendChild(l1); f1.appendChild(d1);

  var f2 = document.createElement('div'); f2.className = 'td-edit-field'; f2.style.flex = '2';
  var l2 = document.createElement('label'); l2.textContent = '📝 Note';
  var n2 = document.createElement('input'); n2.id = 'editNote'; n2.value = t.note || ''; n2.placeholder = 'Optional note...';
  f2.appendChild(l2); f2.appendChild(n2);

  row.appendChild(f1); row.appendChild(f2);

  var btns = document.createElement('div'); btns.className = 'td-edit-btns';
  var bSave = document.createElement('button'); bSave.className = 'btn-save'; bSave.textContent = 'Save';
  bSave.addEventListener('click', function(){ saveEdit(id); });
  var bCancel = document.createElement('button'); bCancel.className = 'btn-cancel'; bCancel.textContent = 'Cancel';
  bCancel.addEventListener('click', cancelEdit);
  btns.appendChild(bSave); btns.appendChild(bCancel);

  wrap.appendChild(inp); wrap.appendChild(row); wrap.appendChild(btns);
  body.appendChild(wrap);

  el.querySelector('.td-actions').style.display = 'none';
  inp.focus();
}

function cancelEdit() {
  editingId = null;
  renderList();
}

async function saveEdit(id) {
  var title = (document.getElementById('editTitle').value || '').trim();
  if (!title) { UTILS.toast('Title cannot be empty', 'warning'); return; }
  var due  = document.getElementById('editDue').value || '';
  var note = document.getElementById('editNote').value || '';
  try {
    await API.post('ptodo_update', { todo_id: id, title: title, due_date: due, note: note });
    editingId = null;
    UTILS.toast('Updated ✓', 'success');
    await loadTodos();
  } catch(ex) {
    UTILS.toast('Error: ' + ex.message, 'error');
  }
}

// ── DELETE ────────────────────────────────────────────────
async function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  todos = todos.filter(function(t){ return t.todo_id !== id; });
  updateUI();
  try {
    await API.post('ptodo_delete', { todo_id: id });
    UTILS.toast('Deleted', 'info');
  } catch(ex) {
    UTILS.toast('Error deleting', 'error');
    await loadTodos();
  }
}

// ── REFRESH ───────────────────────────────────────────────
async function refreshTodos() {
  var icon = document.getElementById('refreshIcon');
  if (icon) icon.classList.add('spinning');
  await loadTodos();
  setTimeout(function(){ if(icon) icon.classList.remove('spinning'); }, 600);
}

// ── NOTIFICATIONS BELL ────────────────────────────────────
async function loadBell() {
  try {
    var d = await API.get('notif_list', { limit:'5', unread_only:'true' });
    var nb = document.getElementById('notifBadge');
    if (nb) {
      if ((d.unread_count || 0) > 0) { nb.textContent = d.unread_count; nb.classList.remove('hidden'); }
      else nb.classList.add('hidden');
    }
  } catch(e) {}
}


// Event delegation for todo items
document.getElementById('tdList').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var id = btn.getAttribute('data-id');
  var action = btn.getAttribute('data-action');
  if (action === 'toggle') toggleDone(id);
  else if (action === 'edit') startEdit(id);
  else if (action === 'delete') deleteTodo(id);
});

// ── INIT ─────────────────────────────────────────────────
loadBell();
loadTodos();
setInterval(loadBell, 60000);
setInterval(loadTodos, 60000);

</script>
<script>
// ── MOBILE MORE SHEET ─────────────────────────────────────
function toggleMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var isOpen=sheet&&sheet.style.transform==='translateY(0px)';
  isOpen?closeMobileMore():openMobileMore();
}
function openMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var overlay=document.getElementById('mobileMoreOverlay');
  var btn=document.getElementById('btnMobileMore');
  if(!sheet)return;
  sheet.style.display='block';
  if(overlay)overlay.style.display='block';
  if(btn)btn.classList.add('active');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){sheet.style.transform='translateY(0px)';});
  });
  var s=AUTH&&AUTH.getSession?AUTH.getSession():{};
  if(s&&s.full_name){
    var ini=s.full_name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var av=document.getElementById('moreAvatar');if(av)av.textContent=ini;
    var nm=document.getElementById('moreName');if(nm)nm.textContent=s.full_name;
    var rl=document.getElementById('moreRole');if(rl)rl.textContent=s.role||'';
    var dp=document.getElementById('moreDept');if(dp)dp.textContent=s.department||'KIB';
  }
}
function closeMobileMore(){
  var sheet=document.getElementById('mobileMoreSheet');
  var overlay=document.getElementById('mobileMoreOverlay');
  var btn=document.getElementById('btnMobileMore');
  if(sheet)sheet.style.transform='translateY(100%)';
  if(btn)btn.classList.remove('active');
  setTimeout(function(){
    if(sheet)sheet.style.display='none';
    if(overlay)overlay.style.display='none';
  },280);
}
</script>
